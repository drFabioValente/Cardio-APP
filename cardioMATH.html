  .table-scroll .table.table-responsive {
    min-width: 0;
    border: 0;
    background: transparent;
    border-radius: 0;
    box-shadow: none;
  }
  .table.table-responsive thead {
    display: none;
  }
  .table.table-responsive tbody {
    display: grid;
    gap: 10px;
  }
  .table.table-responsive tbody tr {
    display: block;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-2) 10px;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }
  .table.table-responsive tbody tr[data-empty-row] {
    padding: 0;
    border: none;
    background: transparent;
    box-shadow: none;
  }
  .table.table-responsive td {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    border: 0 !important;
    padding: 5px 0 !important;
    text-align: left !important;
    min-height: 0;
  }
  .table.table-responsive td::before {
    content: attr(data-label);
    flex: 0 0 42%;
    font-size: var(--text-xs);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    text-transform: uppercase;
    line-height: 1.2;
    padding-top: 1px;
  }
  .table.table-responsive tr[data-empty-row] td {
    display: block;
    padding: 0 !important;
    text-align: center !important;
  }
  .table.table-responsive tr[data-empty-row] td::before {
    content: none;
  }
  /* Table actions mobile */
  .table.table-responsive .table-actions {
    justify-content: flex-start;
    width: 100%;
    gap: 6px;
  }
  .table.table-responsive .table-actions form {
    width: auto;
  }
  .table.table-responsive .table-actions .btn {
    min-height: 30px;
    padding: 5px 10px;
  }
  .table.table-responsive td[data-label=&quot;Azioni&quot;]::before {
    content: none;
  }
  .table.table-responsive td[data-label=&quot;Azioni&quot;] {
    display: block;
    padding-top: var(--space-2) !important;
  }
  .table.table-responsive td[data-label=&quot;Azioni&quot;] .table-actions {
    display: grid;
    grid-template-columns: 1fr;
    width: 100%;
  }

    width: 100%;

    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;

  .table.table-responsive.recall-table td[data-label=&quot;Azioni&quot;] .table-actions .btn,
  .table.table-responsive.recall-table td[data-label=&quot;Azioni&quot;] .table-actions .wa-icon-btn {
    width: auto;

    max-width: none;

    overflow: visible;

  }

  .terapia-table.table-responsive tbody tr {

  .visit-nav {

  /* Login role grid */
  .login-role-grid {

/* ============================================
   LANDSCAPE MOBILE (orientation)
   ============================================ */
@media (max-width: 900px) and (orientation: landscape) {
  .frequency-panel {
    max-height: 80vh;
  }
}
/* ============================================
   SMALL MOBILE (max-width: 480px)
   ============================================ */
@media (max-width: 480px) {
  :root {
    --page-gutter: 12px;
  }
  h1 {
    font-size: 24px;
  }
  .card {
    padding: var(--space-4);
  }
  .btn-group {
    display: grid;
    grid-template-columns: 1fr;
    width: 100%;
  }
  .btn-group .btn {
    width: 100%;
  }
  .kpi-grid {
    grid-template-columns: 1fr;
  }
  .tile-grid {
    grid-template-columns: 1fr;
  }
  .planning-options {
    grid-template-columns: 1fr;
  }
  .frequency-times {
    column-count: 1;
  }
}
/* ============================================
   COMPACT MOBILE (max-width: 430px)
   ============================================ */
@media (max-width: 430px) {
  .topbar {
    gap: 8px;
    min-height: 0;
  }
  .main {
    padding-top: var(--space-4);
  }
  .card {
    padding: 10px;
    border-radius: 10px;
  }
  .card-title {
    font-size: var(--text-lg);
  }
  .card-subtitle {
    margin-bottom: 6px;
  }
  .form {
    gap: 10px;
  }
  .form-grid {
    gap: 6px 8px;
  }
  .form-field {
    gap: 3px;
  }
  .btn {
    min-height: 30px;
    padding: 5px 10px;
  }
  .status-badge {
    min-height: 18px;
    padding: 1px 8px;
  }
  .table.table-responsive tbody tr {
    padding: 8px;
  }
  .table.table-responsive td {
    gap: 8px;
    padding: 4px 0 !important;
  }
  .visit-mobile-actions {
    padding: 6px;
    gap: 6px;
  }
}
/* ============================================
   TOUCH IMPROVEMENTS
   ============================================ */
@media (hover: none) and (pointer: coarse) {
  /* Aumenta target touch */
  .btn,
  .nav-item,
  .pill-check span {
    min-height: 44px;
  }
  .segment-btn {
    min-height: 36px;
  }
  .search-result {
    padding: var(--space-3);
  }
  /* Rimuovi hover effects su touch */
  .btn:hover,
  .nav-item:hover,
  .tile:hover,
  .card:hover {
    transform: none;
  }
}
/* ============================================
   HIGH CONTRAST MODE
   ============================================ */
@media (prefers-contrast: high) {
  :root {
    --border: #000;
    --text-muted: #333;
  }
  .btn {
    border-width: 2px;
  }
  .card,
  .table {
    border-width: 2px;
  }
}
/* ============================================
   DARK MODE (preparazione futura)

@media (prefers-color-scheme: dark) {

          if (saved.seed &amp;&amp; typeof saved.seed === 'object') seed = saved.seed;

  <script>
const initClinicaApp = () => {
  document.documentElement.classList.add('js');
  window.onbeforeunload = null;
  window.addEventListener(
    'beforeunload',
    (event) => {
      event.stopImmediatePropagation();
    },
    true,
  );
  const storage = (() => {
    try {
      const testKey = '__clinica_test__';
      localStorage.setItem(testKey, '1');
      localStorage.removeItem(testKey);
      return localStorage;
    } catch (err) {
      return null;
    }
  })();
  const cards = document.querySelectorAll('.card');
  cards.forEach((card, index) => {
    const delay = Math.min(index * 0.05, 0.3);
    card.style.animationDelay = `${delay}s`;
  });

  const initMobileNav = () => {
    const nav = document.querySelector('[data-app-nav]');
    if (!nav) return;
    const toggle = nav.querySelector('[data-nav-toggle]');
    const links = nav.querySelector('[data-nav-links]');
    if (!toggle || !links) return;

    const isMobileViewport = () => window.matchMedia('(max-width: 900px)').matches;
    const setOpen = (open) => {
      nav.classList.toggle('is-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    };

    setOpen(false);

    toggle.addEventListener('click', () => {
      setOpen(!nav.classList.contains('is-open'));
    });

    links.querySelectorAll('a.nav-item').forEach((link) => {
      link.addEventListener('click', () => setOpen(false));
    });

    document.addEventListener('click', (event) => {
      if (!isMobileViewport()) return;
      if (!nav.classList.contains('is-open')) return;
      if (nav.contains(event.target)) return;
      setOpen(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setOpen(false);
      }
    });

    window.addEventListener('resize', () => {
      if (!isMobileViewport()) {
        setOpen(false);
      }
    });
  };
  initMobileNav();

  const initGlobalSearch = () => {
    const root = document.querySelector('[data-global-search-root]');
    if (!root) return;
    const input = root.querySelector('[data-global-search-input]');
    const resultsBox = root.querySelector('[data-global-search-results]');
    if (!input || !resultsBox) return;

    let debounceId = null;
    let activeController = null;

    const hideResults = () => {
      resultsBox.classList.add('is-hidden');
      resultsBox.innerHTML = '';
    };

    const renderResults = (sections) => {
      resultsBox.innerHTML = '';
      if (!Array.isArray(sections) || !sections.length) {
        hideResults();
        return;
      }

      const fragment = document.createDocumentFragment();
      sections.forEach((section) => {
        if (!section || !Array.isArray(section.items) || !section.items.length) return;
        const sectionNode = document.createElement('div');
        sectionNode.className = 'global-search-section';

        const title = document.createElement('div');
        title.className = 'global-search-section-title';
        title.textContent = section.section || '';
        sectionNode.appendChild(title);

        section.items.forEach((item) => {
          const link = document.createElement('a');
          link.className = 'global-search-item';
          link.href = item.url || '#';
          link.dataset.globalSearchItem = '1';

          const label = document.createElement('div');
          label.className = 'global-search-item-label';
          label.textContent = item.label || '';
          link.appendChild(label);

          if (item.meta) {
            const meta = document.createElement('div');
            meta.className = 'global-search-item-meta';
            meta.textContent = item.meta;
            link.appendChild(meta);
          }

          sectionNode.appendChild(link);
        });

        fragment.appendChild(sectionNode);
      });

      resultsBox.appendChild(fragment);
      resultsBox.classList.remove('is-hidden');
    };

    input.addEventListener('input', () => {
      const query = input.value.trim();
      if (debounceId) {
        window.clearTimeout(debounceId);
      }
      if (activeController) {
        activeController.abort();
        activeController = null;
      }
      if (query.length < 2) {
        hideResults();
        return;
      }

      debounceId = window.setTimeout(async () => {
        activeController = new AbortController();
        try {
          const response = await fetch(`/api/search/global?q=${encodeURIComponent(query)}`, {
            headers: { Accept: 'application/json' },
            signal: activeController.signal,
          });
          if (!response.ok) {
            hideResults();
            return;
          }
          const payload = await response.json();
          renderResults(payload.results || []);
        } catch (error) {
          if (error &amp;&amp; error.name === 'AbortError') return;
          hideResults();
        } finally {
          activeController = null;
        }
      }, 180);
    });

    input.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      const firstLink = resultsBox.querySelector('[data-global-search-item]');
      if (!firstLink) return;
      event.preventDefault();
      window.location.href = firstLink.getAttribute('href') || '/';
    });

    document.addEventListener('click', (event) => {
      if (!root.contains(event.target)) {
        hideResults();
      }
    });
  };
  initGlobalSearch();

  const initClinicalSnippets = () => {
    const toolbars = Array.from(document.querySelectorAll('[data-clinical-snippet-toolbar]'));
    if (!toolbars.length) return;

    const snippetSets = {
      anamnesi: [
        'Nega dispnea e dolore toracico. Buona tolleranza allo sforzo.',
        'Riferisce cardiopalmo episodico, non sincope.',
        'Riferisce dispnea da sforzo moderato in progressione.',
        'Dolore toracico aspecifico non a riposo.',
        'Nessun accesso recente in PS; terapia domiciliare regolare.',
      ],
      obiettivo: [
        &quot;Toni parafonici, pause libere. MV fisiologico presente su tutto l'ambito. No edemi declivi&quot;,
        'PA ben controllata; FC regolare; assenza di edemi declivi.',
        'MV ridotto ai basi in assenza di rantoli diffusi.',
        'Edemi declivi assenti; turgore giugulare non significativo.',
        'Obiettivita clinica sostanzialmente nei limiti.',
      ],
      ecg: [
        'Ritmo sinusale regolare.',
        'Non si evidenziano anomalie della ripolarizzazione.',
        'Disturbi della conduzione non evidenti al tracciato.',
        'Intervalli nei limiti per eta e frequenza cardiaca.',
        'Reperto da correlare con quadro clinico.',
      ],
      eco: [
        'Funzione sistolica globale conservata.',
        'Non evidenza di alterazioni segmentarie significative.',
        'Lieve disfunzione diastolica di I grado.',
        'PAPs nei limiti.',
        'Assenza di versamento pericardico.',
        'Valvulopatia aortica lieve senza indicazione interventistica immediata.',
        'Quadro compatibile con cardiopatia ipertensiva cronica.',
        'Controllo ecocardiografico consigliato tra 6-12 mesi.',
      ],
      tsa: [
        'Asse carotideo regolare per decorso e calibro, con lieve ispessimento della parete parietale, in assenza di placche fibrocalcifiche significative bilateralmente. Regolari flussi al Doppler',
        'IMT nei limiti; assenza di stenosi emodinamicamente significative.',
        'Placca non stenosante in sede bulbare da monitorare.',
        'Flussi Doppler regolari bilateralmente.',
        'Si consiglia follow-up ecocolordoppler periodico.',
      ],
      prescrizione: [
        'Proseguire terapia in atto.',
        'Monitoraggio pressorio domiciliare bisettimanale.',
        'Ridurre introito sodico e controllare peso corporeo.',
        'Programmare controllo cardiologico tra 3 mesi.',
        'In caso di peggioramento clinico, rivalutazione anticipata.',
        'In caso di dispnea ingravescente o dolore toracico recarsi in PS.',
        'Aderenza terapeutica raccomandata con controllo ematochimico programmato.',
        'Valutazione specialistica anticipata se comparsa di edema declive.',
      ],
    };

    const appendSnippet = (textarea, snippetText) => {
      if (!textarea) return;
      const text = String(snippetText || '').trim();
      if (!text) return;
      const current = String(textarea.value || '');
      const currentTrimmed = current.trimEnd();
      let nextValue = '';
      if (!currentTrimmed) {
        nextValue = text;
      } else if (/[.;:!?]$/.test(currentTrimmed)) {
        nextValue = `${currentTrimmed} ${text}`;
      } else {
        nextValue = `${currentTrimmed}; ${text}`;
      }
      textarea.value = nextValue;
      textarea.dispatchEvent(new Event('input', { bubbles: true }));
      textarea.focus();
      if (typeof textarea.setSelectionRange === 'function') {
        const pos = textarea.value.length;
        textarea.setSelectionRange(pos, pos);
      }
    };

    toolbars.forEach((toolbar) => {
      const targetId = (toolbar.dataset.snippetTarget || '').trim();
      const setKey = (toolbar.dataset.snippetSet || '').trim();
      const target = targetId ? document.getElementById(targetId) : null;
      const options = snippetSets[setKey] || [];
      if (!target || !options.length) {
        toolbar.classList.add('is-hidden');
        return;
      }

      const select = toolbar.querySelector('[data-clinical-snippet-select]');
      const insertBtn = toolbar.querySelector('[data-clinical-snippet-insert]');
      if (!select || !insertBtn) return;

      options.forEach((snippet, index) => {
        const option = document.createElement('option');
        option.value = String(index + 1);
        option.textContent = `${index + 1}. ${snippet}`;
        select.appendChild(option);
      });

      if (['ecg', 'eco', 'tsa', 'prescrizione', 'anamnesi'].includes(setKey)) {
        const quickWrap = document.createElement('div');
        quickWrap.className = 'clinical-snippet-quick';
        options.slice(0, 4).forEach((snippet, index) => {
          const quickBtn = document.createElement('button');
          quickBtn.type = 'button';
          quickBtn.className = 'clinical-snippet-quick-btn';
          quickBtn.textContent = `Smart ${index + 1}`;
          quickBtn.title = snippet;
          quickBtn.addEventListener('click', () => {
            appendSnippet(target, snippet);
          });
          quickWrap.appendChild(quickBtn);
        });
        toolbar.appendChild(quickWrap);
      }

      insertBtn.addEventListener('click', () => {
        const idx = parseInt(select.value, 10);
        if (!Number.isFinite(idx) || idx < 1 || idx > options.length) return;
        appendSnippet(target, options[idx - 1]);
      });

      target.addEventListener('keydown', (event) => {
        if (!event.altKey || !event.shiftKey) return;
        const num = parseInt(event.key, 10);
        if (!Number.isFinite(num) || num < 1 || num > options.length) return;
        event.preventDefault();
        appendSnippet(target, options[num - 1]);
      });
    });
  };
  initClinicalSnippets();

  const parseJsonSafe = (value, fallback = []) => {
    if (!value) return fallback;
    try {
      const parsed = JSON.parse(value);
      return Array.isArray(parsed) ? parsed : fallback;
    } catch (err) {
      return fallback;
    }
  };

  const formatDateShort = (value) => {
    if (!value) return '';
    const text = String(value).trim();
    if (!text) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
      const [year, month, day] = text.split('-');
      return `${day}/${month}/${year.slice(-2)}`;
    }
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(text)) {
      const [day, month, year] = text.split('/');
      return `${day}/${month}/${year.slice(-2)}`;
    }
    return text;
  };

  const initFrequencyPickers = () => {
    const pickers = document.querySelectorAll('[data-frequency-picker]');
    pickers.forEach((picker) => {
      const input = picker.querySelector('[data-frequency-input]');
      const panel = picker.querySelector('[data-frequency-panel]');
      const openBtn = picker.querySelector('[data-frequency-open]');
      const closeBtn = picker.querySelector('[data-frequency-close]');
      const applyBtn = picker.querySelector('[data-frequency-apply]');
      const periodSelect = picker.querySelector('[data-frequency-period]');
      const extraInput = picker.querySelector('[data-frequency-extra]');
      const timeBoxes = Array.from(picker.querySelectorAll('[data-frequency-time]'));
      if (!input || !panel || !openBtn || !applyBtn || !periodSelect) return;

      const isMobileViewport = () => window.matchMedia('(max-width: 720px)').matches;
      let panelPlaceholder = null;
      let panelPortaled = false;

      const portalPanel = () => {
        if (panelPortaled || !isMobileViewport()) return;
        if (!panel.parentNode) return;
        panelPlaceholder = document.createComment('frequency-panel-anchor');
        panel.parentNode.insertBefore(panelPlaceholder, panel);
        document.body.appendChild(panel);
        panel.classList.add('frequency-panel-portal');
        panelPortaled = true;
      };

      const restorePanel = () => {
        if (!panelPortaled) return;
        if (panelPlaceholder &amp;&amp; panelPlaceholder.parentNode) {
          panelPlaceholder.parentNode.insertBefore(panel, panelPlaceholder);
          panelPlaceholder.remove();
        }
        panelPlaceholder = null;
        panel.classList.remove('frequency-panel-portal');
        panelPortaled = false;
      };

      const openPanel = () => {
        portalPanel();
        panel.classList.remove('is-hidden');
      };
      const closePanel = () => {
        panel.classList.add('is-hidden');
        restorePanel();
      };

      openBtn.addEventListener('click', () => {
        if (panel.classList.contains('is-hidden')) {
          openPanel();
        } else {
          closePanel();
        }
      });
      if (closeBtn) {
        closeBtn.addEventListener('click', closePanel);
      }

      applyBtn.addEventListener('click', () => {
        const times = timeBoxes
          .filter((box) => box.checked)
          .map((box) => box.value);
        const extra = extraInput ? extraInput.value.trim() : '';
        if (extra) {
          extra
            .split(',')
            .map((val) => val.trim())
            .filter(Boolean)
            .forEach((val) => times.push(val));
        }
        const uniqueTimes = Array.from(new Set(times));
        input.value = uniqueTimes.join(' - ');
        input.dispatchEvent(new Event('input', { bubbles: true }));
        closePanel();
      });

      document.addEventListener('click', (event) => {
        const target = event.target;
        if (!picker.contains(target) &amp;&amp; !panel.contains(target)) {
          closePanel();
        }
      });

      window.addEventListener('resize', () => {
        if (!isMobileViewport() &amp;&amp; panelPortaled) {
          restorePanel();
        }
      });
    });
  };

  const DRUGS_CUSTOM_STORAGE_KEY = 'drugs_custom';
  let drugCatalogPromise = null;

  const normalizeDrugKey = (value) => (value || '').trim().replace(/\s+/g, ' ').toLowerCase();
  const cleanDrugValue = (value) => (value || '').trim().replace(/\s+/g, ' ');

  const loadLocalCustomDrugs = () => {
    if (!storage) return [];
    try {
      const raw = storage.getItem(DRUGS_CUSTOM_STORAGE_KEY);
      const parsed = parseJsonSafe(raw, []);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .filter((item) => item &amp;&amp; typeof item === 'object')
        .map((item) => ({
          farmaco: cleanDrugValue(item.farmaco),
          classe: cleanDrugValue(item.classe),
        }))
        .filter((item) => item.farmaco);
    } catch (err) {
      return [];
    }
  };

  const saveLocalCustomDrugs = (items) => {
    if (!storage) return;
    try {
      storage.setItem(DRUGS_CUSTOM_STORAGE_KEY, JSON.stringify(items));
    } catch (err) {
      // ignore local persistence errors
    }
  };

  const buildDrugMap = (items) => {
    const map = new Map();
    (items || []).forEach((item) => {
      const farmaco = cleanDrugValue(item.farmaco);
      const classe = cleanDrugValue(item.classe);
      const key = normalizeDrugKey(farmaco);
      if (!key) return;
      if (!map.has(key) || (classe &amp;&amp; !(map.get(key).classe || '').trim())) {
        map.set(key, { farmaco, classe });
      }
    });
    return map;
  };

  const loadDrugCatalog = (wrapper) => {
    if (drugCatalogPromise) return drugCatalogPromise;
    const apiUrl = wrapper.dataset.drugClassesUrl || '/api/farmaci-classi';
    drugCatalogPromise = (async () => {
      let apiItems = [];
      try {
        const response = await fetch(apiUrl, { credentials: 'same-origin' });
        if (response.ok) {
          const payload = await response.json().catch(() => ({ items: [] }));
          apiItems = Array.isArray(payload.items) ? payload.items : [];
        }
      } catch (err) {
        console.warn('Catalogo classi farmaci non disponibile', err);
      }
      const merged = buildDrugMap([...apiItems, ...loadLocalCustomDrugs()]);
      return merged;
    })();
    return drugCatalogPromise;
  };

  const persistCustomDrug = async (wrapper, farmaco, classe) => {
    const cleanedFarmaco = cleanDrugValue(farmaco);
    const cleanedClasse = cleanDrugValue(classe);
    if (!cleanedFarmaco || !cleanedClasse) return;

    const localItems = loadLocalCustomDrugs();
    const key = normalizeDrugKey(cleanedFarmaco);
    const nextLocal = localItems.filter((item) => normalizeDrugKey(item.farmaco) !== key);
    nextLocal.push({ farmaco: cleanedFarmaco, classe: cleanedClasse });
    saveLocalCustomDrugs(nextLocal);

    const createUrl = wrapper.dataset.drugCreateUrl || '/api/farmaci-classi';
    try {
      await fetch(createUrl, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          farmaco: cleanedFarmaco,
          classe: cleanedClasse,
        }),
      });
    } catch (err) {
      console.warn('Salvataggio remoto classe farmaco non disponibile, uso cache locale', err);
    }
  };

  const askAddDrug = (name) => new Promise((resolve) => {
    const message = `Farmaco non trovato in elenco. Vuoi aggiungerlo?\n\n${name}`;
    if (typeof openDeletePopup === 'function') {
      openDeletePopup(
        message,
        () => resolve(true),
        {
          title: 'Farmaco non trovato',
          confirmText: 'Aggiungi',
          cancelText: 'Annulla',
          confirmClass: 'btn btn-primary',
          onCancel: () => resolve(false),
        },
      );
      return;
    }
    resolve(window.confirm(message));
  });

  const askDrugClass = (drugName) => new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.inset = '0';
    overlay.style.background = 'rgba(15,23,42,0.45)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '10002';

    const panel = document.createElement('div');
    panel.style.width = 'min(420px, calc(100vw - 32px))';
    panel.style.background = '#fff';
    panel.style.borderRadius = '12px';
    panel.style.boxShadow = '0 16px 48px rgba(0,0,0,0.25)';
    panel.style.padding = '16px';
    panel.style.border = '1px solid #e5e7eb';

    const title = document.createElement('div');
    title.textContent = 'Inserisci classe farmaco';
    title.style.fontWeight = '700';
    title.style.marginBottom = '10px';
    title.style.fontSize = '15px';

    const subtitle = document.createElement('div');
    subtitle.textContent = cleanDrugValue(drugName);
    subtitle.style.fontSize = '13px';
    subtitle.style.color = '#334155';
    subtitle.style.marginBottom = '12px';

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Classe (obbligatoria)';
    input.style.width = '100%';
    input.style.padding = '10px 12px';
    input.style.border = '1px solid #d1d5db';
    input.style.borderRadius = '10px';

    const actions = document.createElement('div');
    actions.style.display = 'flex';
    actions.style.justifyContent = 'flex-end';
    actions.style.gap = '8px';
    actions.style.marginTop = '14px';

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn btn-secondary';
    cancelBtn.textContent = 'Annulla';

    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.className = 'btn btn-primary';
    saveBtn.textContent = 'Salva';

    const close = (value = null) => {
      document.removeEventListener('keydown', onEsc);
      overlay.remove();
      resolve(value);
    };

    const onEsc = (event) => {
      if (event.key === 'Escape') {
        close(null);
      }
    };

    cancelBtn.addEventListener('click', () => close(null));
    saveBtn.addEventListener('click', () => {
      const value = cleanDrugValue(input.value);
      if (!value) {
        input.classList.add('input-invalid');
        input.focus();
        return;
      }
      close(value);
    });
    input.addEventListener('input', () => input.classList.remove('input-invalid'));
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        saveBtn.click();
      }
    });
    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) {
        close(null);
      }
    });

    actions.append(cancelBtn, saveBtn);
    panel.append(title, subtitle, input, actions);
    overlay.append(panel);
    document.body.appendChild(overlay);
    document.addEventListener('keydown', onEsc);
    input.focus();
  });

  const initTerapiaTables = () => {
    const wrappers = document.querySelectorAll('[data-terapia-table=\&quot;1\&quot;]');
    wrappers.forEach((wrapper) => {
      const hiddenInput = wrapper.querySelector('#terapia_items');
      const tbody = wrapper.querySelector('[data-terapia-body]');
      const inputRow = wrapper.querySelector('[data-terapia-input-row]');
      const addButton = wrapper.querySelector('[data-terapia-add]');
      const emptyState = wrapper.querySelector('[data-terapia-empty]');
      if (!hiddenInput || !tbody || !inputRow || !addButton) return;

      const fields = {
        nome_farmaco: wrapper.querySelector('#terapia_nome_farmaco'),
        farmaco_select: wrapper.querySelector('#terapia_farmaco_id'),
        classe: wrapper.querySelector('#terapia_classe'),
        quantita: wrapper.querySelector('#terapia_quantita'),
        frequenza_assunzione: wrapper.querySelector('#terapia_frequenza_assunzione'),
        note: wrapper.querySelector('#terapia_note'),
      };
      const classHint = wrapper.querySelector('[data-terapia-class-hint]');

      let items = parseJsonSafe(hiddenInput.value, []);
      if (Array.isArray(items)) {
        items = items
          .filter((item) => item &amp;&amp; typeof item === 'object')
          .map((item) => ({
            nome_farmaco: cleanDrugValue(item.nome_farmaco || ''),
            classe: cleanDrugValue(item.classe || item.dosaggio || ''),
            quantita: cleanDrugValue(item.quantita || ''),
            frequenza_assunzione: cleanDrugValue(item.frequenza_assunzione || ''),
            note: cleanDrugValue(item.note || ''),
          }))
          .filter((item) => item.nome_farmaco);
      } else {
        items = [];
      }
      let lookupMap = null;
      let classLookupTimer = null;
      const knownDrugCheckCache = new Map();

      const readField = (field) => (field ? cleanDrugValue(field.value) : '');

      const syncHidden = () => {
        hiddenInput.value = JSON.stringify(items);
        hiddenInput.dispatchEvent(new Event('input', { bubbles: true }));
      };

      const setClasseField = (value) => {
        if (!fields.classe) return;
        const cleaned = cleanDrugValue(value);
        fields.classe.value = cleaned;
        if (classHint) {
          classHint.textContent = cleaned ? `Classe: ${cleaned}` : 'Classe: non disponibile';
          classHint.classList.remove('pulse');
          void classHint.offsetWidth;
          classHint.classList.add('pulse');
        }
      };

      const ensureLookupMap = async () => {
        if (lookupMap) return lookupMap;
        lookupMap = await loadDrugCatalog(wrapper);
        return lookupMap;
      };

      const lookupClassForDrug = async (drugName) => {
        const name = cleanDrugValue(drugName);
        if (!name) {
          setClasseField('');
          return { found: false, classe: '' };
        }
        const map = await ensureLookupMap();
        const key = normalizeDrugKey(name);
        if (!map.has(key)) {
          setClasseField('');
          return { found: false, classe: '' };
        }
        const entry = map.get(key);
        const classe = cleanDrugValue(entry.classe || '');
        setClasseField(classe);
        return { found: true, classe, canonicalName: cleanDrugValue(entry.farmaco || name) };
      };

      const resolveMissingDrugClass = async (drugName) => {
        const found = await lookupClassForDrug(drugName);
        if (found.found) return found;
        const shouldAdd = await askAddDrug(drugName);
        if (!shouldAdd) return { found: false, classe: '' };

        const classe = await askDrugClass(drugName);
        if (!classe) return { found: false, classe: '' };

        const map = await ensureLookupMap();
        const canonicalName = cleanDrugValue(drugName);
        const key = normalizeDrugKey(canonicalName);
        const existing = map.get(key);
        if (existing &amp;&amp; cleanDrugValue(existing.classe)) {
          setClasseField(existing.classe);
          return { found: true, classe: existing.classe, canonicalName: existing.farmaco || canonicalName };
        }

        map.set(key, { farmaco: canonicalName, classe });
        setClasseField(classe);
        await persistCustomDrug(wrapper, canonicalName, classe);
        return { found: true, classe, canonicalName };
      };

      const render = () => {
        tbody.querySelectorAll('[data-terapia-row]').forEach((row) => row.remove());
        items.forEach((item, index) => {
          const row = document.createElement('tr');
          row.className = 'terapia-data-row';
          row.dataset.terapiaRow = '1';
          row.dataset.terapiaIndex = String(index);
          row.innerHTML = `
            <td data-label=&quot;Farmaco&quot;>${item.nome_farmaco || ''}</td>
            <td data-label=&quot;Classe&quot;>${item.classe || ''}</td>
            <td data-label=&quot;Quantita'&quot;>${item.quantita || ''}</td>
            <td data-label=&quot;Orario&quot;>${item.frequenza_assunzione || ''}</td>
            <td data-label=&quot;Note&quot;>${item.note || ''}</td>
            <td class=\&quot;terapia-actions\&quot; data-label=\&quot;Azioni\&quot;>\n              <button type=\&quot;button\&quot; class=\&quot;btn btn-danger btn-compact has-icon icon-trash\&quot; data-terapia-remove>Rimuovi</button>\n            </td>
          `;
          tbody.appendChild(row);
        });
        if (emptyState) {
          emptyState.classList.toggle('is-hidden', items.length > 0);
        }
        syncHidden();
      };

      const clearInputs = () => {
        Object.values(fields).forEach((field) => {
          if (field) field.value = '';
        });
      };

      const isKnownBySelect = (drugName) => {
        const select = fields.farmaco_select;
        if (!select) return false;
        const selected = select.options[select.selectedIndex];
        if (!selected || !selected.value) return false;
        return normalizeDrugKey(selected.text || '') === normalizeDrugKey(drugName);
      };

      const isKnownByApi = async (drugName) => {
        const normalized = normalizeDrugKey(drugName);
        if (!normalized) return false;
        if (knownDrugCheckCache.has(normalized)) {
          return Boolean(knownDrugCheckCache.get(normalized));
        }
        try {
          const params = new URLSearchParams();
          params.set('q', cleanDrugValue(drugName));
          params.set('limit', '20');
          const response = await fetch(`/api/farmaci?${params.toString()}`, {
            credentials: 'same-origin',
          });
          if (!response.ok) {
            knownDrugCheckCache.set(normalized, false);
            return false;
          }
          const payload = await response.json().catch(() => ({ results: [] }));
          const items = Array.isArray(payload.results) ? payload.results : [];
          const found = items.some((item) => normalizeDrugKey(item.label || item.id || '') === normalized);
          knownDrugCheckCache.set(normalized, found);
          return found;
        } catch (err) {
          knownDrugCheckCache.set(normalized, false);
          return false;
        }
      };

      const refreshClasseDebounced = () => {
        if (classLookupTimer) {
          clearTimeout(classLookupTimer);
        }
        classLookupTimer = window.setTimeout(async () => {
          await lookupClassForDrug(readField(fields.nome_farmaco));
        }, 150);
      };

      const addItem = async () => {
        const nome = readField(fields.nome_farmaco);
        if (!nome) {
          if (fields.nome_farmaco) {
            fields.nome_farmaco.classList.add('input-invalid');
          }
          return;
        }

        const lookup = await lookupClassForDrug(nome);
        let classe = lookup.classe || '';
        if (!lookup.found) {
          const knownBySelect = isKnownBySelect(nome);
          const knownByApi = knownBySelect ? true : await isKnownByApi(nome);
          if (knownByApi) {
            classe = '';
          } else {
          const added = await resolveMissingDrugClass(nome);
          classe = added.classe || '';
          }
        }

        const item = {
          nome_farmaco: nome,
          classe,
          quantita: readField(fields.quantita),
          frequenza_assunzione: readField(fields.frequenza_assunzione),
          note: readField(fields.note),
        };
        items.push(item);
        clearInputs();
        if (fields.nome_farmaco) {
          fields.nome_farmaco.classList.remove('input-invalid');
          fields.nome_farmaco.focus();
        }
        render();
      };

      addButton.addEventListener('click', () => {
        addItem();
      });
      if (fields.nome_farmaco) {
        fields.nome_farmaco.addEventListener('input', () => {
          fields.nome_farmaco.classList.remove('input-invalid');
          if (fields.farmaco_select) {
            const selected = fields.farmaco_select.options[fields.farmaco_select.selectedIndex];
            const selectedText = selected &amp;&amp; selected.value ? selected.text : '';
            if (normalizeDrugKey(selectedText) !== normalizeDrugKey(fields.nome_farmaco.value || '')) {
              fields.farmaco_select.value = '';
            }
          }
          refreshClasseDebounced();
        });
        fields.nome_farmaco.addEventListener('blur', async () => {
          const nome = readField(fields.nome_farmaco);
          if (!nome) {
            setClasseField('');
            return;
          }
          // On blur we only auto-fill if known; we avoid modal prompts here to
          // not interfere with click selection from autocomplete results.
          await lookupClassForDrug(nome);
        });
      }
      inputRow.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        const target = event.target;
        if (target &amp;&amp; target.classList &amp;&amp; target.classList.contains('search-input')) return;
        event.preventDefault();
        addItem();
      });

      tbody.addEventListener('click', (event) => {
        const button = event.target.closest('[data-terapia-remove]');
        if (!button) return;
        const row = button.closest('[data-terapia-row]');
        if (!row) return;
        const index = Number(row.dataset.terapiaIndex || -1);
        if (Number.isNaN(index) || index < 0) return;
        items.splice(index, 1);
        render();
      });

      render();
      ensureLookupMap().then(() => {
        if (fields.nome_farmaco &amp;&amp; fields.nome_farmaco.value.trim()) {
          lookupClassForDrug(fields.nome_farmaco.value);
        }
      });
    });
  };

  initFrequencyPickers();
  initTerapiaTables();

  const initEcoPro = () => {
    const hiddenInput = document.getElementById('eco_pro_payload');
    const modal = document.querySelector('[data-eco-pro-modal]');
    const pageRoot = document.querySelector('[data-eco-pro-page]');
    const container = modal || pageRoot;
    const openButton = document.querySelector('[data-eco-pro-open]');
    const extraOpenButton = document.querySelector('[data-eco-extra-open]');
    if (!hiddenInput || !container) return;
    if (!pageRoot &amp;&amp; !modal) return;
    if (!pageRoot &amp;&amp; (!openButton &amp;&amp; !extraOpenButton)) return;

    const closeButtons = container.querySelectorAll('[data-eco-pro-close]');
    const sectionsNav = container.querySelector('[data-eco-pro-sections-nav]');
    const rowsRoot = container.querySelector('[data-eco-pro-rows]');
    const summaryBox = container.querySelector('[data-eco-pro-summary]');
    const summaryNotice = container.querySelector('[data-eco-pro-summary-notice]');
    const sendButton = container.querySelector('[data-eco-pro-send]');
    const resetButton = container.querySelector('[data-eco-pro-reset]');
    const tableWrap = container.querySelector('.eco-pro-table-wrap');
    const summaryWrap = container.querySelector('.eco-pro-summary-box');
    const refertoWrap = container.querySelector('[data-eco-pro-referto-wrap]');
    const contextAlert = container.querySelector('[data-eco-pro-context-alert]');
    const seedNode = document.getElementById('eco-pro-seed');
    const visitEditUrl = pageRoot?.dataset.visitUrl || '';

    if (
      !sectionsNav ||
      !rowsRoot ||
      !summaryBox ||
      !sendButton
    ) {
      return;
    }

    const safeJsonParse = (raw, fallback) => {
      try {
        const parsed = JSON.parse(raw);
        return parsed &amp;&amp; typeof parsed === 'object' ? parsed : fallback;
      } catch (err) {
        return fallback;
      }
    };

    const parseNum = (raw) => {
      if (raw === null || raw === undefined) return null;
      if (typeof raw === 'number') return Number.isFinite(raw) ? raw : null;
      const text = String(raw).trim().replace(',', '.');
      if (!text) return null;
      const parsed = Number.parseFloat(text);
      return Number.isFinite(parsed) ? parsed : null;
    };

    const normalizeNum = (raw) => {
      const parsed = parseNum(raw);
      return parsed === null ? '' : String(parsed);
    };

    const formatNum = (value, decimals = 2) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return '';
      const fixed = Number(value).toFixed(decimals);
      return fixed.replace(/\.?0+$/, '');
    };

    const severityClass = (label) => {
      const text = String(label || '').toLowerCase();
      if (!text || text === 'na') return '';
      if (
        text.includes('sever') ||
        text.includes('anom') ||
        text.includes('elevat') ||
        text.includes('alto') ||
        text.includes('sospetto') ||
        text.includes('non valid') ||
        text.includes('fuori range')
      ) {
        return 'bad';
      }
      if (
        text.includes('moder') ||
        text.includes('lieve') ||
        text.includes('indetermin') ||
        text.includes('inserire') ||
        text.includes('inserisci') ||
        text.includes('mancanti')
      ) {
        return 'warn';
      }
      if (
        text.includes('norm') ||
        text.includes('ok') ||
        text.includes('preserv') ||
        text.includes('calcolato') ||
        text.includes('inserito')
      ) {
        return 'ok';
      }
      return '';
    };

    const setSummaryNotice = (message = '', tone = '') => {
      if (!summaryNotice) return;
      const text = String(message || '').trim();
      summaryNotice.textContent = text;
      summaryNotice.classList.remove('is-visible', 'is-error', 'is-success');
      if (!text) return;
      summaryNotice.classList.add('is-visible');
      if (tone === 'error') summaryNotice.classList.add('is-error');
      if (tone === 'success') summaryNotice.classList.add('is-success');
    };

    const findFieldNum = (selector) => parseNum(document.querySelector(selector)?.value);

    const readGlobalContext = () => {
      const seed = seedState.globals || {};
      const ageText = String(document.getElementById('eta_anni_display')?.value || '').trim();
      const ageParsed = parseNum(ageText);
      const weight = findFieldNum('#peso_kg') ?? parseNum(seed.peso_kg);
      const height = findFieldNum('#altezza_cm') ?? parseNum(seed.altezza_cm);
      const pas = findFieldNum('#pressione_sistolica') ?? parseNum(seed.pas);
      const pad = findFieldNum('#pressione_diastolica') ?? parseNum(seed.pad);
      const fc = findFieldNum('#frequenza_cardiaca') ?? parseNum(seed.fc);
      const bmi = findFieldNum('#bmi') ?? parseNum(seed.bmi);
      const bsaForm = findFieldNum('#bsa_m2') ?? parseNum(seed.bsa_m2);
      const bsaComputed = height &amp;&amp; weight ? Math.sqrt((height * weight) / 3600) : null;
      return {
        age: ageParsed ?? parseNum(seed.eta),
        weight,
        height,
        pas,
        pad,
        fc,
        bmi,
        bsa: bsaForm ?? bsaComputed,
      };
    };

    const sectionList = [
      {
        id: 'ventricolo_sinistro',
        title: 'Ventricolo sinistro',
        fields: [
          { id: 'LVIDd_mm', label: 'Diametro interno VS in diastole', unit: 'mm' },
          { id: 'LVIDd_i_mm_m2', label: 'LVIDd indicizzato', unit: 'mm/m2', auto: true },
          { id: 'IVSd_mm', label: 'Setto interventricolare in diastole', unit: 'mm' },
          { id: 'PWd_mm', label: 'Parete posteriore in diastole', unit: 'mm' },
          { id: 'RWT', label: 'Relative Wall Thickness', unit: '-', auto: true },
          { id: 'LVM_g', label: 'Massa VS (Devereux)', unit: 'g', auto: true },
          { id: 'LV_mass_gm2', label: 'LVMi (indice di massa)', unit: 'g/m2', auto: true },
          { id: 'LVEDV_ml', label: 'Volume telediastolico biplano', unit: 'mL' },
          { id: 'LVEDVi_ml_m2', label: 'LVEDVi', unit: 'mL/m2', auto: true },
          { id: 'LVESV_ml', label: 'Volume telesistolico biplano', unit: 'mL' },
          { id: 'LVESVi_ml_m2', label: 'LVESVi', unit: 'mL/m2', auto: true },
          { id: 'LVEF', label: 'FEVS biplano inserita', unit: '%' },
          { id: 'LVEF_from_vol', label: 'FEVS da volumi', unit: '%', auto: true },
        ],
      },
      {
        id: 'atrio_sinistro',
        title: 'Atrio sinistro',
        fields: [
          { id: 'LA_vol_ml', label: 'Volume atrio sinistro', unit: 'mL' },
          { id: 'LAVI_auto', label: 'LAVi automatico', unit: 'mL/m2', auto: true },
        ],
      },
      {
        id: 'diastolica',
        title: 'Funzione diastolica',

    const getSectionRank = (sectionId) => {
      const idx = SECTION_CLINICAL_ORDER.indexOf(sectionId);
      return idx === -1 ? 999 : idx;
    };
    const sortSectionsByClinicalOrder = (sections) => [...sections].sort((a, b) => {
      const byRank = getSectionRank(a.id) - getSectionRank(b.id);
      if (byRank !== 0) return byRank;
      return String(a.title || '').localeCompare(String(b.title || ''), 'it');
    });
    const ECO_SECTION_IDS = sortSectionsByClinicalOrder(sectionList)
      .map((section) => section.id)
      .filter((sectionId) => sectionId !== EXTRA_SECTION_ID);
    const getSectionsForMode = (mode) => {
      if (mode === 'extra') {
        return sortSectionsByClinicalOrder(sectionList.filter((section) => section.id === EXTRA_SECTION_ID));
      }
      return sortSectionsByClinicalOrder(sectionList.filter((section) => section.id !== EXTRA_SECTION_ID));
    };

    const seedState = safeJsonParse(seedNode?.textContent || '{}', {});
    const initialPayload = seedState.payload &amp;&amp; typeof seedState.payload === 'object' ? seedState.payload : {};
    const initialValues = initialPayload.values &amp;&amp; typeof initialPayload.values === 'object'
      ? { ...initialPayload.values }
      : {};
    const initialSelectedSections = Array.isArray(initialPayload.selected_sections)
      ? initialPayload.selected_sections
        .map((sectionId) => String(sectionId || '').trim())
        .filter((sectionId) => sectionsById.has(sectionId) &amp;&amp; sectionId !== EXTRA_SECTION_ID)
      : [];

    const deriveSelectedSectionsFromValues = (valuesObj) => {
      if (!valuesObj || typeof valuesObj !== 'object') return [];
      return ECO_SECTION_IDS.filter((sectionId) => {
        const sectionDef = sectionsById.get(sectionId);
        if (!sectionDef) return false;
        return (sectionDef.fields || []).some((field) => {
          const rawValue = valuesObj[field.id];
          if (rawValue === null || rawValue === undefined) return false;
          if (typeof rawValue === 'number') return Number.isFinite(rawValue);
          return String(rawValue).trim() !== '';
        });
      });
    };
    const fallbackSelectedSections = initialSelectedSections.length
      ? initialSelectedSections
      : deriveSelectedSectionsFromValues(initialValues);

    const defaultSex = String(seedState.globals?.sex || '').toUpperCase() === 'F' ? 'F' : 'M';
    const state = {
      mode: 'eco',
      section: sectionsById.has(String(initialPayload.section || ''))
        ? String(initialPayload.section)
        : 'atrio_sinistro',
      sex: defaultSex,
      values: { ...initialValues },
      summary: {},
      reportText: '',

      bullEyeSegments: initialPayload.bull_eye_segments &amp;&amp; typeof initialPayload.bull_eye_segments === 'object' ? { ...initialPayload.bull_eye_segments } : null,
      bullEyeReport: String(initialPayload.bull_eye_report || '').trim(),

    const getBullEyeIntegration = () => (window.EchoBullEye &amp;&amp; typeof window.EchoBullEye.getState === 'function'

      const bull = getBullEyeIntegration();
      if (!bull) return narratives;
      const reportText = String(bull.getReportText?.() || state.bullEyeReport || '').trim();
      if (!reportText) return narratives;
      narratives.push({ title: 'Cinesi segmentaria', text: reportText });
      return narratives;

      const visibleSections = getSectionsForMode(state.mode);
      if (!visibleSections.length) return;
      const valid = visibleSections.some((section) => section.id === state.section);
      if (!valid) {
        state.section = visibleSections[0].id;
      }
    };

    const syncSectionControls = (
      completedSections = new Set(),
      hasSelectedSections = false,
      sectionIssues = new Map(),
    ) => {
      ensureValidSectionForMode();
      const visibleSections = getSectionsForMode(state.mode);

      sectionsNav.innerHTML = '';
      visibleSections.forEach((section) => {
        const isActive = hasSelectedSections &amp;&amp; section.id === state.section;
        const isSelected = state.selectedSections.has(section.id);
        const isComplete = completedSections.has(section.id);
        const issue = sectionIssues.get(section.id) || { missing: [], invalid: [] };
        const isMissing = isSelected &amp;&amp; ((issue.missing?.length || 0) > 0 || (issue.invalid?.length || 0) > 0);

        const item = document.createElement('div');
        item.className = [
          'eco-pro-section-item',
          isActive ? 'is-active' : '',
          isSelected ? 'is-selected' : '',
          isComplete ? 'is-complete' : '',
          isMissing ? 'is-missing' : '',
        ].filter(Boolean).join(' ');

        const button = document.createElement('button');
        button.type = 'button';
        const classes = ['eco-pro-section-chip'];
        if (isActive) classes.push('is-active');
        if (isSelected) classes.push('is-selected');
        if (isComplete) classes.push('is-complete');
        if (isMissing) classes.push('is-missing');
        button.className = classes.join(' ');
        button.textContent = section.title;
        button.addEventListener('click', () => {
          if (section.id !== EXTRA_SECTION_ID) {
            state.selectedSections.add(section.id);
          }
          state.section = section.id;
          render();
        });

        item.appendChild(button);

        if (section.id !== EXTRA_SECTION_ID) {
          const toggle = document.createElement('label');
          toggle.className = 'eco-pro-switch';

          const toggleInput = document.createElement('input');
          toggleInput.type = 'checkbox';
          toggleInput.checked = isSelected;
          toggleInput.setAttribute('aria-label', `Seleziona ${section.title} per il referto`);
          toggleInput.addEventListener('click', (event) => {
            event.stopPropagation();
          });
          toggleInput.addEventListener('change', () => {
            if (toggleInput.checked) {
              state.selectedSections.add(section.id);
              state.section = section.id;
            } else {
              state.selectedSections.delete(section.id);
              if (state.section === section.id) {
                const firstSelected = visibleSections
                  .map((currentSection) => currentSection.id)
                  .find((sectionId) => state.selectedSections.has(sectionId));
                if (firstSelected) {
                  state.section = firstSelected;
                }
              }
            }
            render();
          });

          const slider = document.createElement('span');
          slider.className = 'eco-pro-switch-slider';

          toggle.appendChild(toggleInput);
          toggle.appendChild(slider);
          item.appendChild(toggle);
        }

        sectionsNav.appendChild(item);
      });

      AS_DVI: ['VTI LVOT', 'AoV VTI'],
      PrAV_DVI: ['VTI LVOT', 'PrAV VTI'],
      PrAV_EOA_cm2: ['Diametro LVOT', 'VTI LVOT', 'PrAV VTI'],
      PrAV_EOAi: ['PrAV EOA', 'Altezza', 'Peso'],
      PrAV_ATET: ['PrAV AT', 'PrAV ET'],
      PrMV_DVIinv: ['PrMV VTI', 'VTI LVOT'],
      PrMV_EOA_cm2: ['Stroke Volume', 'PrMV VTI'],
      PrMV_EOAi: ['PrMV EOA', 'Altezza', 'Peso'],
      eGFR_ckdepi: ['Creatinina', 'Età visita', 'Sesso visita'],
      CrCl_cg: ['Creatinina', 'Età visita', 'Peso visita', 'Sesso visita'],
      CrCl_cg_bsa: ['Clearance Cockcroft-Gault', 'Altezza', 'Peso'],
      LDL_auto: ['Colesterolo totale', 'HDL', 'Trigliceridi'],
      QTc_bazett: ['QT', 'Frequenza cardiaca visita'],
      QTc_fridericia: ['QT', 'Frequenza cardiaca visita'],
      QTc_framingham: ['QT', 'Frequenza cardiaca visita'],
      QTc_hodges: ['QT', 'Frequenza cardiaca visita'],
    };

    const fieldsById = new Map();
    sectionList.forEach((section) => {
      (section.fields || []).forEach((field) => {
        fieldsById.set(field.id, field);
      });
    });
    Object.keys(state.values || {}).forEach((fieldId) => {
      if (!fieldsById.has(fieldId)) {
        delete state.values[fieldId];
        return;
      }
      const field = fieldsById.get(fieldId);
      if (field?.auto) {
        // Auto fields are always recomputed and must never be manually persisted.
        delete state.values[fieldId];
      }
    });

    const UNIT_LIMITS = {
      cm: { min: 0.1, max: 20 },
      mm: { min: 1, max: 150 },
      'cm/s': { min: 1, max: 300 },
      'm/s': { min: 0.1, max: 8 },
      mL: { min: 1, max: 1200 },
      'mL/m2': { min: 1, max: 500 },
      g: { min: 1, max: 900 },
      'g/m2': { min: 1, max: 400 },
      '%': { min: 0, max: 100 },
      mmHg: { min: 0, max: 300 },
      ms: { min: 20, max: 1500 },
      'L/min': { min: 0.1, max: 25 },
      'L/min/m2': { min: 0.1, max: 15 },
      'cm2': { min: 0.05, max: 10 },
      'cm2/m2': { min: 0.05, max: 5 },
      'mm/m2': { min: 1, max: 60 },
      '-': { min: 0, max: 10 },
      'mg/dL': { min: 0.1, max: 2000 },
      'mL/min/1.73m2': { min: 1, max: 200 },
      'mL/min': { min: 1, max: 250 },
    };

    const FIELD_LIMITS = {
      LVIDd_mm: { min: 20, max: 80 },
      IVSd_mm: { min: 4, max: 25 },
      PWd_mm: { min: 4, max: 25 },
      LVEDV_ml: { min: 20, max: 500 },
      LVESV_ml: { min: 5, max: 450 },
      LVEF: { min: 5, max: 85 },
      E_cm_s: { min: 10, max: 250 },
      A_cm_s: { min: 10, max: 220 },
      septal_eprime: { min: 2, max: 30 },
      lateral_eprime: { min: 2, max: 35 },
      TRV: { min: 0.5, max: 6.5 },
      LVEF_DIA: { min: 5, max: 85 },
      LVOTd_cm: { min: 1, max: 4 },
      LVOT_VTI_cm: { min: 4, max: 60 },
      LA_vol_ml: { min: 10, max: 350 },
      RVOT_PLAX_mm: { min: 8, max: 60 },
      RVOT_PSAX_mm: { min: 8, max: 60 },
      RVD1_basal_mm: { min: 10, max: 80 },
      RVD2_mid_mm: { min: 8, max: 70 },
      RVD3_long_mm: { min: 30, max: 130 },
      RV_area_diastolic_cm2: { min: 5, max: 80 },
      RV_area_systolic_cm2: { min: 2, max: 70 },
      TAPSE_mm: { min: 5, max: 40 },
      Sprime_TDI_cm_s: { min: 2, max: 25 },
      FAC_pct: { min: 5, max: 80 },
      RVEF_pct: { min: 5, max: 80 },
      IVC_diam_cm: { min: 0.3, max: 4.5 },
      IVC_sniff_cm: { min: 0, max: 4.5 },
      TRVmax_ms: { min: 0.5, max: 6.5 },
      PR_earlyVmax_ms: { min: 0.2, max: 5.5 },
      AoV_Vmax_ms: { min: 0.5, max: 7 },
      AoV_meanPG_mmhg: { min: 0, max: 120 },
      AVA_cm2: { min: 0.05, max: 6 },
      AoV_VTI_cm: { min: 2, max: 220 },
      AR_VCW_cm: { min: 0, max: 2 },
      AR_EROA_cm2: { min: 0, max: 1.2 },
      AR_RegVol_ml: { min: 0, max: 220 },
      AR_RF_pct: { min: 0, max: 100 },
      AR_PHT_ms: { min: 50, max: 1200 },
      MVA_cm2: { min: 0.05, max: 6 },
      MV_meanPG_mmhg: { min: 0, max: 50 },
      MR_VCW_cm: { min: 0, max: 2 },
      MR_EROA_cm2: { min: 0, max: 1.2 },
      MR_RegVol_ml: { min: 0, max: 220 },
      MR_RF_pct: { min: 0, max: 100 },
      TS_meanPG_mmhg: { min: 0, max: 40 },
      TS_VTI_cm: { min: 2, max: 250 },
      TS_PHT_ms: { min: 20, max: 1200 },
      TrVA_cm2: { min: 0.05, max: 10 },
      TR_VCW_cm: { min: 0, max: 2 },
      TR_EROA_cm2: { min: 0, max: 1.2 },
      TR_RegVol_ml: { min: 0, max: 220 },
      PV_Vmax_ms: { min: 0.2, max: 7 },
      PV_maxPG_mmhg: { min: 0, max: 150 },
      PR_RF_pct: { min: 0, max: 100 },
      PR_index: { min: 0, max: 2 },
      PrAV_Vmax_ms: { min: 0.5, max: 7 },
      PrAV_meanPG_mmhg: { min: 0, max: 120 },
      PrAV_VTI_cm: { min: 2, max: 250 },
      PrAV_AT_ms: { min: 20, max: 700 },
      PrAV_ET_ms: { min: 50, max: 700 },
      PrAV_baseline_meanPG: { min: 0, max: 120 },
      PrAV_baseline_DVI: { min: 0.05, max: 2 },
      PrMV_E_ms: { min: 0.2, max: 4.5 },
      PrMV_meanPG_mmhg: { min: 0, max: 50 },
      PrMV_VTI_cm: { min: 2, max: 300 },
      PrMV_PHT_ms: { min: 20, max: 1200 },
      creatinina_mg_dl: { min: 0.2, max: 20 },
      CT_total: { min: 50, max: 500 },
      HDL: { min: 10, max: 150 },
      TG: { min: 20, max: 1500 },
      QT_ms: { min: 200, max: 700 },
    };

    const getFieldLimits = (fieldId) => {
      if (FIELD_LIMITS[fieldId]) return FIELD_LIMITS[fieldId];
      const field = fieldsById.get(fieldId);
      if (!field || field.type === 'select') return null;
      const unitKey = String(field.unit || '').trim();
      if (!unitKey) return null;
      return UNIT_LIMITS[unitKey] || null;
    };

    const formatRangeLabel = (fieldId) => {
      const limits = getFieldLimits(fieldId);
      const field = fieldsById.get(fieldId);
      if (!limits) return '';
      const minText = formatNum(limits.min, 2);
      const maxText = formatNum(limits.max, 2);
      const unitText = field?.unit &amp;&amp; field.unit !== '-' ? ` ${field.unit}` : '';
      return `${minText}-${maxText}${unitText}`;
    };

    const validateFieldNumber = (fieldId, numericValue) => {
      const limits = getFieldLimits(fieldId);
      if (!limits || numericValue === null || numericValue === undefined) {
        return { valid: true, reason: '' };
      }
      if (Number.isNaN(Number(numericValue))) {
        return { valid: false, reason: 'Formato numerico non valido' };
      }
      if (numericValue < limits.min || numericValue > limits.max) {
        return { valid: false, reason: `Fuori range (${formatRangeLabel(fieldId)})` };
      }
      return { valid: true, reason: '' };
    };

    const getFieldValidationState = (fieldId) => {
      const field = fieldsById.get(fieldId);
      if (!field || field.auto || field.type === 'select') {
        return { valid: true, empty: true, parsed: null, reason: '' };
      }
      const raw = state.values[fieldId];
      if (raw === null || raw === undefined || String(raw).trim() === '') {
        return { valid: true, empty: true, parsed: null, reason: '' };
      }
      const parsed = parseNum(raw);
      if (parsed === null) {
        return { valid: false, empty: false, parsed: null, reason: 'Formato numerico non valido' };
      }
      const check = validateFieldNumber(fieldId, parsed);
      return { valid: check.valid, empty: false, parsed, reason: check.reason };
    };

    const rangeMatch = (value, range) => {
      if (value === null || value === undefined) return false;
      const minOk = range.min === null || value >= range.min;
      const maxOk = range.max === null || value <= range.max;
      return minOk &amp;&amp; maxOk;
    };

    const classifyRanges = (value, ranges) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return 'NA';
      for (const range of ranges || []) {
        if (rangeMatch(value, range)) {
          return range.label;
        }
      }
      return 'NA';
    };

    const computeDerived = () => {
      const globals = readGlobalContext();
      const get = (id) => {
        const parsed = parseNum(state.values[id]);
        if (parsed === null) return null;
        const validation = validateFieldNumber(id, parsed);
        return validation.valid ? parsed : null;
      };
      const derived = {};
      const statuses = {};
      const summaries = {};

      const sex = state.sex === 'F' ? 'F' : 'M';
      const bsa = globals.bsa;
      const lviddMm = get('LVIDd_mm');
      const ivsdMm = get('IVSd_mm');
      const pwdMm = get('PWd_mm');
      const lvidd = lviddMm !== null ? lviddMm / 10 : null;
      const ivsd = ivsdMm !== null ? ivsdMm / 10 : null;
      const pwd = pwdMm !== null ? pwdMm / 10 : null;
      const lvedv = get('LVEDV_ml');
      const lvesv = get('LVESV_ml');
      const lvefInput = get('LVEF');

      if (lviddMm !== null &amp;&amp; bsa) derived.LVIDd_i_mm_m2 = lviddMm / bsa;
      if (pwd !== null &amp;&amp; lvidd) derived.RWT = (2 * pwd) / lvidd;
      if (ivsd !== null &amp;&amp; lvidd !== null &amp;&amp; pwd !== null) {
        derived.LVM_g = (0.8 * 1.04 * (Math.pow(ivsd + lvidd + pwd, 3) - Math.pow(lvidd, 3))) + 0.6;
      }
      if (derived.LVM_g !== undefined &amp;&amp; bsa) derived.LV_mass_gm2 = derived.LVM_g / bsa;
      if (lvedv !== null &amp;&amp; bsa) derived.LVEDVi_ml_m2 = lvedv / bsa;
      if (lvesv !== null &amp;&amp; bsa) derived.LVESVi_ml_m2 = lvesv / bsa;
      if (lvedv !== null &amp;&amp; lvesv !== null &amp;&amp; lvedv > 0) {
        derived.LVEF_from_vol = ((lvedv - lvesv) / lvedv) * 100;
      }

      const lvmi = derived.LV_mass_gm2 ?? get('LV_mass_gm2');
      const rwt = derived.RWT ?? get('RWT');
      const lvmiCutoff = sex === 'F' ? 95 : 115;
      if (lvmi !== null &amp;&amp; rwt !== null) {
        const lvmiElevated = lvmi > lvmiCutoff;
        let geometry = 'Geometria normale';
        if (!lvmiElevated &amp;&amp; rwt > 0.42) geometry = 'Rimodellamento concentrico';
        if (lvmiElevated &amp;&amp; rwt > 0.42) geometry = 'Ipertrofia concentrica';
        if (lvmiElevated &amp;&amp; rwt <= 0.42) geometry = 'Ipertrofia eccentrica';
        summaries.ventricolo_sinistro = `${geometry} (LVMi ${formatNum(lvmi, 1)} g/m2, RWT ${formatNum(rwt, 2)})`;
      } else {
        summaries.ventricolo_sinistro = 'Geometria VS: dati insufficienti';
      }
      statuses.LV_mass_gm2 = lvmi !== null ? (lvmi > lvmiCutoff ? 'Elevato' : 'Normale') : 'NA';
      statuses.RWT = rwt !== null ? (rwt > 0.42 ? 'Aumentato' : 'Normale') : 'NA';
      statuses.LVEF_from_vol = derived.LVEF_from_vol !== undefined
        ? (derived.LVEF_from_vol < 50 ? 'Ridotta' : 'Preservata')
        : 'NA';

      const E = get('E_cm_s');
      const A = get('A_cm_s');
      if (E !== null &amp;&amp; A !== null &amp;&amp; A !== 0) derived.EA = E / A;
      const septal = get('septal_eprime');
      const lateral = get('lateral_eprime');
      let eprimeAvg = null;
      if (septal !== null &amp;&amp; lateral !== null) {
        eprimeAvg = (septal + lateral) / 2;
      } else if (septal !== null) {
        eprimeAvg = septal;
      } else if (lateral !== null) {
        eprimeAvg = lateral;
      }
      if (E !== null &amp;&amp; eprimeAvg !== null &amp;&amp; eprimeAvg !== 0) {
        derived.avg_Ee = E / eprimeAvg;
      }
      const laVolForDia = get('LA_vol_ml');
      const laviFromLa = laVolForDia !== null &amp;&amp; bsa ? laVolForDia / bsa : null;
      if (laviFromLa !== null) {
        derived.LAVI_auto = laviFromLa;
      }
      const LAVI = laviFromLa;
      const TRV = get('TRV');
      const lvefDia = get('LVEF_DIA') ?? lvefInput ?? (derived.LVEF_from_vol ?? null);
      if (lvefDia !== null) {
        const normalEfCutoff = sex === 'F' ? 54 : 52;
        const hasNormalEf = lvefDia > normalEfCutoff;

        const eprimeAvail = septal !== null || lateral !== null;
        const eprimeAbn = eprimeAvail &amp;&amp; ((septal !== null &amp;&amp; septal < 7) || (lateral !== null &amp;&amp; lateral < 10));
        const eeValue = derived.avg_Ee ?? get('avg_Ee');
        const eeAvail = eeValue !== null;
        const eeAbn = eeAvail &amp;&amp; eeValue > 14;
        const trvAvail = TRV !== null;
        const trvAbn = trvAvail &amp;&amp; TRV > 2.8;
        const laviAvail = LAVI !== null;
        const laviAbn = laviAvail &amp;&amp; LAVI > 34;
        const availability = [eprimeAvail, eeAvail, trvAvail, laviAvail].filter(Boolean).length;
        const positives = [eprimeAbn, eeAbn, trvAbn, laviAbn].filter(Boolean).length;
        const midsAvail = [eeAvail, trvAvail, laviAvail].filter(Boolean).length;
        const midsPos = [eeAbn, trvAbn, laviAbn].filter(Boolean).length;
        const hasMitralInflow = E !== null &amp;&amp; derived.EA !== undefined;

        let diaSummary = 'Normale';

        if (hasNormalEf) {
          if (availability < 2) {
            diaSummary = 'Funzione diastolica indeterminata (criteri insufficienti)';
          } else if (positives <= 1) {
            diaSummary = 'Normale';
          } else if (positives >= 3) {
            diaSummary = 'Disfunzione diastolica presente';
          } else {
            diaSummary = 'Disfunzione diastolica indeterminata';
          }

          if (diaSummary === 'Disfunzione diastolica presente' &amp;&amp; hasMitralInflow) {
            if (derived.EA <= 0.8 &amp;&amp; E <= 50) {
              diaSummary = 'Disfunzione diastolica grado I';
            } else if (derived.EA >= 2.0) {
              diaSummary = 'Disfunzione diastolica grado III';
            } else if (midsAvail >= 2) {
              diaSummary = midsPos >= 2 ? 'Disfunzione diastolica grado II' : 'Disfunzione diastolica grado I';
            } else {
              diaSummary = 'Disfunzione diastolica indeterminata';
            }
          }
        } else {
          if (!hasMitralInflow) {
            diaSummary = 'Funzione diastolica: dati insufficienti';
          } else if (derived.EA <= 0.8 &amp;&amp; E <= 50) {
            diaSummary = 'Disfunzione diastolica grado I';
          } else if (derived.EA >= 2.0) {
            diaSummary = 'Disfunzione diastolica grado III';
          } else if (midsAvail >= 2) {
            if (midsPos >= 2) {
              diaSummary = 'Disfunzione diastolica grado II';
            } else if (midsPos === 0) {
              diaSummary = 'Disfunzione diastolica grado I';
            } else {
              diaSummary = 'LAP e grado di disfunzione diastolica non determinabili';
            }
          } else {
            diaSummary = 'LAP e grado di disfunzione diastolica non determinabili';
          }
        }

        summaries.diastolica = diaSummary;
        statuses.avg_Ee = (derived.avg_Ee ?? get('avg_Ee')) !== null
          ? ((derived.avg_Ee ?? get('avg_Ee')) > 14 ? 'Elevato' : 'Normale')
          : 'NA';
      } else {
        summaries.diastolica = 'Funzione diastolica: dati insufficienti';
      }

      const lvotd = get('LVOTd_cm');
      const lvotVti = get('LVOT_VTI_cm');
      const hr = globals.fc;
      if (lvotd !== null &amp;&amp; lvotVti !== null) {
        const csa = Math.PI * Math.pow(lvotd / 2, 2);
        derived.SV_ml = csa * lvotVti;
        if (hr !== null) derived.CO_Lmin = (derived.SV_ml * hr) / 1000;
        if (bsa) {
          derived.SVI_ml_m2 = derived.SV_ml / bsa;
          if (derived.CO_Lmin !== undefined) derived.CI_Lmin_m2 = derived.CO_Lmin / bsa;
        }
      }
      summaries.emodinamica = derived.SV_ml !== undefined
        ? `SV ${formatNum(derived.SV_ml, 1)} mL; CO ${formatNum(derived.CO_Lmin, 2)} L/min; SVI ${formatNum(derived.SVI_ml_m2, 1)} mL/m2; CI ${formatNum(derived.CI_Lmin_m2, 2)} L/min/m2`
        : 'Emodinamica: dati insufficienti';

      const laVol = get('LA_vol_ml');
      if (laVol !== null &amp;&amp; bsa) derived.LAVI_auto = laVol / bsa;
      const laviAuto = derived.LAVI_auto ?? null;
      if (laviAuto !== null) {
        const laviGrade = classifyRanges(laviAuto, [
          { label: 'Normale', min: null, max: 34 },
          { label: 'Lieve', min: 35, max: 41 },
          { label: 'Moderata', min: 42, max: 48 },
          { label: 'Severa', min: 48.0001, max: null },
        ]);
        statuses.LAVI_auto = laviGrade;
        summaries.atrio_sinistro = `LAVi ${formatNum(laviAuto, 1)} mL/m2 (${laviGrade})`;
      } else {
        summaries.atrio_sinistro = 'Atrio sinistro: dati insufficienti';
      }

      const rvRanges = {
        RVD1_basal_mm: [{ label: 'Normale', min: 25, max: 41 }, { label: 'Anomalo', min: null, max: 24.99 }, { label: 'Anomalo', min: 41.01, max: null }],
        RVD2_mid_mm: [{ label: 'Normale', min: 19, max: 35 }, { label: 'Anomalo', min: null, max: 18.99 }, { label: 'Anomalo', min: 35.01, max: null }],
        RVD3_long_mm: [{ label: 'Normale', min: 59, max: 83 }, { label: 'Anomalo', min: null, max: 58.99 }, { label: 'Anomalo', min: 83.01, max: null }],
      };
      Object.keys(rvRanges).forEach((fieldId) => {
        const value = get(fieldId);
        statuses[fieldId] = classifyRanges(value, rvRanges[fieldId]);
      });
      const rvotPlax = get('RVOT_PLAX_mm');
      const rvotPsax = get('RVOT_PSAX_mm');
      if (rvotPlax !== null &amp;&amp; bsa) derived.RVOT_PLAX_i_mm_m2 = rvotPlax / bsa;
      if (rvotPsax !== null &amp;&amp; bsa) derived.RVOT_PSAX_i_mm_m2 = rvotPsax / bsa;
      const rvAreaDiastolic = get('RV_area_diastolic_cm2');
      const rvAreaSystolic = get('RV_area_systolic_cm2');
      const hasInvalidRvAreas = rvAreaDiastolic !== null &amp;&amp; rvAreaSystolic !== null &amp;&amp; rvAreaSystolic > rvAreaDiastolic;
      if (
        rvAreaDiastolic !== null
        &amp;&amp; rvAreaSystolic !== null
        &amp;&amp; rvAreaDiastolic > 0
        &amp;&amp; rvAreaSystolic <= rvAreaDiastolic
      ) {
        derived.FAC_pct = ((rvAreaDiastolic - rvAreaSystolic) / rvAreaDiastolic) * 100;
      }
      const tapse = get('TAPSE_mm');
      const sTdi = get('Sprime_TDI_cm_s');
      const fac = derived.FAC_pct ?? get('FAC_pct');
      const rvef = get('RVEF_pct');
      const rvotPlaxIdx = derived.RVOT_PLAX_i_mm_m2 ?? null;
      const rvotPsaxIdx = derived.RVOT_PSAX_i_mm_m2 ?? null;
      statuses.TAPSE_mm = tapse !== null ? (tapse < 17 ? 'Anomalo' : 'Normale') : 'NA';
      statuses.Sprime_TDI_cm_s = sTdi !== null ? (sTdi < 9.5 ? 'Anomalo' : 'Normale') : 'NA';
      statuses.RVOT_PLAX_i_mm_m2 = rvotPlax !== null &amp;&amp; !bsa
        ? 'Serve BSA'
        : (rvotPlaxIdx !== null ? (rvotPlaxIdx > 19 ? 'Anomalo' : 'Normale') : 'NA');
      statuses.RVOT_PSAX_i_mm_m2 = rvotPsax !== null &amp;&amp; !bsa
        ? 'Serve BSA'
        : (rvotPsaxIdx !== null ? (rvotPsaxIdx > 21 ? 'Anomalo' : 'Normale') : 'NA');
      statuses.FAC_pct = hasInvalidRvAreas
        ? 'Area sistolica > diastolica'
        : (fac !== null ? (fac < 35 ? 'Anomalo' : 'Normale') : 'NA');
      statuses.RVEF_pct = rvef !== null ? (rvef < 45 ? 'Anomalo' : 'Normale') : 'NA';
      const rvotSummary = [
        rvotPlaxIdx !== null ? `RVOT PLAXi ${formatNum(rvotPlaxIdx, 1)} mm/m2 (${statuses.RVOT_PLAX_i_mm_m2})` : '',
        rvotPsaxIdx !== null ? `RVOT PSAXi ${formatNum(rvotPsaxIdx, 1)} mm/m2 (${statuses.RVOT_PSAX_i_mm_m2})` : '',
      ].filter(Boolean).join('; ');
      const rvFuncSummary = [
        `TAPSE ${formatNum(tapse, 1) || '-'} mm (${statuses.TAPSE_mm || 'NA'})`,
        hasInvalidRvAreas
          ? 'FAC non calcolabile (area sistolica > diastolica)'
          : `FAC ${formatNum(fac, 1) || '-'} % (${statuses.FAC_pct || 'NA'})`,
      ].filter(Boolean).join('; ');
      summaries.ventricolo_destro = [rvotSummary, rvFuncSummary].filter(Boolean).join('; ') || 'Ventricolo destro: dati insufficienti';

      const ivcDiam = get('IVC_diam_cm');
      const ivcSniff = get('IVC_sniff_cm');
      if (ivcDiam !== null &amp;&amp; ivcSniff !== null &amp;&amp; ivcDiam > 0) {
        derived.IVC_collapse_pct = ((ivcDiam - ivcSniff) / ivcDiam) * 100;
      }
      const collapse = derived.IVC_collapse_pct ?? get('IVC_collapse_pct');
      if (ivcDiam !== null &amp;&amp; collapse !== null) {
        if (ivcDiam <= 2.1 &amp;&amp; collapse >= 50) derived.RAP_mmHg = 3;
        else if (ivcDiam > 2.1 &amp;&amp; collapse < 50) derived.RAP_mmHg = 15;
        else derived.RAP_mmHg = 8;
      }
      const rap = derived.RAP_mmHg ?? get('RAP_mmHg');
      const trvmax = get('TRVmax_ms');
      if (trvmax !== null &amp;&amp; rap !== null) derived.RVSP_mmHg = (4 * trvmax * trvmax) + rap;
      const prEarly = get('PR_earlyVmax_ms');
      if (prEarly !== null &amp;&amp; rap !== null) derived.mPAP_mmHg = (4 * prEarly * prEarly) + rap;
      summaries.pressioni_destre = rap !== null
        ? `RAP ${formatNum(rap, 0)} mmHg; RVSP ${formatNum(derived.RVSP_mmHg, 1)} mmHg; mPAP ${formatNum(derived.mPAP_mmHg, 1)} mmHg`
        : 'Pressioni destre: dati insufficienti';
      statuses.RVSP_mmHg = derived.RVSP_mmHg !== undefined
        ? (derived.RVSP_mmHg > 35 ? 'Elevato' : 'Normale')
        : 'NA';

      const lvotVtiForValves = lvotVti;
      const aovVti = get('AoV_VTI_cm');
      if (lvotVtiForValves !== null &amp;&amp; aovVti !== null &amp;&amp; aovVti > 0) derived.AS_DVI = lvotVtiForValves / aovVti;
      const ava = get('AVA_cm2');
      if (ava !== null &amp;&amp; bsa) derived.AVAi_cm2_m2 = ava / bsa;

      const severityRank = (grade) => {
        const key = String(grade || '').toLowerCase().trim();
        if (!key || key === 'na') return -1;
        if (key.includes('assente') || key.includes('sclerosi')) return 0;
        const gradeMatch = key.match(/grado\s*([1-4])/i);
        if (gradeMatch) return Number(gradeMatch[1]);
        if (key.includes('severe') || key.includes('severa')) return 4;
        if (key.includes('moderate') || key.includes('moderata')) return 3;
        if (key.includes('mild') || key.includes('lieve')) return 2;
        if (key.includes('normale') || key.includes('ok')) return 1;
        if (key.includes('sospetta') || key.includes('sospetto')) return 3;
        return 0;
      };
      const pickWorst = (grades) => {
        let worst = 'NA';
        let worstRank = -1;
        (grades || []).forEach((current) => {
          const currentRank = severityRank(current);
          if (currentRank > worstRank) {
            worstRank = currentRank;
            worst = current;
          }
        });
        return worst;
      };

      const asScores = [];
      const asVmax = get('AoV_Vmax_ms');
      if (asVmax !== null) {
        if (asVmax >= 4) asScores.push(3);
        else if (asVmax >= 3) asScores.push(2);
        else if (asVmax >= 2.6) asScores.push(1);
        else asScores.push(0);
      }
      const asMean = get('AoV_meanPG_mmhg');
      if (asMean !== null) {
        if (asMean >= 40) asScores.push(3);
        else if (asMean >= 20) asScores.push(2);
        else asScores.push(1);
      }
      if (ava !== null) {
        if (ava < 1) asScores.push(3);
        else if (ava <= 1.5) asScores.push(2);
        else asScores.push(1);
      }
      const avai = derived.AVAi_cm2_m2 ?? get('AVAi_cm2_m2');
      if (avai !== null) {
        if (avai < 0.6) asScores.push(3);
        else if (avai <= 0.85) asScores.push(2);
        else asScores.push(1);
      }
      const asDvi = derived.AS_DVI ?? get('AS_DVI');
      if (asDvi !== null) {
        if (asDvi < 0.25) asScores.push(3);
        else if (asDvi <= 0.5) asScores.push(2);
        else asScores.push(1);
      }
      const asMap = ['Assente', 'Lieve', 'Moderata', 'Severa'];
      const asWorst = asScores.length ? asMap[Math.max(...asScores)] : 'NA';
      statuses.AS_DVI = asWorst;

      const aiGrades = [];
      const arEroa = get('AR_EROA_cm2');
      if (arEroa !== null) {
        if (arEroa >= 0.30) aiGrades.push('Severa');
        else if (arEroa >= 0.20) aiGrades.push('Moderata');
        else aiGrades.push('Lieve');
      }
      const arVol = get('AR_RegVol_ml');
      if (arVol !== null) {
        if (arVol >= 60) aiGrades.push('Severa');
        else if (arVol >= 45) aiGrades.push('Moderata');
        else aiGrades.push('Lieve');
      }
      const arRf = get('AR_RF_pct');
      if (arRf !== null) {
        if (arRf >= 50) aiGrades.push('Severa');
        else if (arRf >= 40) aiGrades.push('Moderata');
        else aiGrades.push('Lieve');
      }
      const arVc = get('AR_VCW_cm');
      if (arVc !== null) {
        if (arVc > 0.6) aiGrades.push('Severa');
        else if (arVc >= 0.3) aiGrades.push('Moderata');
        else aiGrades.push('Lieve');
      }
      const arPht = get('AR_PHT_ms');
      if (arPht !== null) {
        if (arPht < 200) aiGrades.push('Severa');
        else if (arPht <= 500) aiGrades.push('Moderata');
        else aiGrades.push('Lieve');
      }
      const aiWorst = pickWorst(aiGrades);
      summaries.valvola_aortica = `Stenosi aortica: ${asWorst}; Insufficienza aortica: ${aiWorst}`;

      const mva = get('MVA_cm2');
      const mvMean = get('MV_meanPG_mmhg');
      let msGrade = 'NA';
      if (mva !== null || mvMean !== null) {
        const byMva = mva === null ? 'NA' : (mva < 1 ? 'Severa' : (mva <= 1.5 ? 'Moderata' : 'Lieve'));
        const byPg = mvMean === null ? 'NA' : (mvMean > 10 ? 'Severa' : (mvMean >= 5 ? 'Moderata' : 'Lieve'));
        msGrade = pickWorst([byMva, byPg]);
      }
      const mrGrades = [];
      const mrEroa = get('MR_EROA_cm2');
      if (mrEroa !== null) {
        if (mrEroa >= 0.40) mrGrades.push('Severa');
        else if (mrEroa >= 0.30) mrGrades.push('Moderata');
        else mrGrades.push('Lieve');
      }
      const mrVol = get('MR_RegVol_ml');
      if (mrVol !== null) {
        if (mrVol >= 60) mrGrades.push('Severa');
        else if (mrVol >= 45) mrGrades.push('Moderata');
        else mrGrades.push('Lieve');
      }
      const mrRf = get('MR_RF_pct');
      if (mrRf !== null) {
        if (mrRf >= 50) mrGrades.push('Severa');
        else if (mrRf >= 40) mrGrades.push('Moderata');
        else mrGrades.push('Lieve');
      }
      const mrVc = get('MR_VCW_cm');
      if (mrVc !== null) {
        if (mrVc > 0.7) mrGrades.push('Severa');
        else if (mrVc >= 0.3) mrGrades.push('Moderata');
        else mrGrades.push('Lieve');
      }
      summaries.valvola_mitralica = `Stenosi mitralica: ${msGrade}; Insufficienza mitralica: ${pickWorst(mrGrades)}`;

      const tsMean = get('TS_meanPG_mmhg');
      const tsVti = get('TS_VTI_cm');
      const tsPht = get('TS_PHT_ms');
      const trva = get('TrVA_cm2');
      const tsSuspicious = (
        (tsMean !== null &amp;&amp; tsMean >= 5) ||
        (tsVti !== null &amp;&amp; tsVti > 60) ||
        (tsPht !== null &amp;&amp; tsPht >= 190) ||
        (trva !== null &amp;&amp; trva <= 1)
      );
      const trGrades = [];
      const trVc = get('TR_VCW_cm');
      if (trVc !== null) {
        if (trVc > 0.7) trGrades.push('Severa');
        else if (trVc >= 0.3) trGrades.push('Moderata');
        else trGrades.push('Lieve');
      }
      const trEroa = get('TR_EROA_cm2');
      if (trEroa !== null) {
        if (trEroa >= 0.40) trGrades.push('Severa');
        else if (trEroa >= 0.20) trGrades.push('Moderata');
        else trGrades.push('Lieve');
      }
      const trVol = get('TR_RegVol_ml');
      if (trVol !== null) {
        if (trVol >= 45) trGrades.push('Severa');
        else if (trVol >= 30) trGrades.push('Moderata');
        else trGrades.push('Lieve');
      }
      summaries.valvola_tricuspide = `Stenosi tricuspide: ${tsSuspicious ? 'Sospetta' : 'Non sospetta'}; Insufficienza tricuspide: ${pickWorst(trGrades)}`;

      const pvVmax = get('PV_Vmax_ms');
      const pvMaxPg = get('PV_maxPG_mmhg');
      let psGrade = 'NA';
      if (pvVmax !== null || pvMaxPg !== null) {
        const byV = pvVmax === null ? 'NA' : (pvVmax > 4 ? 'Severa' : (pvVmax >= 3 ? 'Moderata' : 'Lieve'));
        const byPg = pvMaxPg === null ? 'NA' : (pvMaxPg > 64 ? 'Severa' : (pvMaxPg >= 36 ? 'Moderata' : 'Lieve'));
        psGrade = pickWorst([byV, byPg]);
      }
      const prRf = get('PR_RF_pct');
      const prIndex = get('PR_index');
      let prGrade = 'NA';
      if (prRf !== null) {
        prGrade = prRf >= 40 ? 'Significativa' : 'Lieve';
      } else if (prIndex !== null) {
        prGrade = prIndex < 0.77 ? 'Significativa' : 'Lieve';
      }
      summaries.valvola_polmonare = `Stenosi polmonare: ${psGrade}; Insufficienza polmonare: ${prGrade}`;
