function preciseTool(){setTimeout(()=>details(`<p>Modulo pratico orientativo. Il PRECISE-DAPT completo richiede regressione/formula dedicata con età, clearance creatinina, Hb, leucociti e bleeding history.</p><table class=&quot;table&quot;><tr><th>Variabile chiave</th></tr><tr><td>Età</td></tr><tr><td>Clearance creatinina</td></tr><tr><td>Emoglobina</td></tr><tr><td>Leucociti</td></tr><tr><td>Pregresso sanguinamento</td></tr></table>`),0);return shell(&quot;PRECISE-DAPT&quot;,&quot;Promemoria dettagliato delle variabili richieste.&quot;,[&quot;SCA&quot;,&quot;Antitrombotici&quot;],`<form id=&quot;f_precise&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Età</label><input id=&quot;pr_age&quot; type=&quot;number&quot; step=&quot;1&quot; /></div><div class=&quot;field&quot;><label>Clearance creatinina (mL/min)</label><input id=&quot;pr_crcl&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>Emoglobina (g/dL)</label><input id=&quot;pr_hb&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>Leucociti (10^9/L)</label><input id=&quot;pr_wbc&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div>${cb('pr_bleed','Pregresso sanguinamento')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcPrecise()&quot;>Valuta</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_precise')&quot;>Reset</button></div></form>`)}
function calcPrecise(){const alerts=[];if(num('pr_age')>=75)alerts.push('età avanzata');if(num('pr_crcl')&amp;&amp;num('pr_crcl')<60)alerts.push('clearance ridotta');if(num('pr_hb')&amp;&amp;num('pr_hb')<12)alerts.push('Hb bassa');if(num('pr_wbc')&amp;&amp;num('pr_wbc')>11)alerts.push('leucocitosi');if(checked('pr_bleed'))alerts.push('pregresso bleeding');setResult(`<h3>Valutazione pratica</h3><div class=&quot;interp&quot;>${alerts.length?'Fattori che spingono verso <b>maggiore rischio emorragico</b>: '+alerts.join(', ')+'.':'Nessun elemento maggiore inserito; per lo score formale serve la formula completa.'}</div>`)}
function egfrTool(){setTimeout(()=>details(`<p><b>CKD-EPI 2021 creatinina</b> (senza razza):</p><p>eGFR = 142 × min(Scr/k,1)<sup>a</sup> × max(Scr/k,1)<sup>-1.200</sup> × 0.9938<sup>Età</sup> × 1.012 [se femmina]</p><table class=&quot;table&quot;><tr><th>Sesso</th><th>k</th><th>a</th></tr><tr><td>Femmina</td><td>0.7</td><td>-0.241</td></tr><tr><td>Maschio</td><td>0.9</td><td>-0.302</td></tr></table>`),0);return shell(&quot;eGFR CKD-EPI 2021&quot;,&quot;Stima della funzione renale in mL/min/1.73m².&quot;,[&quot;Utility&quot;,&quot;Renale&quot;,&quot;Dettagli completi&quot;],`<form id=&quot;f_egfr&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Età (anni)</label><input id=&quot;eg_age&quot; type=&quot;number&quot; min=&quot;1&quot; step=&quot;1&quot; /></div><div class=&quot;field&quot;><label>Sesso</label><select id=&quot;eg_sex&quot;><option value=&quot;F&quot;>Femmina</option><option value=&quot;M&quot;>Maschio</option></select></div><div class=&quot;field full&quot;><label>Creatinina sierica (mg/dL)</label><input id=&quot;eg_scr&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; /></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcEgfr()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_egfr')&quot;>Reset</button></div></form>`)}
function calcEgfr(){const age=num('eg_age'),scr=num('eg_scr'),sex=val('eg_sex');if(!age||!scr){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci età e creatinina.</div>');return}const k=sex==='F'?0.7:0.9;const a=sex==='F'?-0.241:-0.302;const sexFactor=sex==='F'?1.012:1;const ratio=scr/k;const egfr=142*Math.pow(Math.min(ratio,1),a)*Math.pow(Math.max(ratio,1),-1.200)*Math.pow(0.9938,age)*sexFactor;let stage=egfr>=90?'G1':egfr>=60?'G2':egfr>=45?'G3a':egfr>=30?'G3b':egfr>=15?'G4':'G5';setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${egfr.toFixed(1)}</div><div class=&quot;interp&quot;>eGFR <b>${stage}</b> mL/min/1.73m².</div>`)}
function cgTool(){setTimeout(()=>details(`<p><b>Cockcroft-Gault</b>:</p><p>CrCl = ((140 − età) × peso / (72 × creatinina)) × 0.85 [se femmina]</p>`),0);return shell(&quot;Cockcroft-Gault&quot;,&quot;Stima della clearance creatinina in mL/min.&quot;,[&quot;Utility&quot;,&quot;Renale&quot;],`<form id=&quot;f_cg&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Età</label><input id=&quot;cg_age&quot; type=&quot;number&quot; step=&quot;1&quot; /></div><div class=&quot;field&quot;><label>Peso (kg)</label><input id=&quot;cg_w&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>Creatinina (mg/dL)</label><input id=&quot;cg_scr&quot; type=&quot;number&quot; step=&quot;0.01&quot; /></div><div class=&quot;field&quot;><label>Sesso</label><select id=&quot;cg_sex&quot;><option value=&quot;M&quot;>Maschio</option><option value=&quot;F&quot;>Femmina</option></select></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcCg()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_cg')&quot;>Reset</button></div></form>`)}
function calcCg(){const age=num('cg_age'),w=num('cg_w'),scr=num('cg_scr');if(!age||!w||!scr){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci età, peso e creatinina.</div>');return}let crcl=((140-age)*w)/(72*scr);if(val('cg_sex')==='F')crcl*=0.85;setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${crcl.toFixed(1)}</div><div class=&quot;interp&quot;>Clearance creatinina stimata in mL/min.</div>`)}
function ldlTool(){setTimeout(()=>details(`<p><b>Formula di Friedewald</b>:</p><p>LDL = Colesterolo totale − HDL − (Trigliceridi / 5)</p><p>Validità limitata se TG elevati (tipicamente &amp;gt;400 mg/dL) o in condizioni particolari.</p>`),0);return shell(&quot;LDL Friedewald&quot;,&quot;Calcolo LDL in mg/dL.&quot;,[&quot;Utility&quot;,&quot;Lipidi&quot;],`<form id=&quot;f_ldl&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Colesterolo totale</label><input id=&quot;ldl_tc&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>HDL</label><input id=&quot;ldl_hdl&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field full&quot;><label>Trigliceridi</label><input id=&quot;ldl_tg&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcLdl()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_ldl')&quot;>Reset</button></div></form>`)}
function calcLdl(){const tc=num('ldl_tc'),hdl=num('ldl_hdl'),tg=num('ldl_tg');if(!tc||!hdl||!tg){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci colesterolo totale, HDL e trigliceridi.</div>');return}const ldl=tc-hdl-(tg/5);setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${ldl.toFixed(1)}</div><div class=&quot;interp&quot;>LDL calcolato in mg/dL.</div><div class=&quot;note&quot;>${tg>400?'Trigliceridi elevati: formula di Friedewald poco affidabile.':''}</div>`)}
function qtcTool(){setTimeout(()=>details(`<table class=&quot;table&quot;><tr><th>Formula</th><th>Espressione</th></tr><tr><td>Bazett</td><td>QT / √RR</td></tr><tr><td>Fridericia</td><td>QT / RR^(1/3)</td></tr></table><p>Inserire QT in ms e frequenza cardiaca in bpm.</p>`),0);return shell(&quot;QTc&quot;,&quot;Correzione del QT con formule di Bazett e Fridericia.&quot;,[&quot;Utility&quot;,&quot;ECG&quot;],`<form id=&quot;f_qtc&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>QT misurato (ms)</label><input id=&quot;qt_ms&quot; type=&quot;number&quot; step=&quot;1&quot; /></div><div class=&quot;field&quot;><label>Frequenza cardiaca (bpm)</label><input id=&quot;qt_hr&quot; type=&quot;number&quot; step=&quot;1&quot; /></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcQtc()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_qtc')&quot;>Reset</button></div></form>`)}
function calcQtc(){const qt=num('qt_ms'),hr=num('qt_hr');if(!qt||!hr){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci QT e frequenza cardiaca.</div>');return}const rr=60/hr;const baz=qt/Math.sqrt(rr);const fri=qt/Math.cbrt(rr);setResult(`<h3>Risultato</h3><div class=&quot;interp&quot;><b>Bazett:</b> ${baz.toFixed(0)} ms<br><b>Fridericia:</b> ${fri.toFixed(0)} ms</div>`)}
function bmiTool(){setTimeout(()=>details(`<p><b>BMI</b> = peso / altezza².</p><p><b>BSA Mosteller</b> = √((altezza cm × peso kg) / 3600).</p>`),0);return shell(&quot;BMI + BSA&quot;,&quot;Antropometria clinica rapida.&quot;,[&quot;Utility&quot;],`<form id=&quot;f_bmi&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Peso (kg)</label><input id=&quot;bm_w&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>Altezza (cm)</label><input id=&quot;bm_h&quot; type=&quot;number&quot; step=&quot;0.1&quot; /></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcBmi()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_bmi')&quot;>Reset</button></div></form>`)}
function calcBmi(){const w=num('bm_w'),hcm=num('bm_h');if(!w||!hcm){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci peso e altezza.</div>');return}const hm=hcm/100;const bmi=w/(hm*hm);const bsa=Math.sqrt((hcm*w)/3600);setResult(`<h3>Risultato</h3><div class=&quot;interp&quot;><b>BMI:</b> ${bmi.toFixed(1)} kg/m²<br><b>BSA:</b> ${bsa.toFixed(2)} m²</div>`)}

function vexusTool(){setTimeout(()=>details(`<p><b>VExUS pratico (schema semplificato)</b></p><table class=&quot;table&quot;><tr><th>Passo</th><th>Interpretazione</th></tr><tr><td>IVC &amp;lt; 2.0 cm</td><td><b>VExUS 0</b>: congestione venosa sistemica non significativa.</td></tr><tr><td>IVC ≥ 2.0 cm + nessuna severa alterazione Doppler</td><td><b>VExUS 1</b></td></tr><tr><td>IVC ≥ 2.0 cm + 1 alterazione severa</td><td><b>VExUS 2</b></td></tr><tr><td>IVC ≥ 2.0 cm + ≥2 alterazioni severe</td><td><b>VExUS 3</b></td></tr></table><p><b>Alterazioni severe considerate:</b> flusso epatico con <i>S reversed</i>, vena porta con pulsatility ≥50%, flusso venoso intrarenale monophasic/discontinuo marcato.</p><p><b>Alterazioni lievi/moderate:</b> epatica con S blunted, porta 30–49%, intrarenale biphasic.</p><div class=&quot;warn&quot;>Questo modulo fornisce un <b>grading operativo</b> utile al bedside. L'interpretazione finale va integrata con quadro clinico, setting ventilatorio e qualità della finestra ecografica.</div>`),0);return shell(&quot;VExUS&quot;,&quot;Valutazione ecografica della congestione venosa sistemica con grading 0–3.&quot;,[&quot;Scompenso&quot;,&quot;Congestione&quot;,&quot;Eco bedside&quot;],`<form id=&quot;f_vexus&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Diametro IVC (cm)</label><input id=&quot;vex_ivc&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.1&quot; /><small>Soglia pratica: <b>2.0 cm</b>.</small></div><div class=&quot;field&quot;><label>Collassabilità IVC</label><select id=&quot;vex_ivc_coll&quot;><option value=&quot;&quot;>Non specificata</option><option value=&quot;>50&quot;>&amp;gt;50%</option><option value=&quot;20-50&quot;>20–50%</option><option value=&quot;<20&quot;>&amp;lt;20%</option></select><small>Campo descrittivo, non determina da solo il grado.</small></div><div class=&quot;field&quot;><label>Vene epatiche</label><select id=&quot;vex_hepatic&quot;><option value=&quot;0&quot;>Normale (S &amp;gt; D)</option><option value=&quot;1&quot;>Alterazione lieve/moderata (S blunted)</option><option value=&quot;2&quot;>Severa (S reversed)</option></select></div><div class=&quot;field&quot;><label>Vena porta</label><select id=&quot;vex_portal&quot;><option value=&quot;0&quot;>Normale (&amp;lt;30%)</option><option value=&quot;1&quot;>Alterazione lieve/moderata (30–49%)</option><option value=&quot;2&quot;>Severa (≥50%)</option></select></div><div class=&quot;field full&quot;><label>Vene intrarenali</label><select id=&quot;vex_renal&quot;><option value=&quot;0&quot;>Normale (continuous)</option><option value=&quot;1&quot;>Alterazione lieve/moderata (biphasic)</option><option value=&quot;2&quot;>Severa (monophasic/discontinuous marcata)</option></select></div></div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcVexus()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_vexus')&quot;>Reset</button></div></form>`)}
function calcVexus(){const ivc=num('vex_ivc');if(!ivc){setResult('<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci almeno il diametro della IVC.</div>');return}const hepatic=selNum('vex_hepatic');const portal=selNum('vex_portal');const renal=selNum('vex_renal');const severe=[hepatic,portal,renal].filter(x=>x===2).length;const moderate=[hepatic,portal,renal].filter(x=>x===1).length;let grade=0, label='', interp='';if(ivc<2){grade=0;label='Assenza di congestione venosa significativa';interp='IVC sotto la soglia pratica di 2.0 cm: quadro non compatibile con congestione sistemica significativa secondo schema VExUS semplificato.';}else{if(severe>=2){grade=3;label='Congestione venosa severa';interp='IVC dilatata con almeno due Doppler severamente patologici.';}else if(severe===1){grade=2;label='Congestione venosa moderata';interp='IVC dilatata con una alterazione Doppler severa.';}else{grade=1;label='Congestione lieve / iniziale';interp='IVC dilatata senza criteri Doppler severi; presenti reperti normali o solo lievi/moderati.';}}const coll=val('vex_ivc_coll');let extras=[];if(ivc>=2)extras.push('IVC dilatata');else extras.push('IVC non dilatata');if(coll)extras.push('collassabilità '+coll);if(hepatic===2)extras.push('epatiche severe');else if(hepatic===1)extras.push('epatiche lievemente/moderatamente alterate');if(portal===2)extras.push('porta severa');else if(portal===1)extras.push('porta lievemente/moderata');if(renal===2)extras.push('intrarenali severe');else if(renal===1)extras.push('intrarenali lievemente/moderate');const advice=grade<=1?'Integra con clinica, BNP, profilo destro e trend diuretico.':'Congestione rilevante: utile correlare con segni clinici, funzione renale, strategia di decongestione e trend seriali.';setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>VExUS ${grade}</div><div class=&quot;interp&quot;><b>${label}</b>.<br>${interp}</div><div class=&quot;note&quot;>Sintesi: ${extras.join(' • ')}.<br>${advice}</div>`)}

function hfpefTool(){setTimeout(()=>details(`<table class=&quot;table&quot;><tr><th>Variabile</th><th>Punti</th></tr><tr><td>Heavy (BMI &amp;gt;30)</td><td>2</td></tr><tr><td>Hypertensive (≥2 farmaci)</td><td>1</td></tr><tr><td>AF</td><td>3</td></tr><tr><td>Pulmonary HTN (PASP &amp;gt;35)</td><td>1</td></tr><tr><td>Elder (&amp;gt;60 anni)</td><td>1</td></tr><tr><td>Filling pressure (E/e' &amp;gt;9)</td><td>1</td></tr></table><p>0–1 bassa probabilità; 2–5 intermedia; 6–9 alta.</p>`),0);return shell(&quot;H₂FPEF&quot;,&quot;Score clinico-eco per probabilità di HFpEF.&quot;,[&quot;Scompenso&quot;,&quot;Dettagli completi&quot;],`<form id=&quot;f_hfpef&quot;><div class=&quot;form-grid&quot;>${cb('hf_bmi','BMI > 30 kg/m²')}${cb('hf_rx','≥2 farmaci antipertensivi')}${cb('hf_af','Fibrillazione atriale')}${cb('hf_pht','PASP > 35 mmHg')}${cb('hf_age','Età > 60 anni')}${cb('hf_ee','E/e′ > 9')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcHfpef()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_hfpef')&quot;>Reset</button></div></form>`)}
function calcHfpef(){const score=2*checked('hf_bmi')+checked('hf_rx')+3*checked('hf_af')+checked('hf_pht')+checked('hf_age')+checked('hf_ee');const cls=score<=1?'Bassa probabilità HFpEF':score<=5?'Probabilità intermedia':'Alta probabilità HFpEF';setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${score}</div><div class=&quot;interp&quot;><b>${cls}</b>.</div>`)}
function infoTool(title,text,bullets){setTimeout(()=>details(`<p>${text}</p><ul>${bullets.map(x=>`<li>${x}</li>`).join('')}</ul>`),0);return `<section class=&quot;card&quot;><h2>${title}</h2><p class=&quot;help&quot;>${text}</p><div class=&quot;badges&quot;>${bullets.map(b=>`<span class=&quot;badge&quot;>${b}</span>`).join('')}</div></section>`}
function hcmTool(){setTimeout(()=>details(`<p><b>Formula ESC HCM Risk-SCD a 5 anni</b>:</p><p><code class=&quot;inline&quot;>Probabilità = 1 − 0.998 ^ exp(PI)</code></p><p>dove <code class=&quot;inline&quot;>PI</code> = 0.15939858×MWT − 0.00294271×MWT² + 0.0259082×LAD + 0.00446131×LVOT + 0.4583082×FHx_SCD + 0.82639195×NSVT + 0.71650361×Syncope − 0.01799934×Età</p><table class=&quot;table&quot;><tr><th>Variabile</th><th>Unità</th></tr><tr><td>MWT = maximal wall thickness</td><td>mm</td></tr><tr><td>LAD = diametro atriale sinistro</td><td>mm</td></tr><tr><td>LVOT = gradiente massimo a riposo/Valsalva</td><td>mmHg</td></tr><tr><td>FHx SCD, NSVT, sincope inspiegata</td><td>0/1</td></tr></table><p>Soglie pratiche ESC: <b>&amp;lt;4%</b> basso rischio, <b>4–&amp;lt;6%</b> intermedio, <b>≥6%</b> alto.</p><div class=&quot;warn&quot;>Uso previsto: pazienti con HCM, in genere <b>≥16 anni</b>, dopo valutazione iniziale. Non sostituisce il giudizio clinico e non copre tutte le situazioni particolari.</div>`),0);return shell(&quot;HCM Risk-SCD&quot;,&quot;Calcolo del rischio di morte cardiaca improvvisa a 5 anni nella cardiomiopatia ipertrofica.&quot;,[&quot;Cardiomiopatie&quot;,&quot;5-year risk&quot;,&quot;ESC formula&quot;],`<form id=&quot;f_hcm&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Età (anni)</label><input id=&quot;hcm_age&quot; type=&quot;number&quot; min=&quot;16&quot; step=&quot;1&quot; /><small>Età alla valutazione clinica.</small></div><div class=&quot;field&quot;><label>Spessore massimo parietale (MWT, mm)</label><input id=&quot;hcm_mwt&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.1&quot; /><small>Massimo wall thickness.</small></div><div class=&quot;field&quot;><label>Diametro atriale sinistro (LAD, mm)</label><input id=&quot;hcm_lad&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.1&quot; /></div><div class=&quot;field&quot;><label>Gradiente LVOT massimo (mmHg)</label><input id=&quot;hcm_lvot&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.1&quot; /><small>Massimo a riposo o con Valsalva.</small></div>${cb('hcm_fhx','Familiarità per SCD')}${cb('hcm_nsvt','NSVT al monitoraggio')}${cb('hcm_syn','Sincope inspiegata')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcHCM()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_hcm')&quot;>Reset</button></div><div class=&quot;warn&quot;>Nota: ho usato la formula ESC classica. Nei pazienti con caratteristiche non coperte dal modello, la decisione su ICD va integrata con il resto del profilo clinico.</div></form>`)}
function calcHCM(){const age=num('hcm_age'),mwt=num('hcm_mwt'),lad=num('hcm_lad'),lvot=num('hcm_lvot'),fhx=checked('hcm_fhx'),nsvt=checked('hcm_nsvt'),syn=checked('hcm_syn');if(!age||!mwt||isNaN(lad)||isNaN(lvot)){setResult(`<h3>Risultato</h3><div class=&quot;note&quot;>Inserisci almeno età, MWT, LAD e gradiente LVOT.</div>`);return}const pi=(0.15939858*mwt)-(0.00294271*mwt*mwt)+(0.0259082*lad)+(0.00446131*lvot)+(0.4583082*fhx)+(0.82639195*nsvt)+(0.71650361*syn)-(0.01799934*age);const risk=(1-Math.pow(0.998,Math.exp(pi)))*100;let cls='Basso rischio';if(risk>=6)cls='Alto rischio';else if(risk>=4)cls='Rischio intermedio';setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${risk.toFixed(1)}%</div><div class=&quot;interp&quot;>Rischio stimato di SCD a 5 anni: <b>${cls}</b>.</div><div class=&quot;note&quot;>PI = ${pi.toFixed(3)}. Soglie pratiche ESC: &amp;lt;4% basso, 4–&amp;lt;6% intermedio, ≥6% alto.</div>`)}
openTool(state.current);renderMenu();
</script>

<script>
function showPanel(which){
  const echo = which === 'echo';
  document.getElementById('panel-echo').classList.toggle('active', echo);
  document.getElementById('panel-cardio').classList.toggle('active', !echo);
  document.getElementById('btn-echo').classList.toggle('active', echo);
  document.getElementById('btn-cardio').classList.toggle('active', !echo);
  document.getElementById('btn-echo').setAttribute('aria-selected', echo ? 'true' : 'false');
  document.getElementById('btn-cardio').setAttribute('aria-selected', echo ? 'false' : 'true');
}
</script>
