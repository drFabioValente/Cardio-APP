      const pravVti = get('PrAV_VTI_cm');
      if (lvotVtiForValves !== null &amp;&amp; pravVti !== null &amp;&amp; pravVti > 0) derived.PrAV_DVI = lvotVtiForValves / pravVti;
      if (lvotd !== null &amp;&amp; lvotVtiForValves !== null &amp;&amp; pravVti !== null &amp;&amp; pravVti > 0) {
        const csaLvot = Math.PI * Math.pow(lvotd / 2, 2);
        derived.PrAV_EOA_cm2 = (csaLvot * lvotVtiForValves) / pravVti;
        if (bsa) derived.PrAV_EOAi = derived.PrAV_EOA_cm2 / bsa;
      }
      const at = get('PrAV_AT_ms');
      const et = get('PrAV_ET_ms');
      if (at !== null &amp;&amp; et !== null &amp;&amp; et > 0) derived.PrAV_ATET = at / et;
      const pravVmax = get('PrAV_Vmax_ms');
      const pravMean = get('PrAV_meanPG_mmhg');
      const pravDvi = derived.PrAV_DVI ?? get('PrAV_DVI');
      const pravEoai = derived.PrAV_EOAi ?? get('PrAV_EOAi');
      const pravAtet = derived.PrAV_ATET ?? get('PrAV_ATET');
      const pravSuspicion = (
        (pravVmax !== null &amp;&amp; pravVmax >= 4) ||
        (pravMean !== null &amp;&amp; pravMean >= 40) ||
        (pravDvi !== null &amp;&amp; pravDvi < 0.25) ||
        (pravEoai !== null &amp;&amp; pravEoai < 0.65) ||
        (pravAtet !== null &amp;&amp; pravAtet > 0.4)
      );
      summaries.protesi_aortica = `Screen protesi aortica: ${pravSuspicion ? 'Sospetta disfunzione' : 'Nei limiti'} (DVI ${formatNum(pravDvi, 2) || '-'}, EOAi ${formatNum(pravEoai, 2) || '-'})`;

      const prmvVti = get('PrMV_VTI_cm');
      if (prmvVti !== null &amp;&amp; lvotVtiForValves !== null &amp;&amp; lvotVtiForValves > 0) {
        derived.PrMV_DVIinv = prmvVti / lvotVtiForValves;
      }
      const sv = derived.SV_ml ?? get('SV_ml');
      if (sv !== null &amp;&amp; prmvVti !== null &amp;&amp; prmvVti > 0) {
        derived.PrMV_EOA_cm2 = sv / prmvVti;
        if (bsa) derived.PrMV_EOAi = derived.PrMV_EOA_cm2 / bsa;
      }
      const prmvMean = get('PrMV_meanPG_mmhg');
      const prmvPht = get('PrMV_PHT_ms');
      const prmvEoai = derived.PrMV_EOAi ?? get('PrMV_EOAi');
      const prmvSuspicion = (
        (prmvMean !== null &amp;&amp; prmvMean > 5) ||
        (prmvPht !== null &amp;&amp; prmvPht > 200) ||
        (prmvEoai !== null &amp;&amp; prmvEoai < 1.2)
      );
      summaries.protesi_mitralica = `Screen protesi mitralica: ${prmvSuspicion ? 'Sospetta disfunzione' : 'Nei limiti'}`;

      const creat = get('creatinina_mg_dl');
      const age = globals.age;
      if (creat !== null &amp;&amp; age !== null &amp;&amp; creat > 0) {
        const k = sex === 'F' ? 0.7 : 0.9;
        const alpha = sex === 'F' ? -0.241 : -0.302;
        const ratio = creat / k;
        const minPart = Math.pow(Math.min(ratio, 1), alpha);
        const maxPart = Math.pow(Math.max(ratio, 1), -1.2);
        const sexFactor = sex === 'F' ? 1.012 : 1;
        derived.eGFR_ckdepi = 142 * minPart * maxPart * Math.pow(0.9938, age) * sexFactor;
        const weightCg = globals.weight ?? get('peso_kg');
        if (weightCg !== null) {
          const sexCg = sex === 'F' ? 0.85 : 1;
          derived.CrCl_cg = (((140 - age) * weightCg) / (72 * creat)) * sexCg;
          if (bsa) {
            derived.CrCl_cg_bsa = (derived.CrCl_cg * 1.73) / bsa;
          }
        }
      }
      const lipidUnit = String(state.values.lipid_unit || 'mg_dl');
      const total = get('CT_total');
      const hdl = get('HDL');
      const tg = get('TG');
      if (total !== null &amp;&amp; hdl !== null &amp;&amp; tg !== null) {
        if (lipidUnit === 'mg_dl') {
          if (tg < 400) derived.LDL_auto = total - hdl - (tg / 5);
        } else {
          derived.LDL_auto = total - hdl - (tg / 2.2);
        }
      }
      const qtMs = get('QT_ms');
      const qtcHr = globals.fc;
      if (qtMs !== null &amp;&amp; qtcHr !== null &amp;&amp; qtcHr > 0) {
        const rr = 60 / qtcHr;
        const qtSec = qtMs / 1000;
        derived.QTc_bazett = (qtSec / Math.sqrt(rr)) * 1000;
        derived.QTc_fridericia = (qtSec / Math.cbrt(rr)) * 1000;
        derived.QTc_framingham = (qtSec + (0.154 * (1 - rr))) * 1000;
        derived.QTc_hodges = qtMs + (1.75 * (qtcHr - 60));
      }
      summaries.calcolatori_aggiuntivi = [
        derived.eGFR_ckdepi !== undefined ? `eGFR ${formatNum(derived.eGFR_ckdepi, 1)} mL/min/1.73m2` : '',
        derived.CrCl_cg !== undefined ? `CrCl ${formatNum(derived.CrCl_cg, 1)} mL/min` : '',
        derived.LDL_auto !== undefined ? `LDL ${formatNum(derived.LDL_auto, 1)} (${lipidUnit === 'mg_dl' ? 'mg/dL' : 'mmol/L'})` : '',
        derived.QTc_bazett !== undefined ? `QTc Bazett ${formatNum(derived.QTc_bazett, 0)} ms` : '',
      ].filter(Boolean).join('; ') || 'Calcolatori: dati insufficienti';

      return { globals, derived, statuses, summaries };
    };

    const mergeValuesForPayload = (computed) => {
      const merged = { ...state.values };
      Object.keys(merged).forEach((key) => {
        const field = fieldsById.get(key);
        if (!field) {
          delete merged[key];
          return;
        }
        if (field.auto) {
          delete merged[key];
          return;
        }
        if (field.type === 'select') return;
        const validation = getFieldValidationState(key);
        if (!validation.valid) {
          delete merged[key];
        }
      });
      Object.entries(computed.derived).forEach(([key, value]) => {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return;
        merged[key] = Number(value);
      });
      return merged;
    };

    const getSectionById = (sectionId) => sectionsById.get(sectionId) || sectionList[0];
    const escapeHtml = (value) => String(value || '')
      .replaceAll('&amp;', '&amp;amp;')
      .replaceAll('<', '&amp;lt;')
      .replaceAll('>', '&amp;gt;')
      .replaceAll('&quot;', '&amp;quot;')
      .replaceAll(&quot;'&quot;, '&amp;#39;');
    const getMergedNum = (merged, key) => {
      const value = parseNum(merged[key]);
      return value === null ? null : value;
    };
    const normalizeReportLabel = (value) => {
      const text = String(value || '').trim().toLowerCase();
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    };
    const gradeFromWorstScore = (score) => {
      if (score === null || score === undefined) return 'Dati insufficienti';
      if (score <= 0) return 'Assente';
      if (score === 1) return 'Lieve';
      if (score === 2) return 'Moderata';
      return 'Severa';
    };
    const buildNarrativeSections = (computed, sectionIds, merged) => {
      const selected = new Set(Array.isArray(sectionIds) ? sectionIds : ECO_SECTION_IDS);
      const ordered = ECO_SECTION_IDS.filter((sectionId) => selected.has(sectionId));
      const narrativeSections = [];

      const pushSection = (title, text) => {
        const clean = String(text || '').trim();
        if (!clean) return;
        narrativeSections.push({ title: normalizeReportLabel(title), text: clean });
      };

      ordered.forEach((sectionId) => {
        if (sectionId === 'ventricolo_sinistro') {
          const sex = computed.globals?.sex === 'F' ? 'F' : 'M';
          const lvidd = getMergedNum(merged, 'LVIDd_mm');
          const lviddi = getMergedNum(merged, 'LVIDd_i_mm_m2');
          const lvedvi = getMergedNum(merged, 'LVEDVi_ml_m2');
          const lvmi = getMergedNum(merged, 'LV_mass_gm2');
          const rwt = getMergedNum(merged, 'RWT');
          const lvmiCut = sex === 'F' ? 95 : 115;

          let geometryText = 'Geometria VS: dati insufficienti';
          if (lvmi !== null &amp;&amp; rwt !== null) {
            const lvmiElevated = lvmi > lvmiCut;
            if (!lvmiElevated &amp;&amp; rwt <= 0.42) geometryText = 'Geometria normale';
            else if (!lvmiElevated &amp;&amp; rwt > 0.42) geometryText = 'Rimodellamento concentrico';
            else if (lvmiElevated &amp;&amp; rwt > 0.42) geometryText = 'Ipertrofia concentrica';
            else geometryText = 'Ipertrofia eccentrica';
          }

          const dilationScores = [];
          if (lviddi !== null) {
            if (sex === 'M') {
              if (lviddi > 36) dilationScores.push(3);
              else if (lviddi > 33) dilationScores.push(2);
              else if (lviddi > 30) dilationScores.push(1);
              else dilationScores.push(0);
            } else if (lviddi > 37) dilationScores.push(3);
            else if (lviddi > 34) dilationScores.push(2);
            else if (lviddi > 31) dilationScores.push(1);
            else dilationScores.push(0);
          }
          if (lvedvi !== null) {
            if (sex === 'M') {
              if (lvedvi > 100) dilationScores.push(3);
              else if (lvedvi > 89) dilationScores.push(2);
              else if (lvedvi > 74) dilationScores.push(1);
              else dilationScores.push(0);
            } else if (lvedvi > 80) dilationScores.push(3);
            else if (lvedvi > 70) dilationScores.push(2);
            else if (lvedvi > 61) dilationScores.push(1);
            else dilationScores.push(0);
          }
          const dilationWorst = dilationScores.length ? Math.max(...dilationScores) : null;
          let dilationText = '';
          if (dilationWorst !== null) {
            if (dilationWorst === 0) {
              dilationText = 'non dilatato';
            } else if (dilationWorst === 1) {
              dilationText = 'dilatazione lieve';
            } else if (dilationWorst === 2) {
              dilationText = 'dilatazione moderata';
            } else {
              dilationText = 'dilatazione severa';
            }
          }

          const vsMetrics = [];
          if (lvidd !== null) vsMetrics.push(`LVIDd ${formatNum(lvidd, 0)} mm`);
          if (lviddi !== null) vsMetrics.push(`LVIDd i ${formatNum(lviddi, 1)} mm/m2`);
          if (lvedvi !== null) vsMetrics.push(`LVEDVi ${formatNum(lvedvi, 1)} mL/m2`);
          if (lvmi !== null) vsMetrics.push(`LVMi ${formatNum(lvmi, 1)} g/m2`);
          if (rwt !== null) vsMetrics.push(`RWT ${formatNum(rwt, 2)}`);

          const vsSentence = [geometryText, dilationText].filter(Boolean).join('; ');
          const vsText = vsMetrics.length ? `${vsSentence} (${vsMetrics.join('; ')})` : vsSentence;
          pushSection('VENTRICOLO SINISTRO', vsText);

          const lvefInput = parseNum(state.values.LVEF);
          const lvefFromVolumes = getMergedNum(merged, 'LVEF_from_vol');
          const lvef = lvefInput !== null ? lvefInput : lvefFromVolumes;
          if (lvef !== null) {
            const safeLvef = Math.max(0, Math.min(100, lvef));
            let fsLabel = 'Funzione sistolica conservata';
            if (safeLvef <= 40) fsLabel = 'Funzione sistolica ridotta';
            else if (safeLvef <= 49) fsLabel = 'Funzione sistolica lievemente ridotta';
            pushSection('FUNZIONE SISTOLICA', `${fsLabel} (FEVS ${Math.round(safeLvef)}%)`);
          } else {
            pushSection('FUNZIONE SISTOLICA', 'Dati insufficienti');
          }
          return;
        }

        if (sectionId === 'diastolica') {
          const label = String(computed.summaries.diastolica || 'Dati insufficienti');
          const ea = getMergedNum(merged, 'EA');
          const avgEe = getMergedNum(merged, 'avg_Ee');
          const lavi = getMergedNum(merged, 'LAVI_auto');
          const trv = getMergedNum(merged, 'TRV');
          const details = [];
          if (ea !== null) details.push(`E/A ${formatNum(ea, 2)}`);
          if (avgEe !== null) details.push(`E/e' ${formatNum(avgEe, 1)}`);
          if (lavi !== null) details.push(`LAVi ${formatNum(lavi, 1)} mL/m2`);
          if (trv !== null) details.push(`TRV ${formatNum(trv, 1)} m/s`);
          pushSection('FUNZIONE DIASTOLICA', details.length ? `${label} (${details.join('; ')})` : label);
          return;
        }

        if (sectionId === 'atrio_sinistro') {
          const lavi = getMergedNum(merged, 'LAVI_auto');
          if (lavi === null) {
            pushSection('ATRIO SINISTRO', 'Dati insufficienti');
            return;
          }
          const grade = String(computed.statuses.LAVI_auto || '').toLowerCase();
          if (grade.includes('norm')) {
            pushSection('ATRIO SINISTRO', `Normale volumetria atriale sinistra (LAVi ${formatNum(lavi, 1)} mL/m2)`);
          } else if (grade) {
            pushSection('ATRIO SINISTRO', `Dilatazione atriale sinistra ${grade} (LAVi ${formatNum(lavi, 1)} mL/m2)`);
          } else {
            pushSection('ATRIO SINISTRO', `LAVi ${formatNum(lavi, 1)} mL/m2`);
          }
          return;
        }

        if (sectionId === 'ventricolo_destro') {
          const tapse = getMergedNum(merged, 'TAPSE_mm');
          const fac = getMergedNum(merged, 'FAC_pct');
          const sTdi = getMergedNum(merged, 'Sprime_TDI_cm_s');
          const rvotPlaxIdx = getMergedNum(merged, 'RVOT_PLAX_i_mm_m2');
          const rvotPsaxIdx = getMergedNum(merged, 'RVOT_PSAX_i_mm_m2');
          const values = [];
          if (rvotPlaxIdx !== null) values.push(`RVOT PLAXi ${formatNum(rvotPlaxIdx, 1)} mm/m2`);
          if (rvotPsaxIdx !== null) values.push(`RVOT PSAXi ${formatNum(rvotPsaxIdx, 1)} mm/m2`);
          if (tapse !== null) values.push(`TAPSE ${formatNum(tapse, 1)} mm`);
          if (sTdi !== null) values.push(`S' ${formatNum(sTdi, 1)} cm/s`);
          if (fac !== null) values.push(`FAC ${formatNum(fac, 1)} %`);
          if (values.length === 0) {
            pushSection('VENTRICOLO DESTRO', 'Dati insufficienti');
            return;
          }
          const abnormal = (
            (tapse !== null &amp;&amp; tapse < 17)
            || (sTdi !== null &amp;&amp; sTdi < 9.5)
            || (fac !== null &amp;&amp; fac < 35)
            || (rvotPlaxIdx !== null &amp;&amp; rvotPlaxIdx > 19)
            || (rvotPsaxIdx !== null &amp;&amp; rvotPsaxIdx > 21)
          );
          const pre = abnormal
            ? 'Alterazioni dimensionali/funzionali del ventricolo destro'
            : 'Normali diametri e funzione sistolica longitudinale e globale';
          pushSection('VENTRICOLO DESTRO', `${pre} (${values.join('; ')})`);
          return;
        }

        if (sectionId === 'pressioni_destre') {
          const rap = getMergedNum(merged, 'RAP_mmHg');
          const rvsp = getMergedNum(merged, 'RVSP_mmHg');
          const mpap = getMergedNum(merged, 'mPAP_mmHg');
          const values = [];
          if (rap !== null) values.push(`RAP ${formatNum(rap, 0)} mmHg`);
          if (rvsp !== null) values.push(`RVSP ${formatNum(rvsp, 0)} mmHg`);
          if (mpap !== null) values.push(`mPAP ${formatNum(mpap, 0)} mmHg`);
          if (!values.length) {
            pushSection('PRESSIONI DESTRE', 'Dati insufficienti');
            return;
          }
          const inRange = (rvsp === null || rvsp <= 35) &amp;&amp; (mpap === null || mpap <= 20);
          pushSection('PRESSIONI DESTRE', `${inRange ? 'Nei limiti' : 'Aumentate'} (${values.join('; ')})`);
          return;
        }

        if (sectionId === 'emodinamica') {
          const sv = getMergedNum(merged, 'SV_ml');
          const co = getMergedNum(merged, 'CO_Lmin');
          const svi = getMergedNum(merged, 'SVI_ml_m2');
          const ci = getMergedNum(merged, 'CI_Lmin_m2');
          const values = [];
          if (sv !== null) values.push(`SV ${formatNum(sv, 1)} mL`);
          if (co !== null) values.push(`CO ${formatNum(co, 2)} L/min`);
          if (svi !== null) values.push(`SVI ${formatNum(svi, 1)} mL/m2`);
          if (ci !== null) values.push(`CI ${formatNum(ci, 2)} L/min/m2`);
          if (!values.length) {
            pushSection('GITTATA SISTOLICA E PORTATA CARDIACA', 'Dati insufficienti');
            return;
          }
          const reduced = (svi !== null &amp;&amp; svi < 35) || (ci !== null &amp;&amp; ci < 2.2);
          const increased = (svi !== null &amp;&amp; svi > 65) || (ci !== null &amp;&amp; ci > 4.2);
          const flowLabel = reduced ? 'Ridotta' : (increased ? 'Aumentata' : 'Nella norma');
          pushSection('GITTATA SISTOLICA E PORTATA CARDIACA', `${flowLabel} (${values.join('; ')})`);
          return;
        }

        if (sectionId === 'valvola_aortica') {
          const asScores = [];
          const vmax = getMergedNum(merged, 'AoV_Vmax_ms');
          const meanPg = getMergedNum(merged, 'AoV_meanPG_mmhg');
          const ava = getMergedNum(merged, 'AVA_cm2');
          const avai = getMergedNum(merged, 'AVAi_cm2_m2');
          const dvi = getMergedNum(merged, 'AS_DVI');
          if (vmax !== null) asScores.push(vmax >= 4 ? 3 : (vmax >= 3 ? 2 : (vmax >= 2.6 ? 1 : 0)));
          if (meanPg !== null) asScores.push(meanPg >= 40 ? 3 : (meanPg >= 20 ? 2 : 0));
          if (ava !== null) asScores.push(ava < 1 ? 3 : (ava <= 1.5 ? 2 : 0));
          if (avai !== null) asScores.push(avai < 0.6 ? 3 : (avai <= 0.85 ? 2 : 0));
          if (dvi !== null) asScores.push(dvi < 0.25 ? 3 : (dvi <= 0.5 ? 2 : 0));
          const asGrade = gradeFromWorstScore(asScores.length ? Math.max(...asScores) : null);

          const aiGrades = [];
          const arEroa = getMergedNum(merged, 'AR_EROA_cm2');
          const arVol = getMergedNum(merged, 'AR_RegVol_ml');
          const arRf = getMergedNum(merged, 'AR_RF_pct');
          const arVc = getMergedNum(merged, 'AR_VCW_cm');
          const arPht = getMergedNum(merged, 'AR_PHT_ms');
          if (arEroa !== null) aiGrades.push(arEroa >= 0.30 ? 'Severa' : (arEroa >= 0.20 ? 'Moderata' : 'Lieve'));
          if (arVol !== null) aiGrades.push(arVol >= 60 ? 'Severa' : (arVol >= 45 ? 'Moderata' : 'Lieve'));
          if (arRf !== null) aiGrades.push(arRf >= 50 ? 'Severa' : (arRf >= 40 ? 'Moderata' : 'Lieve'));
          if (arVc !== null) aiGrades.push(arVc > 0.6 ? 'Severa' : (arVc >= 0.3 ? 'Moderata' : 'Lieve'));
          if (arPht !== null) aiGrades.push(arPht < 200 ? 'Severa' : (arPht <= 500 ? 'Moderata' : 'Lieve'));
          const aiGrade = aiGrades.length ? pickWorst(aiGrades) : 'Dati insufficienti';
          pushSection('VALVOLA AORTICA', `Stenosi aortica: ${asGrade}; Insufficienza aortica: ${aiGrade}`);
          return;
        }

        if (sectionId === 'valvola_mitralica') {
          const msScores = [];
          const mva = getMergedNum(merged, 'MVA_cm2');
          const mvMean = getMergedNum(merged, 'MV_meanPG_mmhg');
          if (mva !== null) msScores.push(mva < 1 ? 3 : (mva <= 1.5 ? 2 : 0));
          if (mvMean !== null) msScores.push(mvMean > 10 ? 3 : (mvMean >= 5 ? 2 : 0));
          const msGrade = gradeFromWorstScore(msScores.length ? Math.max(...msScores) : null);

          const mrGrades = [];
          const mrEroa = getMergedNum(merged, 'MR_EROA_cm2');
          const mrVol = getMergedNum(merged, 'MR_RegVol_ml');
          const mrRf = getMergedNum(merged, 'MR_RF_pct');
          const mrVc = getMergedNum(merged, 'MR_VCW_cm');
          if (mrEroa !== null) mrGrades.push(mrEroa >= 0.40 ? 'Severa' : (mrEroa >= 0.30 ? 'Moderata' : 'Lieve'));
          if (mrVol !== null) mrGrades.push(mrVol >= 60 ? 'Severa' : (mrVol >= 45 ? 'Moderata' : 'Lieve'));
          if (mrRf !== null) mrGrades.push(mrRf >= 50 ? 'Severa' : (mrRf >= 40 ? 'Moderata' : 'Lieve'));
          if (mrVc !== null) mrGrades.push(mrVc > 0.7 ? 'Severa' : (mrVc >= 0.3 ? 'Moderata' : 'Lieve'));
          const mrGrade = mrGrades.length ? pickWorst(mrGrades) : 'Dati insufficienti';
          pushSection('VALVOLA MITRALICA', `Stenosi mitralica: ${msGrade}; Insufficienza mitralica: ${mrGrade}`);
          return;
        }

        if (sectionId === 'valvola_tricuspide') {
          const tsMean = getMergedNum(merged, 'TS_meanPG_mmhg');
          const tsVti = getMergedNum(merged, 'TS_VTI_cm');
          const tsPht = getMergedNum(merged, 'TS_PHT_ms');
          const trva = getMergedNum(merged, 'TrVA_cm2');
          const tsSuspicious = (
            (tsMean !== null &amp;&amp; tsMean >= 5) ||
            (tsVti !== null &amp;&amp; tsVti > 60) ||
            (tsPht !== null &amp;&amp; tsPht >= 190) ||
            (trva !== null &amp;&amp; trva <= 1)
          );
          const trGrades = [];
          const trVc = getMergedNum(merged, 'TR_VCW_cm');
          const trEroa = getMergedNum(merged, 'TR_EROA_cm2');
          const trVol = getMergedNum(merged, 'TR_RegVol_ml');
          if (trVc !== null) trGrades.push(trVc > 0.7 ? 'Severa' : (trVc >= 0.3 ? 'Moderata' : 'Lieve'));
          if (trEroa !== null) trGrades.push(trEroa >= 0.40 ? 'Severa' : (trEroa >= 0.20 ? 'Moderata' : 'Lieve'));
          if (trVol !== null) trGrades.push(trVol >= 45 ? 'Severa' : (trVol >= 30 ? 'Moderata' : 'Lieve'));
          const trGrade = trGrades.length ? pickWorst(trGrades) : 'Dati insufficienti';
          pushSection('VALVOLA TRICUSPIDE', `Stenosi tricuspide: ${tsSuspicious ? 'Sospetta' : 'Non sospetta'}; Insufficienza tricuspide: ${trGrade}`);
          return;
        }

        if (sectionId === 'valvola_polmonare') {
          const psScores = [];
          const pvVmax = getMergedNum(merged, 'PV_Vmax_ms');
          const pvMaxPg = getMergedNum(merged, 'PV_maxPG_mmhg');
          if (pvVmax !== null) psScores.push(pvVmax > 4 ? 3 : (pvVmax >= 3 ? 2 : 0));
          if (pvMaxPg !== null) psScores.push(pvMaxPg > 64 ? 3 : (pvMaxPg >= 36 ? 2 : 0));
          const psGrade = gradeFromWorstScore(psScores.length ? Math.max(...psScores) : null);
          const prRf = getMergedNum(merged, 'PR_RF_pct');
          const prIndex = getMergedNum(merged, 'PR_index');
          let prGrade = 'Dati insufficienti';
          if (prRf !== null) prGrade = prRf >= 40 ? 'Significativa' : 'Lieve';
          else if (prIndex !== null) prGrade = prIndex < 0.77 ? 'Significativa' : 'Lieve';
          pushSection('VALVOLA POLMONARE', `Stenosi polmonare: ${psGrade}; Insufficienza polmonare: ${prGrade}`);
          return;
        }

        if (sectionId === 'protesi_aortica') {
          pushSection('PROTESI AORTICA', String(computed.summaries.protesi_aortica || 'Dati insufficienti'));
          return;
        }

        if (sectionId === 'protesi_mitralica') {
          pushSection('PROTESI MITRALICA', String(computed.summaries.protesi_mitralica || 'Dati insufficienti'));
          return;
        }
      });
      return narrativeSections;
    };

    const buildReportBundle = (computed, sectionIds = null, options = {}) => {
      const includeEntries = options.includeEntries !== false;
      const includeSummary = options.includeSummary !== false;
      const sectionFilter = Array.isArray(sectionIds) &amp;&amp; sectionIds.length
        ? new Set(sectionIds)
        : null;
      const merged = mergeValuesForPayload(computed);

      if (!includeEntries &amp;&amp; includeSummary) {
        let narratives = buildNarrativeSections(
          computed,
          sectionFilter ? Array.from(sectionFilter) : ECO_SECTION_IDS,
          merged,
        );
        narratives = appendBullEyeToNarratives(narratives);
        const plainText = narratives
          .map((section) => `${section.title}: ${section.text}`)
          .join('\n');
        const previewHtml = narratives
          .map((section) => `<div class=&quot;eco-pro-report-section&quot;><div class=&quot;eco-pro-report-title&quot;>${escapeHtml(section.title)}</div><div class=&quot;eco-pro-result-item&quot;><span>${escapeHtml(section.text)}</span></div></div>`)
          .join('');
        return {
          plainText: plainText.trim(),
          visitText: plainText.trim(),
          previewHtml,
        };
      }

      const sections = [];
      sortSectionsByClinicalOrder(sectionList).forEach((section) => {
        if (sectionFilter &amp;&amp; !sectionFilter.has(section.id)) return;
        const entries = [];
        if (includeEntries) {
          section.fields.forEach((field) => {
            const rawValue = merged[field.id];
            if (rawValue === null || rawValue === undefined || String(rawValue).trim() === '') return;
            const asNum = parseNum(rawValue);
            const displayValue = asNum === null ? String(rawValue).trim() : formatNum(asNum, field.auto ? 2 : 2);
            const unit = field.unit ? ` ${field.unit}` : '';
            const status = computed.statuses[field.id];
            const statusText = status &amp;&amp; status !== 'NA' ? ` (${status})` : '';
            entries.push({
              label: field.label,
              value: `${displayValue}${unit}${statusText}`,
            });
          });
        }
        const summary = includeSummary &amp;&amp; computed.summaries[section.id]
          ? String(computed.summaries[section.id]).trim()
          : '';
        if (!entries.length &amp;&amp; !summary) {
          return;
        }
        sections.push({
          title: section.title,
          summary,
          entries,
        });
      });

      const bull = getBullEyeIntegration();
      const bullReportText = String(bull?.getReportText?.() || state.bullEyeReport || '').trim();
      if (bullReportText) {
        sections.push({
          title: 'Cinesi segmentaria',
          summary: bullReportText,
          entries: [],
        });
      }

      const plainLines = [];
      sections.forEach((section) => {
        plainLines.push(section.title.toUpperCase());
        if (includeEntries) {
          section.entries.forEach((entry) => {
            plainLines.push(`${entry.label}: ${entry.value}`);
          });
        }
        if (includeSummary &amp;&amp; section.summary) {
          plainLines.push(`Conclusione: ${section.summary}`);
        }
        plainLines.push('');
      });

      const htmlBlocks = [];
      sections.forEach((section) => {
        const sectionHtml = [];
        if (includeEntries) {
          section.entries.forEach((entry) => {
            sectionHtml.push(
              `<div class=&quot;eco-pro-result-item&quot;><strong>${escapeHtml(entry.label)}:</strong> <span>${escapeHtml(entry.value)}</span></div>`,
            );
          });
        }
        if (includeSummary &amp;&amp; section.summary) {
          sectionHtml.push(`<div class=&quot;eco-pro-result-item&quot;><strong>Conclusione:</strong> <span>${escapeHtml(section.summary)}</span></div>`);
        }
        if (sectionHtml.length) {
          htmlBlocks.push(
            `<div class=&quot;eco-pro-report-section&quot;><div class=&quot;eco-pro-report-title&quot;>${escapeHtml(section.title)}</div>${sectionHtml.join('')}</div>`,
          );
        }
      });

      const plainText = plainLines.join('\n').trim();
      return {
        plainText,
        visitText: plainText,
        previewHtml: htmlBlocks.join(''),
      };
    };

    const persistPayload = () => {
      const computed = computeDerived();
      const mergedValues = mergeValuesForPayload(computed);
      const normalizedValues = {};
      Object.entries(mergedValues).forEach(([key, rawValue]) => {
        if (!key) return;
        if (typeof rawValue === 'boolean') {
          normalizedValues[key] = rawValue;
          return;
        }
        const numeric = parseNum(rawValue);
        if (numeric !== null) {
          normalizedValues[key] = Number(formatNum(numeric, 4));
          return;
        }
        const textValue = String(rawValue || '').trim();
        if (!textValue) return;
        normalizedValues[key] = textValue;
      });
      const selectedEcoSections = ECO_SECTION_IDS.filter((sectionId) => state.selectedSections.has(sectionId));
      const reportBundle = selectedEcoSections.length
        ? buildReportBundle(
          computed,
          selectedEcoSections,
          { includeEntries: false, includeSummary: true },
        )
        : { plainText: '' };
      const reportText = String(reportBundle.plainText || '').trim();
      const bull = getBullEyeIntegration();
      state.bullEyeSegments = bull?.getSegments?.() || state.bullEyeSegments || null;
      state.bullEyeReport = String(bull?.getReportText?.() || state.bullEyeReport || '').trim();
      state.summary = selectedEcoSections.length
        ? { ...computed.summaries }
        : {};
      state.reportText = reportText;
      const payload = {
        section: state.section,
        sex: state.sex,
        include_print: false,
        selected_sections: selectedEcoSections,
        values: normalizedValues,
        summary: state.summary,
        report_text: reportText,
        bull_eye_segments: state.bullEyeSegments || undefined,
        bull_eye_report: state.bullEyeReport || undefined,
        saved_at: new Date().toISOString(),
      };
      hiddenInput.value = JSON.stringify(payload);
      hiddenInput.dispatchEvent(new Event('input', { bubbles: true }));
      hiddenInput.dispatchEvent(new Event('change', { bubbles: true }));
      return payload;
    };

    const resetEcoCalculator = () => {
      state.values = {};
      state.summary = {};
      state.reportText = '';
      state.bullEyeSegments = null;
      state.bullEyeReport = '';
      if (window.EchoBullEye &amp;&amp; typeof window.EchoBullEye.reset === 'function') {
        window.EchoBullEye.reset();
      }
      state.selectedSections = new Set();
      state.section = 'atrio_sinistro';
      hiddenInput.value = '';
      hiddenInput.dispatchEvent(new Event('input', { bubbles: true }));
      hiddenInput.dispatchEvent(new Event('change', { bubbles: true }));
      if (ecoRefertoField) {
        ecoRefertoField.value = '';
        ecoRefertoField.dispatchEvent(new Event('input', { bubbles: true }));
        ecoRefertoField.dispatchEvent(new Event('change', { bubbles: true }));
      }
      setSummaryNotice('Valori Eco calculator azzerati.', 'success');
      render();
    };

    const render = () => {
      const computed = computeDerived();
      ensureValidSectionForMode();
      const hasValue = (fieldId) => {
        const field = fieldsById.get(fieldId);
        if (field &amp;&amp; !field.auto &amp;&amp; field.type !== 'select') {
          const validation = getFieldValidationState(fieldId);
          return !validation.empty &amp;&amp; validation.valid;
        }
        const rawValue = state.values[fieldId];
        if (rawValue === undefined || rawValue === null) return false;
        if (typeof rawValue === 'number') return Number.isFinite(rawValue);
        const textValue = String(rawValue).trim();
        if (!textValue) return false;
        return parseNum(textValue) !== null || textValue.length > 0;
      };

      const selectedSectionIds = getSectionsForMode(state.mode)
        .map((section) => section.id)
        .filter((sectionId) => sectionId !== EXTRA_SECTION_ID &amp;&amp; state.selectedSections.has(sectionId));
      const hasSelectedSections = selectedSectionIds.length > 0;
      if (hasSelectedSections &amp;&amp; !state.selectedSections.has(state.section)) {
        state.section = selectedSectionIds[0];
      }

      const section = hasSelectedSections ? getSectionById(state.section) : null;
      const required = section ? (essentialBySection[state.section] || []) : [];
      const requiredSet = new Set(required);
      const filteredFields = section ? section.fields : [];

      rowsRoot.innerHTML = '';
      if (hasSelectedSections &amp;&amp; !filteredFields.length) {
        const emptyRow = document.createElement('tr');
        emptyRow.innerHTML = '<td colspan=&quot;4&quot;>Nessun parametro disponibile.</td>';
        rowsRoot.appendChild(emptyRow);
      } else if (hasSelectedSections) {
        filteredFields.forEach((field) => {
          const row = document.createElement('tr');
          row.dataset.ecoFieldId = field.id;
          const fieldValidation = getFieldValidationState(field.id);
          const isRequiredField = requiredSet.has(field.id);
          const isMissingRequired = !field.auto &amp;&amp; field.type !== 'select' &amp;&amp; fieldValidation.empty;
          if (isMissingRequired) {
            row.classList.add('eco-pro-row-missing');
          }

          const labelCell = document.createElement('td');
          const labelMain = document.createElement('div');
          labelMain.className = 'eco-pro-param-label';
          labelMain.textContent = isRequiredField ? `${field.label} *` : field.label;
          labelCell.appendChild(labelMain);
          const formulaText = formulaByField[field.id];
          if (formulaText) {
            const formulaEl = document.createElement('div');
            formulaEl.className = 'eco-pro-formula';
            formulaEl.textContent = `Formula: ${formulaText}`;
            labelCell.appendChild(formulaEl);
          }
          row.appendChild(labelCell);

          const valueCell = document.createElement('td');
          if (field.type === 'select') {
            const select = document.createElement('select');
            select.className = 'eco-pro-select';
            (field.options || []).forEach((optionValue) => {
              const option = document.createElement('option');
              option.value = optionValue;
              option.textContent = optionValue;
              select.appendChild(option);
            });
            select.value = String(state.values[field.id] || field.options?.[0] || '');
            select.disabled = Boolean(field.auto);
            select.addEventListener('change', () => {
              state.values[field.id] = select.value;
              render();
            });
            valueCell.appendChild(select);
          } else {
            const derivedValue = computed.derived[field.id];
            if (field.auto) {
              const input = document.createElement('input');
              input.type = 'text';
              input.value = derivedValue === undefined ? '' : formatNum(derivedValue, 2);
              input.readOnly = true;
              valueCell.appendChild(input);
            } else {
              const input = document.createElement('input');
              input.type = 'text';
              const stateValue = state.values[field.id];
              input.value = stateValue === undefined ? '' : String(stateValue);
              const rangeText = formatRangeLabel(field.id);
              if (rangeText) {
                input.placeholder = rangeText;
                input.title = `Range accettato: ${rangeText}`;
              }
              if (fieldValidation.empty || !fieldValidation.valid) {
                input.classList.add('input-invalid');
                input.setAttribute('aria-invalid', 'true');
              }
              input.addEventListener('change', () => {
                state.values[field.id] = normalizeNum(input.value);
                render();
              });
              input.addEventListener('blur', () => {
                state.values[field.id] = normalizeNum(input.value);
                render();
              });
              valueCell.appendChild(input);
            }
          }
          row.appendChild(valueCell);

          const unitCell = document.createElement('td');
          unitCell.textContent = field.unit || '-';
          row.appendChild(unitCell);

          const statusCell = document.createElement('td');
          const statusSpan = document.createElement('span');
          const derivedValue = computed.derived[field.id];
          const derivedAvailable = derivedValue !== undefined
            &amp;&amp; derivedValue !== null
            &amp;&amp; !Number.isNaN(Number(derivedValue));
          const manualFilled = hasValue(field.id);
          let statusValue = computed.statuses[field.id];
          if (!field.auto &amp;&amp; !fieldValidation.valid) {
            statusValue = fieldValidation.reason || 'Non valido';
          } else if (!statusValue || statusValue === 'NA') {
            if (field.auto) {
              if (derivedAvailable) {
                statusValue = 'Calcolato';
              } else {
                const deps = dependenciesByField[field.id] || [];
                statusValue = deps.length
                  ? `Inserisci: ${deps.join(', ')}`
                  : 'Dati mancanti';
              }
            } else if (manualFilled) {
              statusValue = 'Inserito';
            } else {
              statusValue = 'Inserire valore';
            }
          }
          statusSpan.textContent = statusValue;
          statusSpan.className = `eco-pro-status ${severityClass(statusValue)}`.trim();
          statusCell.appendChild(statusSpan);
          row.appendChild(statusCell);

          rowsRoot.appendChild(row);
        });
      }

      const buildSectionSummaryCard = (sectionId) => {
        const sectionDef = getSectionById(sectionId);
        const requiredFields = essentialBySection[sectionId] || [];
        const labelById = Object.fromEntries((sectionDef.fields || []).map((field) => [field.id, field.label]));
        const missing = requiredFields.filter((fieldId) => !hasValue(fieldId));
        const completedCount = Math.max(0, requiredFields.length - missing.length);
        const completeness = requiredFields.length ? `Completezza ${completedCount}/${requiredFields.length}` : '';
        const summaryText = computed.summaries[sectionId] || 'Compila i campi per ottenere i suggerimenti automatici.';
        const summaryRows = [];
        (sectionDef.fields || []).forEach((field) => {
          let rawValue = null;
          if (field.auto) {
            rawValue = computed.derived[field.id];
          } else {
            rawValue = state.values[field.id];
          }
          if (rawValue === null || rawValue === undefined || String(rawValue).trim() === '') return;
          const validation = field.auto ? { valid: true, reason: '' } : getFieldValidationState(field.id);
          const asNum = parseNum(rawValue);
          const baseText = asNum === null ? String(rawValue).trim() : formatNum(asNum, 2);
          const unit = field.unit &amp;&amp; field.unit !== '-' ? ` ${field.unit}` : '';
          let status = !field.auto &amp;&amp; !validation.valid
            ? (validation.reason || 'Non valido')
            : computed.statuses[field.id];
          if (!status || status === 'NA') {
            status = field.auto ? 'Calcolato' : 'Inserito';
          }
          if (!baseText) return;
          summaryRows.push({
            label: field.label,
            value: `${baseText}${unit}`.trim(),
            status: status,
          });
        });
        const missingLabels = missing.map((fieldId) => labelById[fieldId] || fieldId).join(', ');
        const metaParts = [];
        if (completeness) metaParts.push(completeness);
        if (missing.length) metaParts.push(`Mancano parametri chiave: ${missingLabels}`);

        const rowsHtml = summaryRows.length
          ? `<table class=&quot;eco-pro-values-table&quot;><tbody>${summaryRows
            .map((row) => `
              <tr>
                <td><strong>${escapeHtml(row.label)}</strong></td>
                <td>${escapeHtml(row.value)}</td>
                <td>${escapeHtml(row.status)}</td>
              </tr>
            `)
            .join('')}</tbody></table>`
          : '<div class=&quot;eco-pro-summary-meta&quot;>Nessun valore utile inserito per questa sezione.</div>';

        return `
          <article class=&quot;eco-pro-summary-card&quot; data-eco-pro-summary-card=&quot;${escapeHtml(sectionId)}&quot;>
            <div class=&quot;eco-pro-summary-card-head&quot;>
              <div class=&quot;eco-pro-report-title&quot;>${escapeHtml(sectionDef.title)}</div>
              <button type=&quot;button&quot; class=&quot;btn btn-secondary btn-compact&quot; data-eco-pro-unselect=&quot;${escapeHtml(sectionId)}&quot;>Deseleziona</button>
            </div>
            ${rowsHtml}
            <div class=&quot;eco-pro-summary-conclusion&quot;><strong>Conclusione:</strong> ${escapeHtml(summaryText)}</div>
            ${metaParts.length ? `<div class=&quot;eco-pro-summary-meta&quot;>${escapeHtml(metaParts.join(' · '))}</div>` : ''}
          </article>
        `;
      };

      renderGlobalMissingAlert();
      const mergedForCompletion = mergeValuesForPayload(computed);
      const completedSections = new Set();
      const sectionIssues = new Map();
      getSectionsForMode(state.mode).forEach((section) => {
        const hasSummary = Boolean(String(computed.summaries?.[section.id] || '').trim());
        const hasEntries = (section.fields || []).some((field) => {
          const rawValue = mergedForCompletion[field.id];
          return !(rawValue === null || rawValue === undefined || String(rawValue).trim() === '');
        });
        sectionIssues.set(section.id, evaluateSectionIssues(section, hasValue));
        if (hasSummary || hasEntries) {
          completedSections.add(section.id);
        }
      });
      if (!selectedSectionIds.length) {
        summaryBox.innerHTML = '';
      } else {
        summaryBox.innerHTML = selectedSectionIds
          .map((sectionId) => buildSectionSummaryCard(sectionId))
          .join('');
      }

      if (tableWrap) {
        tableWrap.classList.toggle('eco-pro-hide', !hasSelectedSections);
      }
      if (summaryWrap) {
        summaryWrap.classList.toggle('eco-pro-hide', !hasSelectedSections);
      }
      if (refertoWrap) {
        refertoWrap.classList.toggle('eco-pro-hide', !hasSelectedSections);
      }

      syncSectionControls(completedSections, hasSelectedSections, sectionIssues);

      const bullPanel = document.getElementById('bullEyePanel');
      const bullVisible = Boolean(bullPanel &amp;&amp; hasSelectedSections &amp;&amp; state.section === 'ventricolo_sinistro');
      if (bullPanel) {
        bullPanel.classList.toggle('is-visible', bullVisible);
      }
      if (window.EchoBullEye &amp;&amp; typeof window.EchoBullEye.setVisible === 'function') {
        window.EchoBullEye.setVisible(bullVisible);
      }
    };

    const ecoRefertoField = document.querySelector('[data-eco-referto=&quot;1&quot;]');
    const stripEcoCalcMarkers = (value) => String(value || '')
      .replace(/\[Eco calculator\]\s*/gi, '')
      .replace(/\s*\[\/Eco calculator\]/gi, '')
      .trim();
    const injectEcoCalculatorReport = (reportText) => {
      if (!ecoRefertoField) return false;
      const trimmedReport = String(reportText || '').trim();
      if (!trimmedReport) return false;
      const cleanedCurrent = stripEcoCalcMarkers(ecoRefertoField.value || '');
      const nextValue = cleanedCurrent &amp;&amp; cleanedCurrent === trimmedReport
        ? cleanedCurrent
        : trimmedReport;
      ecoRefertoField.value = nextValue;
      ecoRefertoField.dispatchEvent(new Event('input', { bubbles: true }));
      ecoRefertoField.dispatchEvent(new Event('change', { bubbles: true }));
      return true;
    };

    const collectInvalidFields = (sectionIds = null) => {
      const sectionFilter = Array.isArray(sectionIds) &amp;&amp; sectionIds.length
        ? new Set(sectionIds)
        : null;
      const invalidItems = [];
      sectionList.forEach((section) => {
        if (sectionFilter &amp;&amp; !sectionFilter.has(section.id)) return;
        (section.fields || []).forEach((field) => {
          if (field.auto || field.type === 'select') return;
          const validation = getFieldValidationState(field.id);
          if (validation.empty || validation.valid) return;
          invalidItems.push({
            section: section.title,
            label: field.label,
            reason: validation.reason || 'Valore non valido',
          });
        });
      });
      return invalidItems;
    };

    const collectMissingRequiredFields = (sectionIds = null) => {
      const sectionFilter = Array.isArray(sectionIds) &amp;&amp; sectionIds.length
        ? new Set(sectionIds)
        : null;
      const missingItems = [];
      sectionList.forEach((section) => {
        if (sectionFilter &amp;&amp; !sectionFilter.has(section.id)) return;
        const requiredFields = essentialBySection[section.id] || [];
        requiredFields.forEach((fieldId) => {
          const field = fieldsById.get(fieldId);
          if (!field) return;
          const validation = getFieldValidationState(field.id);
          if (!validation.empty &amp;&amp; validation.valid) return;
          missingItems.push({
            sectionId: section.id,
            section: section.title,
            fieldId: field.id,
            label: field.label,
          });
        });
      });
      return missingItems;
    };

    const focusSectionField = (sectionId, fieldId) => {
      if (!sectionId || !fieldId) return;
      if (!state.selectedSections.has(sectionId) &amp;&amp; sectionId !== EXTRA_SECTION_ID) {
        state.selectedSections.add(sectionId);
      }
      state.section = sectionId;
      render();
      window.requestAnimationFrame(() => {
        const row = rowsRoot.querySelector(`[data-eco-field-id=&quot;${fieldId}&quot;]`);
        if (!row) return;
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const input = row.querySelector('input:not([readonly]), select');
        if (input &amp;&amp; typeof input.focus === 'function') {
          input.focus();
          if (typeof input.select === 'function') {
            input.select();
          }
        }
      });
    };

    const openModal = (mode = 'eco') => {
      state.mode = mode === 'extra' ? 'extra' : 'eco';
      if (modal) {
        modal.classList.remove('is-hidden');
      }
      render();
    };

    const closeModal = () => {
      if (modal) {
        modal.classList.add('is-hidden');
      }
    };

    if (openButton) {
      openButton.addEventListener('click', () => {
        openModal('eco');
      });
    }
    if (extraOpenButton) {
      extraOpenButton.addEventListener('click', () => {
        openModal('extra');
      });
    }

    if (modal) {
      closeButtons.forEach((button) => {
        button.addEventListener('click', () => closeModal());
      });

      modal.addEventListener('click', (event) => {
        if (event.target === modal.querySelector('.eco-pro-modal__backdrop')) {
          closeModal();
        }
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' &amp;&amp; !modal.classList.contains('is-hidden')) {
          closeModal();
        }
      });
    }

    sendButton.addEventListener('click', () => {
      const selectedEcoSections = ECO_SECTION_IDS.filter((sectionId) => state.selectedSections.has(sectionId));
      const bull = getBullEyeIntegration();
      const bullReportText = String(bull?.getReportText?.() || state.bullEyeReport || '').trim();
      const hasStandaloneBullReport = Boolean(bullReportText);

      if (!selectedEcoSections.length &amp;&amp; !hasStandaloneBullReport) {
        setSummaryNotice('Seleziona almeno una sezione o compila il Bull eye prima di generare il referto ECO.', 'error');
        return;
      }

      if (selectedEcoSections.length) {
        const globals = readGlobalContext();
        if (globals.weight === null || globals.height === null) {
          const missingLabels = [];
          if (globals.weight === null) missingLabels.push('Peso');
          if (globals.height === null) missingLabels.push('Altezza');
          const links = missingLabels
            .map((label) => {
              const fieldId = label.toLowerCase() === 'peso' ? 'peso_kg' : 'altezza_cm';
              const href = buildVisitFieldLink(fieldId);
              return href ? `${label}: ${href}` : '';
            })
            .filter(Boolean);
          const suffix = links.length ? ` (${links.join(' · ')})` : '';
          setSummaryNotice(`Mancano dati visita obbligatori (${missingLabels.join(' e ')}). Inseriscili prima dell'invio.${suffix}`, 'error');
          renderGlobalMissingAlert();
          return;
        }

        const missingRequired = collectMissingRequiredFields(selectedEcoSections);
        if (missingRequired.length) {
          const first = missingRequired[0];
          setSummaryNotice(`Mancano dati obbligatori: ${first.section} - ${first.label}. Ti porto al campo da compilare.`, 'error');
          focusSectionField(first.sectionId, first.fieldId);
          return;
        }

        const invalidFields = collectInvalidFields(selectedEcoSections);
        if (invalidFields.length) {
          const preview = invalidFields
            .slice(0, 3)
            .map((item) => `${item.section} - ${item.label}`)
            .join('; ');
          setSummaryNotice(`Correggi i valori fuori range prima dell'invio: ${preview}.`, 'error');
          const firstInvalid = invalidFields[0];
          const sectionDef = sectionList.find((section) => section.title === firstInvalid.section);
          const fieldDef = sectionDef?.fields?.find((field) => field.label === firstInvalid.label);
          if (sectionDef &amp;&amp; fieldDef) {
            focusSectionField(sectionDef.id, fieldDef.id);
          }
          return;
        }
      }

      const computed = computeDerived();
      const reportBundle = buildReportBundle(computed, selectedEcoSections, { includeEntries: false, includeSummary: true });
      let reportText = String(reportBundle.plainText || '').trim();

      if (!reportText &amp;&amp; hasStandaloneBullReport) {
        reportText = `CINESI SEGMENTARIA\n${bullReportText}`;
      }

      if (!reportText) {
        setSummaryNotice('Nessun referto da inviare: compila almeno un parametro.', 'error');
        return;
      }

      if (!ecoRefertoField) {
        setSummaryNotice(pageRoot
          ? 'Campo Referto ECO non trovato nella pagina calculator.'
          : 'Campo Referto ECO non trovato nella visita.', 'error');
        return;
      }

      const writeStandaloneReport = () => {
        ecoRefertoField.value = reportText;
        ecoRefertoField.dispatchEvent(new Event('input', { bubbles: true }));
        ecoRefertoField.dispatchEvent(new Event('change', { bubbles: true }));
        updateEcoRefertoPreview?.();
        persistPayload();
      };

      if (pageRoot) {
        writeStandaloneReport();
        setSummaryNotice('Referto ECO generato correttamente.', 'success');
        return;
      }

      persistPayload();
      const confirmed = window.confirm('Inviare il referto di Eco calculator nel campo Referto ECO della visita?');
      if (!confirmed) return;
      const injected = injectEcoCalculatorReport(reportText);
      if (!injected) {
        setSummaryNotice('Invio non riuscito: verifica il campo Referto ECO.', 'error');
        return;
      }
      setSummaryNotice('Referto Eco calculator inviato al Referto ECO della visita.', 'success');
      closeModal();
    });

    if (resetButton) {
      resetButton.addEventListener('click', () => {
        const confirmed = window.confirm('Confermi il reset completo di Eco calculator?');
        if (!confirmed) return;
        resetEcoCalculator();
      });
    }

    summaryBox.addEventListener('click', (event) => {
      const button = event.target.closest('[data-eco-pro-unselect]');
      if (!button) return;
      const sectionId = String(button.getAttribute('data-eco-pro-unselect') || '').trim();
      if (!sectionId || !state.selectedSections.has(sectionId)) return;
      state.selectedSections.delete(sectionId);
      render();
    });

    const initialSection = sectionsById.has(state.section) ? state.section : 'atrio_sinistro';
    state.section = initialSection;
    state.mode = state.section === EXTRA_SECTION_ID ? 'extra' : 'eco';

    hiddenInput.form?.addEventListener('submit', () => {
      persistPayload();
    });

    if (pageRoot) {
      render();
    }
  };
  initEcoPro();

  const initEcoRefertoPreview = () => {
    const previewNodes = Array.from(document.querySelectorAll('[data-eco-referto-preview]'));
    if (!previewNodes.length) return;

    const esc = (value) => String(value || '')
      .replaceAll('&amp;', '&amp;amp;')
      .replaceAll('<', '&amp;lt;')
      .replaceAll('>', '&amp;gt;')
      .replaceAll('&quot;', '&amp;quot;')
      .replaceAll(&quot;'&quot;, '&amp;#39;');
    const normalizeLabel = (value) => {
      const text = String(value || '').trim().toLowerCase();
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    };

    const renderPreview = (previewNode, sourceField) => {
      const rawText = String(sourceField?.value || '').trim();
      if (!rawText) {
        previewNode.classList.add('is-empty');
        previewNode.innerHTML = 'Anteprima formattata del referto ECO.';
        return;
      }
      const lines = rawText
        .split(/\r?\n+/)
        .map((line) => line.trim())
        .filter(Boolean);
      if (!lines.length) {
        previewNode.classList.add('is-empty');
        previewNode.innerHTML = 'Anteprima formattata del referto ECO.';
        return;
      }
      previewNode.classList.remove('is-empty');
      previewNode.innerHTML = lines.map((line) => {
        const idx = line.indexOf(':');
        if (idx <= 0) {
          return `<p class=&quot;eco-referto-preview-line&quot;><span class=&quot;eco-referto-preview-text&quot;>${esc(line)}</span></p>`;
        }
        const rawLabel = line.slice(0, idx);
        const rawBody = line.slice(idx + 1).trim();
        const label = normalizeLabel(rawLabel);
        return `
          <p class=&quot;eco-referto-preview-line&quot;>
            <span class=&quot;eco-referto-preview-label&quot;>${esc(label)}:</span>
            <span class=&quot;eco-referto-preview-text&quot;>${esc(rawBody)}</span>
          </p>
        `;
      }).join('');
    };

    previewNodes.forEach((previewNode) => {
      const sourceSelector = String(previewNode.getAttribute('data-source') || '').trim();
      let sourceField = null;
      if (sourceSelector) {
        sourceField = document.querySelector(sourceSelector);
      }
      if (!sourceField) {
        sourceField = document.querySelector('[data-eco-referto=&quot;1&quot;]');
      }
      if (!sourceField) return;
      const render = () => renderPreview(previewNode, sourceField);
      sourceField.addEventListener('input', render);
      sourceField.addEventListener('change', render);
      render();
    });
  };
  initEcoRefertoPreview();

  const forms = document.querySelectorAll('form.autosave');
  forms.forEach((form) => {
    if (!storage) return;
    const keyBase = form.dataset.autosaveKey || form.getAttribute('id') || window.location.pathname;
    const storageKey = `clinica_autosave_${keyBase}`;

    const loadData = () => {
      let saved = null;
      try {
        saved = storage.getItem(storageKey);
      } catch (err) {
        return;
      }
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        Object.keys(data).forEach((name) => {
          const fields = form.querySelectorAll(`[name=&quot;${name}&quot;]`);
          if (!fields.length) return;
          fields.forEach((field) => {
            if (field.type === 'checkbox') {
              const stored = data[name];
              if (Array.isArray(stored)) {
                field.checked = stored.includes(field.value || 'on');
              } else {
                field.checked = stored === true || stored === field.value;
              }
            } else if (!field.value) {
              field.value = data[name];
            }
          });
        });
      } catch (err) {
        console.warn('Errore caricamento bozza', err);
      }
    };

    const saveData = () => {
      const data = {};
      const fields = form.querySelectorAll('input, textarea, select');
      fields.forEach((field) => {
        if (!field.name || field.disabled) return;
        if (field.type === 'checkbox') {
          if (!data[field.name]) {
            data[field.name] = [];
          }
          if (field.checked) {
            data[field.name].push(field.value || 'on');
          }
        } else {
          data[field.name] = field.value;
        }
      });
      try {
        storage.setItem(storageKey, JSON.stringify(data));
      } catch (err) {
        // ignore storage errors (quota or blocked)
      }
    };

    loadData();
    const clearButtons = form.querySelectorAll('[data-autosave-clear]');
    clearButtons.forEach((button) => {
      button.addEventListener('click', (event) => {
        event.preventDefault();
        try {
          storage.removeItem(storageKey);
        } catch (err) {
          // ignore storage errors
        }
        form.reset();
      });
    });
    form.addEventListener('input', saveData);
    form.addEventListener('change', saveData);
    form.addEventListener('submit', () => {
      try {
        storage.removeItem(storageKey);
      } catch (err) {
        // ignore storage errors
      }
    });
  });

  const validationForms = document.querySelectorAll('form');
  validationForms.forEach((form) => {
    const FIELD_STATE_CLASSES = ['input-missing', 'input-invalid', 'input-valid'];
    const WRAPPER_STATE_CLASSES = ['is-missing', 'is-invalid', 'is-valid'];

    const isEligibleField = (field) => {
      if (!field || field.type === 'hidden' || field.disabled) return false;
      if (!(field.matches('input, select, textarea'))) return false;
      if (field.classList.contains('field-computed')) return false;
      if (field.readOnly &amp;&amp; field.tagName !== 'SELECT') return false;
      return true;
    };

    const isCodiceFiscaleField = (field) => {
      if (!field) return false;
      const key = `${field.name || ''} ${field.id || ''}`.toLowerCase();
      return key.includes('codice_fiscale');
    };

    const getValidityReason = (field) => {
      if (!field || !field.validity) return 'Valore non valido';
      const { validity } = field;
      if (validity.valueMissing) return 'Campo obbligatorio';
      if (validity.tooShort) {
        const min = field.getAttribute('minlength');
        return min ? `Minimo ${min} caratteri` : 'Testo troppo corto';
      }
      if (validity.tooLong) {
        const max = field.getAttribute('maxlength');
        return max ? `Massimo ${max} caratteri` : 'Testo troppo lungo';
      }
      if (validity.patternMismatch) return field.title || 'Formato non valido';
      if (validity.typeMismatch) return 'Formato non valido';
      if (validity.rangeUnderflow) return field.min ? `Valore minimo ${field.min}` : 'Valore troppo basso';
      if (validity.rangeOverflow) return field.max ? `Valore massimo ${field.max}` : 'Valore troppo alto';
      if (validity.stepMismatch) return 'Valore non ammesso per questo campo';
      if (validity.badInput) return 'Valore non valido';
      return field.validationMessage || 'Valore non valido';
    };

    const getFieldValidation = (field) => {
      if (!isEligibleField(field)) return { state: 'neutral', reason: '' };
      const raw = String(field.value || '');
      const value = raw.trim();
      const required = field.hasAttribute('required');

      if (isCodiceFiscaleField(field)) {
        const normalized = value.toUpperCase();
        if (raw !== normalized) {
          field.value = normalized;
        }
        if (!normalized) {
          return required ? { state: 'missing', reason: 'Campo obbligatorio' } : { state: 'neutral', reason: '' };
        }
        if (normalized.length < 16) {
          return { state: 'invalid', reason: 'Il codice fiscale deve avere 16 caratteri' };
        }
        if (normalized.length > 16) {
          return { state: 'invalid', reason: 'Il codice fiscale non puo superare 16 caratteri' };
        }
        if (!/^[A-Z0-9]{16}$/.test(normalized)) {
          return { state: 'invalid', reason: 'Il codice fiscale deve essere alfanumerico (A-Z, 0-9)' };
        }
        return { state: 'valid', reason: '' };
      }

      if (!value) {
        return required ? { state: 'missing', reason: 'Campo obbligatorio' } : { state: 'neutral', reason: '' };
      }

      if (field.validity &amp;&amp; !field.validity.valid) {
        return { state: 'invalid', reason: getValidityReason(field) };
      }

      return { state: 'valid', reason: '' };
    };

    const setFieldStateUi = (field, state, reason = '') => {
      if (!field) return;
      FIELD_STATE_CLASSES.forEach((cls) => field.classList.remove(cls));
      const wrapper = field.closest('.form-field');
      if (wrapper) {
        WRAPPER_STATE_CLASSES.forEach((cls) => wrapper.classList.remove(cls));
      }

      const getHint = () => {
        if (!wrapper) return null;
        let hint = wrapper.querySelector('[data-auto-field-error]');
        if (!hint) {
          hint = document.createElement('span');
          hint.className = 'field-error';
          hint.setAttribute('data-auto-field-error', '1');
          wrapper.appendChild(hint);
        }
        return hint;
      };

      if (state === 'missing') {
        field.classList.add('input-missing');
        field.setAttribute('aria-invalid', 'true');
        if (wrapper) wrapper.classList.add('is-missing');
        const hint = getHint();
        if (hint) hint.textContent = reason || 'Campo obbligatorio';
        return;
      }

      if (state === 'invalid') {
        field.classList.add('input-invalid');
        field.setAttribute('aria-invalid', 'true');
        if (wrapper) wrapper.classList.add('is-invalid');
        const hint = getHint();
        if (hint) hint.textContent = reason || 'Valore non valido';
        return;
      }

      if (state === 'valid') {
        field.setAttribute('aria-invalid', 'false');
        if (wrapper) {
          const hint = wrapper.querySelector('[data-auto-field-error]');
          if (hint) hint.remove();
        }
        return;
      }

      field.setAttribute('aria-invalid', 'false');
      if (wrapper) {
        const hint = wrapper.querySelector('[data-auto-field-error]');
        if (hint) hint.remove();
      }
    };

    const getFieldLabel = (field) => {
      if (!field) return '';
      if (field.id) {
        const directLabel = form.querySelector(`label[for=&quot;${field.id}&quot;]`);
        if (directLabel) {
          return (directLabel.textContent || '').replace(/\*/g, '').trim();
        }
      }
      const wrapper = field.closest('.form-field');
      if (wrapper) {
        const inlineLabel = wrapper.querySelector('label');
        if (inlineLabel) {
          return (inlineLabel.textContent || '').replace(/\*/g, '').trim();
        }
      }
      return (field.name || field.id || 'campo').replace(/_/g, ' ').trim();
    };

    const evaluateForm = () => {
      let missingCount = 0;
      let invalidCount = 0;
      const missingLabels = [];
      const invalidLabels = [];
      const fields = form.querySelectorAll('input, select, textarea');
      fields.forEach((field) => {
        if (!isEligibleField(field)) return;
        const validation = getFieldValidation(field);
        setFieldStateUi(field, validation.state, validation.reason);
        const label = getFieldLabel(field);
        if (validation.state === 'missing') {
          missingCount += 1;
          if (label &amp;&amp; !missingLabels.includes(label)) {
            missingLabels.push(label);
          }
          return;
        }
        if (validation.state === 'invalid') {
          invalidCount += 1;
          const detail = label ? `${label}: ${validation.reason}` : validation.reason;
          if (detail &amp;&amp; !invalidLabels.includes(detail)) {
            invalidLabels.push(detail);
          }
        }
      });
      return { missingCount, invalidCount, missingLabels, invalidLabels };
    };

    const refreshValidationAlert = () => {
      const { missingCount, invalidCount, missingLabels, invalidLabels } = evaluateForm();
      let alertBox = form.querySelector('[data-form-validation-alert]');
      if (missingCount === 0 &amp;&amp; invalidCount === 0) {
        if (alertBox) alertBox.remove();
        return { missingCount, invalidCount };
      }
      if (!alertBox) {
        alertBox = document.createElement('div');
        alertBox.className = 'alert error form-validation-alert';
        alertBox.setAttribute('data-form-validation-alert', '1');
        form.insertAdjacentElement('afterbegin', alertBox);
      }
      const missingPreview = missingLabels.slice(0, 5).join(', ');
      const invalidPreview = invalidLabels.slice(0, 4).join(' | ');
      if (missingCount > 0 &amp;&amp; invalidCount > 0) {
        alertBox.textContent = `Completa i campi obbligatori (blu): ${missingPreview}. Correggi i campi non validi (rosso): ${invalidPreview}.`;
      } else if (missingCount > 0) {
        alertBox.textContent = `Completa i campi obbligatori (blu): ${missingPreview}.`;
      } else {
        alertBox.textContent = `Correggi i campi non validi (rosso): ${invalidPreview}.`;
      }
      return { missingCount, invalidCount };
    };

    form.addEventListener(
      'invalid',
      (event) => {
        const field = event.target;
        if (!isEligibleField(field)) return;
        const validation = getFieldValidation(field);
        setFieldStateUi(field, validation.state, validation.reason);
      },
      true
    );

    form.addEventListener('submit', (event) => {
      const { missingCount, invalidCount } = refreshValidationAlert();
      if (missingCount === 0 &amp;&amp; invalidCount === 0) return;
      event.preventDefault();
      const firstInvalid = form.querySelector('.input-invalid, .input-missing');
      if (firstInvalid &amp;&amp; typeof firstInvalid.focus === 'function') {
        firstInvalid.focus();
      }
    });

    const refreshSingleField = (event) => {
      const field = event.target;
      if (!isEligibleField(field)) {
        return;
      }
      const validation = getFieldValidation(field);
      setFieldStateUi(field, validation.state, validation.reason);
      const currentIssues = form.querySelectorAll('.input-invalid, .input-missing').length;
      if (currentIssues === 0) {
        const alertBox = form.querySelector('[data-form-validation-alert]');
        if (alertBox) {
          alertBox.remove();
        }
      } else if (form.querySelector('[data-form-validation-alert]')) {
        refreshValidationAlert();
      }
    };

    form.addEventListener('input', refreshSingleField);
    form.addEventListener('change', refreshSingleField);

    // Evidenzia subito gli errori server-side gia' presenti al caricamento pagina.
    const serverInvalidFields = form.querySelectorAll('.input-invalid');
    if (serverInvalidFields.length) {
      serverInvalidFields.forEach((field) => setFieldStateUi(field, 'invalid', 'Controlla questo campo'));
      const firstInvalid = serverInvalidFields[0];
      if (firstInvalid &amp;&amp; typeof firstInvalid.scrollIntoView === 'function') {
        firstInvalid.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }

    // Stato iniziale: campi obbligatori vuoti in blu, campi compilati validi in verde.
    const allFields = form.querySelectorAll('input, select, textarea');
    allFields.forEach((field) => {
      if (!isEligibleField(field)) return;
      if (field.classList.contains('input-invalid')) return;
      const validation = getFieldValidation(field);
      setFieldStateUi(field, validation.state, validation.reason);
    });

    const currentIssues = form.querySelectorAll('.input-invalid, .input-missing').length;
    if (currentIssues === 0) {
      const alertBox = form.querySelector('[data-form-validation-alert]');
      if (alertBox) {
        alertBox.remove();
      }
    }
  });

  const pesoInput = document.querySelector('#peso_kg');
  const altezzaInput = document.querySelector('#altezza_cm');
  const bmiInput = document.querySelector('#bmi');
  const bmiCategoriaInput = document.querySelector('#bmi_categoria');
  const bsaInput = document.querySelector('#bsa_m2');
  const pasInput = document.querySelector('#pressione_sistolica');
  const padInput = document.querySelector('#pressione_diastolica');
  const pamInput = document.querySelector('#pam_mmhg');
  const pressioneHiddenInput = document.querySelector('#pressione_arteriosa');
  const parseNumber = (input) => {
    if (!input) return null;
    const value = parseFloat(String(input.value || '').replace(',', '.'));
    return Number.isFinite(value) ? value : null;
  };
  const aggiornaMetricheAntropometriche = () => {
    if (!pesoInput || !altezzaInput) return;
    const peso = parseNumber(pesoInput);
    const altezza = parseNumber(altezzaInput);
    if (!peso || !altezza) {
      if (bmiInput) bmiInput.value = '';
      if (bsaInput) bsaInput.value = '';
      if (bmiCategoriaInput) bmiCategoriaInput.value = '-';
      return;
    }
    const bmi = peso / Math.pow(altezza / 100, 2);
    if (bmiInput) {
      bmiInput.value = bmi.toFixed(2);
    }
    if (bsaInput) {
      const bsa = Math.sqrt((altezza * peso) / 3600);
      bsaInput.value = bsa.toFixed(2);
    }
    if (bmiCategoriaInput) {
      if (bmi < 18.5) {
        bmiCategoriaInput.value = 'Sottopeso';
      } else if (bmi < 25) {
        bmiCategoriaInput.value = 'Normopeso';
      } else if (bmi < 30) {
        bmiCategoriaInput.value = 'Sovrappeso';
      } else if (bmi < 35) {
        bmiCategoriaInput.value = 'Obesità di classe I';
      } else if (bmi < 40) {
        bmiCategoriaInput.value = 'Obesità di classe II';
      } else {
        bmiCategoriaInput.value = 'Obesità di classe III';
      }
    }
  };
  const aggiornaMetrichePressorie = () => {
    const pas = parseNumber(pasInput);
    const pad = parseNumber(padInput);
    if (
      pas !== null &amp;&amp;
      pad !== null &amp;&amp;
      Number.isFinite(pas) &amp;&amp;
      Number.isFinite(pad) &amp;&amp;
      pas > pad
    ) {
      if (pamInput) {
        const pam = pad + ((pas - pad) / 3);
        pamInput.value = pam.toFixed(1);
      }
      if (pressioneHiddenInput) {
        pressioneHiddenInput.value = `${Math.round(pas)}/${Math.round(pad)}`;
      }
      return;
    }
    if (pamInput) pamInput.value = '';
    if (pressioneHiddenInput) pressioneHiddenInput.value = '';
  };
  if (pesoInput &amp;&amp; altezzaInput) {
    pesoInput.addEventListener('input', aggiornaMetricheAntropometriche);
    altezzaInput.addEventListener('input', aggiornaMetricheAntropometriche);
    aggiornaMetricheAntropometriche();
  }
  if (pasInput &amp;&amp; padInput) {
    pasInput.addEventListener('input', aggiornaMetrichePressorie);
    padInput.addEventListener('input', aggiornaMetrichePressorie);
    aggiornaMetrichePressorie();
  }

  const initVisitClinicalQualityPanel = () => {
    const form = document.querySelector('form.print-scope-form');
    if (!form) return;
    const panel = form.querySelector('[data-visit-quality-panel]');
    if (!panel) return;
    const clinicalRoot = panel.querySelector('[data-visit-clinical-alerts]');
    const qualityRoot = panel.querySelector('[data-visit-quality-issues]');
    const qualityBadge = panel.querySelector('[data-visit-quality-badge]');
    if (!clinicalRoot || !qualityRoot || !qualityBadge) return;

    const parseFieldNumber = (selector) => {
      const field = form.querySelector(selector);
      return field ? parseNumber(field) : null;
    };

    const formatValue = (value, decimals = 1) => {
      if (!Number.isFinite(Number(value))) return '';
      return Number(value).toFixed(decimals).replace(/\.?0+$/, '');
    };

    const readValue = (selector) => {
      const field = form.querySelector(selector);
      if (!field) return '';
      return String(field.value || '').trim();
    };

    const sectionEnabled = (toggleName) => {
      const toggle = form.querySelector(`input[name=&quot;${toggleName}&quot;]`);
      return !toggle || Boolean(toggle.checked);
    };

    const pushIssue = (collection, severity, message, selector = '') => {
      collection.push({ severity, message, selector });
    };

    const renderList = (root, items, emptyMessage) => {
      root.innerHTML = '';
      if (!items.length) {
        const li = document.createElement('li');
        li.className = 'muted';
        li.textContent = emptyMessage;
        root.appendChild(li);
        return;
      }
      items.forEach((item) => {
        const li = document.createElement('li');
        li.className = `visit-quality-item ${item.severity || ''}`.trim();
        li.textContent = item.message;
        root.appendChild(li);
      });
    };

    const setFormQualityAlert = (issues) => {
      let alertBox = form.querySelector('[data-form-validation-alert]');
      if (!alertBox) {
        alertBox = document.createElement('div');
        alertBox.className = 'alert error form-validation-alert';
        alertBox.setAttribute('data-form-validation-alert', '1');
        form.insertAdjacentElement('afterbegin', alertBox);
      }
      const details = issues.slice(0, 4).map((item) => item.message).join(' | ');
      alertBox.textContent = `Correggi i dati incoerenti prima del salvataggio: ${details}.`;
    };

    const clearFormQualityAlert = () => {
      const alertBox = form.querySelector('[data-form-validation-alert]');
      if (alertBox) {
        alertBox.remove();
      }
    };

    const updateFieldMarkers = (issues) => {
      form.querySelectorAll('.quality-invalid').forEach((field) => {
        field.classList.remove('input-invalid');
        field.classList.remove('quality-invalid');
      });
      const marked = new Set();
      issues.forEach((issue) => {
        if (!issue.selector || marked.has(issue.selector)) return;
        const field = form.querySelector(issue.selector);
        if (!field) return;
        field.classList.add('input-invalid');
        field.classList.add('quality-invalid');
        marked.add(issue.selector);
      });
    };

    const evaluate = () => {
      const clinicalAlerts = [];
      const qualityIssues = [];
      const blockingIssues = [];

      const pazienteId = readValue('[name=&quot;paziente_id&quot;]');
      const dataVisita = readValue('#data_visita');
      const anamnesiRecente = readValue('#anamnesi_recente');
      const peso = parseFieldNumber('#peso_kg');
      const altezza = parseFieldNumber('#altezza_cm');
      const bmi = parseFieldNumber('#bmi');
      const pas = parseFieldNumber('#pressione_sistolica');
      const pad = parseFieldNumber('#pressione_diastolica');
      const fc = parseFieldNumber('#frequenza_cardiaca');
      const spo2 = parseFieldNumber('#saturazione_spo2');
      const fe = parseFieldNumber('#eco_frazione_eiezione_ef');

      if (!pazienteId) pushIssue(blockingIssues, 'bad', 'Paziente non selezionato', '#paziente_id');
      if (!dataVisita) pushIssue(blockingIssues, 'bad', 'Data visita mancante', '#data_visita');
      if (peso === null) {
        pushIssue(qualityIssues, 'warn', 'Peso non inserito');
      }
      if (altezza === null) {
        pushIssue(qualityIssues, 'warn', 'Altezza non inserita');
      }
      if (!anamnesiRecente) {
        pushIssue(qualityIssues, 'warn', 'Anamnesi recente vuota');
      }

      if (sectionEnabled('enable_obiettivo')) {
        if (pas === null) pushIssue(blockingIssues, 'bad', 'PAS mancante (Esame obiettivo)', '#pressione_sistolica');
        if (pad === null) pushIssue(blockingIssues, 'bad', 'PAD mancante (Esame obiettivo)', '#pressione_diastolica');
      }

      if (pas !== null &amp;&amp; (pas < 70 || pas > 280)) {
        pushIssue(blockingIssues, 'bad', 'PAS fuori range realistico (70-280 mmHg)', '#pressione_sistolica');
      }
      if (pad !== null &amp;&amp; (pad < 30 || pad > 180)) {
        pushIssue(blockingIssues, 'bad', 'PAD fuori range realistico (30-180 mmHg)', '#pressione_diastolica');
      }
      if (pas !== null &amp;&amp; pad !== null &amp;&amp; pas <= pad) {
        pushIssue(blockingIssues, 'bad', 'Pressione incoerente: PAS deve essere maggiore di PAD', '#pressione_sistolica');
      }
      if (fc !== null &amp;&amp; (fc < 25 || fc > 230)) {
        pushIssue(blockingIssues, 'bad', 'Frequenza cardiaca fuori range realistico (25-230 bpm)', '#frequenza_cardiaca');
      }
      if (spo2 !== null &amp;&amp; (spo2 < 50 || spo2 > 100)) {
        pushIssue(blockingIssues, 'bad', 'Saturazione SpO2 fuori range realistico (50-100%)', '#saturazione_spo2');
      }
      if (peso !== null &amp;&amp; (peso < 20 || peso > 350)) {
        pushIssue(blockingIssues, 'bad', 'Peso fuori range realistico (20-350 kg)', '#peso_kg');
      }
      if (altezza !== null &amp;&amp; (altezza < 90 || altezza > 240)) {
        pushIssue(blockingIssues, 'bad', 'Altezza fuori range realistico (90-240 cm)', '#altezza_cm');
      }
      if (fe !== null &amp;&amp; (fe < 10 || fe > 85)) {
        pushIssue(blockingIssues, 'bad', 'FE fuori range realistico (10-85%)', '#eco_frazione_eiezione_ef');
      }

      if (pas !== null &amp;&amp; pad !== null) {
        if (pas >= 180 || pad >= 110) {
          pushIssue(clinicalAlerts, 'bad', `PA molto alta: ${Math.round(pas)}/${Math.round(pad)} mmHg`);
        } else if (pas >= 140 || pad >= 90) {
          pushIssue(clinicalAlerts, 'warn', `PA alta: ${Math.round(pas)}/${Math.round(pad)} mmHg`);
        }
      }

      if (spo2 !== null) {
        if (spo2 < 90) {
          pushIssue(clinicalAlerts, 'bad', `SpO2 bassa: ${Math.round(spo2)}%`);
        } else if (spo2 < 95) {
          pushIssue(clinicalAlerts, 'warn', `SpO2 borderline: ${Math.round(spo2)}%`);
        }
      }

      if (fe !== null) {
        if (fe < 40) {
          pushIssue(clinicalAlerts, 'bad', `FE ridotta severamente: ${formatValue(fe, 0)}%`);
        } else if (fe < 50) {
          pushIssue(clinicalAlerts, 'warn', `FE ridotta: ${formatValue(fe, 0)}%`);
        }
      }

      if (bmi !== null) {
        if (bmi >= 35) {
          pushIssue(clinicalAlerts, 'bad', `BMI molto elevato: ${formatValue(bmi, 1)}`);
        } else if (bmi >= 30) {
          pushIssue(clinicalAlerts, 'warn', `BMI elevato: ${formatValue(bmi, 1)}`);
        } else if (bmi >= 25) {
          pushIssue(clinicalAlerts, 'warn', `BMI in sovrappeso: ${formatValue(bmi, 1)}`);
        }
      }

      const terapiaItemsRaw = readValue('#terapia_items');
      if (sectionEnabled('enable_terapia') &amp;&amp; terapiaItemsRaw) {
        const terapiaItems = parseJsonSafe(terapiaItemsRaw, []);
        if (Array.isArray(terapiaItems) &amp;&amp; terapiaItems.length > 12) {
          pushIssue(qualityIssues, 'warn', `Terapia con ${terapiaItems.length} righe: verifica eventuali duplicati`);
        }
      }

      blockingIssues.forEach((issue) => qualityIssues.unshift(issue));

      renderList(clinicalRoot, clinicalAlerts, 'Nessun alert clinico al momento.');
      renderList(qualityRoot, qualityIssues, 'Nessun problema dati rilevato.');

      qualityBadge.classList.remove('ok', 'warn', 'skip', 'bad');
      if (blockingIssues.length) {
        qualityBadge.classList.add('bad');
        qualityBadge.textContent = `Da correggere: ${blockingIssues.length}`;
      } else if (qualityIssues.length || clinicalAlerts.length) {
        qualityBadge.classList.add('warn');
        qualityBadge.textContent = `Attenzione: ${qualityIssues.length + clinicalAlerts.length}`;
      } else {
        qualityBadge.classList.add('ok');
        qualityBadge.textContent = 'Pronto al salvataggio';
      }

      updateFieldMarkers(blockingIssues);
      if (!blockingIssues.length) {
        clearFormQualityAlert();
      }

      return { blockingIssues };
    };

    const refresh = () => evaluate();

    form.addEventListener('input', refresh);
    form.addEventListener('change', refresh);

    form.addEventListener('submit', (event) => {
      const { blockingIssues } = evaluate();
      if (!blockingIssues.length) return;
      event.preventDefault();
      setFormQualityAlert(blockingIssues);
      const firstSelector = blockingIssues[0]?.selector;
      if (firstSelector) {
