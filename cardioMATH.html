:root{
  --bg1:#eef7fc;
  --bg2:#dfeff9;
  --bg3:#cfe3f3;
  --ink:#16384c;
  --muted:#5c7990;
  --line:rgba(33,95,138,.14);
  --accent:#1e5f8a;
  --accent2:#4b9fd1;
  --card:rgba(255,255,255,.72);
  --glass:rgba(255,255,255,.60);
  --shadow:0 20px 50px rgba(19,66,96,.16);
  --shadow2:0 10px 26px rgba(19,66,96,.10);
}
*{box-sizing:border-box}
html,
body{
  margin:0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:#e6f1f8;
  background: linear-gradient(180deg,#081824 0%,#0b2233 50%,#0e2f47 100%);
}

body{
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 10% 16%, rgba(75,159,209,.22), transparent 30%),
    radial-gradient(circle at 86% 12%, rgba(30,95,138,.17), transparent 26%),
    radial-gradient(circle at 50% 100%, rgba(164,205,232,.35), transparent 35%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg3) 100%);
  overflow:auto;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none;
  background:
    linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px) 0 0/28px 28px,
    linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px) 0 0/28px 28px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.18), transparent 40%, transparent 60%, rgba(0,0,0,.10));
  opacity:.28;
}
.shell{height:100%;display:grid;grid-template-rows:auto auto 1fr;gap:16px;padding:20px;position:relative;z-index:1}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 20px;border-radius:28px;background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.62));border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(16px) saturate(150%);box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:16px;min-width:0}
.logo{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg, var(--accent), var(--accent2));box-shadow:0 14px 28px rgba(30,95,138,.28)}
h1{margin:0;font-size:clamp(1.5rem,2.8vw,2.2rem);letter-spacing:-.03em;line-height:1.02;color:#143248}
.subtitle{margin-top:6px;color:var(--muted);font-size:.97rem}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid var(--line);box-shadow:var(--shadow2);font-weight:700;color:#204d6a}
.dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 0 rgba(30,95,138,.35);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(30,95,138,.35)}70%{box-shadow:0 0 0 12px rgba(30,95,138,0)}100%{box-shadow:0 0 0 0 rgba(30,95,138,0)}}
.switcher{display:flex;gap:10px;flex-wrap:wrap;padding:8px;border-radius:22px;background:linear-gradient(180deg, rgba(255,255,255,.80), rgba(255,255,255,.62));border:1px solid rgba(255,255,255,.72);backdrop-filter:blur(14px);box-shadow:var(--shadow2)}
.tabbtn{appearance:none;border:none;background:transparent;padding:14px 18px;border-radius:16px;font-size:.98rem;font-weight:800;letter-spacing:-.01em;color:var(--muted);cursor:pointer;transition:.22s ease}
.tabbtn:hover{transform:translateY(-1px);color:#17384d}
.tabbtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 12px 22px rgba(30,95,138,.24)}

.workspace{
  min-height:calc(100vh - 160px);
  padding:16px;
  border-radius:20px;
  background:transparent;
  border:none;
  box-shadow:none;
}

.panel{display:none;height:100%}
.panel.active{display:block}

.frame{
  height:100%;
  min-height:600px;
  border-radius:16px;
  overflow:hidden;
  background:#ffffff;
}

iframe{width:100%;height:100%;border:0;display:block;background:#fff}
@media (max-width:900px){.shell{padding:14px}.topbar{flex-direction:column;align-items:stretch}}
@media (max-width:640px){.switcher{display:grid;grid-template-columns:1fr 1fr}.tabbtn{width:100%}}
</style>
</head>

/* base.css */
/**
 * BASE.CSS
 * Variabili CSS, reset, tipografia e stili fondamentali
 * Questo file viene caricato per primo
 */
/* ============================================
   VARIABILI CSS UNIFICATE
   ============================================ */
:root {
  /* Palette colori primari */
  --color-primary: #1565C0;
  --color-accent: #00897B;
  --color-success: #2E7D32;
  --color-warning: #FFB300;
  --color-danger: #C62828;
  
  /* Scala grigi */
  --gray-50: #FAFAFA;
  --gray-100: #F5F5F5;
  --gray-200: #ECEFF1;
  --gray-300: #DDE3E7;
  --gray-400: #CFD8DC;
  --gray-500: #94A3B8;
  --gray-600: #64748B;
  --gray-700: #546E7A;
  --gray-800: #334155;
  --gray-900: #102027;
  
  /* Colori semantici */
  --bg: var(--gray-200);
  --surface: #FFFFFF;
  --text: var(--gray-900);
  --text-muted: var(--gray-700);
  --border: var(--gray-300);
  --border-soft: rgba(148, 163, 184, 0.2);
  --state-info-bg: rgba(59, 130, 246, 0.12);
  --state-info-border: rgba(59, 130, 246, 0.35);
  --state-info-text: #1d4ed8;
  --state-ok-bg: rgba(34, 197, 94, 0.14);
  --state-ok-border: rgba(34, 197, 94, 0.35);
  --state-ok-text: #166534;
  --state-warn-bg: rgba(245, 158, 11, 0.18);
  --state-warn-border: rgba(245, 158, 11, 0.36);
  --state-warn-text: #92400e;
  --state-danger-bg: rgba(239, 68, 68, 0.12);
  --state-danger-border: rgba(239, 68, 68, 0.38);
  --state-danger-text: #b91c1c;
  
  /* Bordo speciale eco */
  --eco-border: #64ABA4;

  /* Compat alias (legacy app classes/overrides) */
  --primary: var(--color-primary);
  --accent: var(--color-accent);
  --positive: var(--color-success);
  --warning: var(--color-warning);
  --critical: var(--color-danger);
  --muted: var(--text-muted);
  --eco-table-border: var(--eco-border);
  --form-section-bg: #FBFCFD;
  --form-section-border: #EEF1F4;
  --shadow: var(--shadow-md);
  
  /* Spacing scale (4px base) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  
  /* Border radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  
  /* Shadows */
  --shadow-sm: 0 8px 18px rgba(15, 35, 55, 0.08);
  --shadow-md: 0 14px 34px rgba(16, 32, 39, 0.12);
  --shadow-lg: 0 18px 34px rgba(16, 32, 39, 0.16);
  
  /* Typography */
  --font-sans: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Marcellus', Georgia, serif;
  --font-lato: 'Lato', sans-serif;
  
  /* Font sizes */
  --text-xs: 11px;
  --text-sm: 12px;
  --text-base: 14px;
  --text-md: 15px;
  --text-lg: 17px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --title-page-size: clamp(24px, 2.3vw, 30px);
  --title-section-size: 18px;
  --title-block-size: 16px;
  
  /* Page gutter */
  --page-gutter: clamp(14px, 4.5vw, 8vw);
  
  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-base: 0.2s ease;
  --transition-slow: 0.3s ease;
  
  /* Z-index scale */
  --z-base: 1;
  --z-dropdown: 20;
  --z-sticky: 30;
  --z-modal: 50;
  --z-overlay: 80;
  --z-toast: 200;
}
/* ============================================
   RESET BASE
   ============================================ */
*,
*::before,
*::after {
  box-sizing: border-box;
}
* {
  margin: 0;
  padding: 0;
}
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: 1.45;
  color: var(--text);
  background: radial-gradient(circle at 20% 20%, rgba(21, 101, 192, 0.12), transparent 60%),
              radial-gradient(circle at 80% 10%, rgba(0, 137, 123, 0.12), transparent 50%),
              var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
/* ============================================
   TIPOGRAFIA
   ============================================ */
h1, h2, h3, h4, h5, h6 {
  margin: 0;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
}
h1 {
  font-size: var(--title-page-size);
  font-weight: 700;
}
h2 {
  font-size: var(--title-section-size);
}
h3 {
  font-size: var(--title-block-size);
}
h4 {
  font-size: var(--text-lg);
}
p {
  margin: 0;
}
a {
  color: var(--color-primary);
  text-decoration: none;
  transition: color var(--transition-base);
}
a:hover {
  color: var(--color-accent);
}
/* ============================================
   UTILITY CLASSES
   ============================================ */
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.is-hidden {
  display: none !important;
}
.truncate {
  max-width: 220px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.muted {
  color: var(--text-muted);
}
.no-print {}
/* ============================================
   BACKGROUND DECORATIVO
   ============================================ */
.background-orbit {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(120deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0)),
    radial-gradient(circle at 90% 80%, rgba(21, 101, 192, 0.15), transparent 55%);
  z-index: -1;
}
/* ============================================
   ANIMAZIONI
   ============================================ */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes motionPop {
  0% {
    opacity: 0.55;
    transform: translateY(6px) scale(0.99);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
@keyframes segmentActivePop {
  0% {
    transform: translateY(0) scale(0.98);
  }
  100% {
    transform: translateY(-1px) scale(1);
  }
}
.motion-pop {
  animation: motionPop 0.24s ease;
}
/* Riduci animazioni per accessibilità */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* components.css */
/**
 * COMPONENTS.CSS
 * Componenti riutilizzabili: bottoni, card, form, tabelle, badge, alert
 */
/* ============================================
   BOTTONI
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  min-height: 32px;
  padding: 6px 12px;
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform var(--transition-base), 
              box-shadow var(--transition-base);
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
/* Varianti colore */
.btn-primary {
  background: linear-gradient(135deg, var(--color-primary), #0d47a1);
  color: white;
}
.btn-secondary {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 249, 0.98));
  color: var(--gray-900);
  border-color: var(--border-soft);
}
.btn-secondary:hover {
  background: var(--gray-100);
  border-color: var(--gray-600);
}
.btn-success {
  background: rgba(34, 197, 94, 0.14);
  color: #166534;
  border-color: rgba(34, 197, 94, 0.34);
}
.btn-danger {
  background: rgba(239, 68, 68, 0.14);
  color: #b91c1c;
  border-color: rgba(239, 68, 68, 0.34);
}
.btn-info {
  background: rgba(59, 130, 246, 0.14);
  color: #1d4ed8;
  border-color: rgba(59, 130, 246, 0.34);
}
/* Dimensioni */
.btn-compact {
  min-height: 28px;
  padding: 4px 10px;
  font-size: var(--text-xs);
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
/* ============================================
   CARD
   ============================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-6);
  box-shadow: var(--shadow-md);
  animation: fadeIn 0.6s ease both;
}
.card-title {
  font-size: var(--text-xl);
  font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: 0.01em;
  line-height: 1.25;
}
.card-subtitle {
  font-size: var(--text-xs);
  font-weight: 800;
  color: var(--text-muted);
  margin: 4px 0 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.card-text {
  color: var(--text-muted);
  margin-bottom: var(--space-4);
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.card.highlight {
  margin-top: var(--space-6);
  background: linear-gradient(120deg, rgba(21, 101, 192, 0.08), rgba(0, 137, 123, 0.06));
}
/* ============================================
   FORM ELEMENTS
   ============================================ */
.form {
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
}
.form-grid {
  display: grid;
  gap: var(--space-2) var(--space-3);
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}
.form-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-field.full {
  grid-column: 1 / -1;
}
label {
  font-size: var(--text-xs);
  font-weight: 700;
  color: #475569;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1.2;
}
input,
select,
textarea {
  min-height: 36px;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: var(--text-md);
  background: white;
  color: var(--text);
  transition: border-color var(--transition-base),
              box-shadow var(--transition-base);
}
input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: rgba(37, 99, 235, 0.8);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}
input:disabled,
select:disabled,
textarea:disabled {
  background: var(--gray-100);
  color: var(--text-muted);
  cursor: not-allowed;
}

/* Calculated/read-only fields with stronger visual affordance */
.field-computed,
.field-computed:disabled,
.field-computed[readonly] {
  background: var(--gray-100) !important;
  border: 1.5px solid var(--border) !important;
  color: var(--text-muted) !important;
  cursor: not-allowed !important;
  caret-color: transparent;
  pointer-events: none;
  opacity: 1;
}
input::placeholder,
textarea::placeholder {
  color: var(--gray-600);
}
textarea {
  min-height: 84px;
  resize: vertical;
}
.input-group {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.input-group input {
  flex: 1;
}
.input-suffix {
  font-size: var(--text-sm);
  color: var(--text-muted);
  white-space: nowrap;
}
/* Validazione */
.form-field.is-missing label {
  color: #1d4ed8;
}
.input-missing {
  border-color: #3b82f6 !important;
  background: rgba(59, 130, 246, 0.08) !important;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16) !important;
}
.form-field .input-missing[type=&quot;date&quot;] {
  color: #1d4ed8 !important;
}
.form-field.is-invalid label {
  color: var(--color-danger);
}
.form-field.is-invalid input,
.form-field.is-invalid select,
.form-field.is-invalid textarea {
  border-color: var(--color-danger);
  background: rgba(198, 40, 40, 0.06);
  box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.12);
}
.field-error {
  color: var(--color-danger);
  font-size: var(--text-sm);
}
.input-invalid {
  border-color: var(--color-danger) !important;
  background: rgba(198, 40, 40, 0.06) !important;
  box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.12) !important;
}
.form-field .input-invalid[type=&quot;date&quot;] {
  color: var(--color-danger) !important;
}
.form-field.is-missing .input-suffix {
  color: #1d4ed8;
}
.form-field.is-invalid .input-suffix {
  color: var(--color-danger);
}
.form-validation-alert {
  border-width: 2px;
}
.switch-card.is-invalid {
  border-color: rgba(198, 40, 40, 0.75) !important;
  box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.18);
}
.switch-card.is-invalid .switch-label,
.print-cert-check.is-invalid span {
  color: var(--color-danger);
}
.print-cert-check.is-invalid {
  outline: 2px solid rgba(198, 40, 40, 0.5);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
  padding: 2px 4px;
}
.form-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.form-actions .btn,
.btn-group .btn,
.table-actions .btn.action-btn {
  min-width: 104px;
  min-height: 32px;
}
.form-separator {
  border: none;
  border-top: 1px solid var(--border);
  margin: var(--space-5) 0;
}
/* ============================================
   TABELLE
   ============================================ */
.table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--text-base);
  font-variant-numeric: tabular-nums;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.table thead th {
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text);
  background: var(--gray-100);
  padding: var(--space-3);
  border-bottom: 1px solid var(--border-soft);
}
.table td {
  padding: var(--space-3);
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-soft);
}
.table tbody tr:last-child td {
  border-bottom: none;
}
.table tbody tr:hover {
  background: rgba(59, 130, 246, 0.06);
}
.table th.num,
.table td.num {
  text-align: right;
}
.table.compact td {
  padding: var(--space-2);
}
.table-actions {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  align-items: center;
}
.table-actions form {
  display: inline-flex;
  margin: 0;
}
.table-actions .btn.action-btn {
  min-height: 30px;
  padding: 5px 10px;
}
.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.table-wrap.terapia-table-wrap {
  overflow: visible;
}
/* ============================================
   BADGE E STATUS
   ============================================ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(59, 130, 246, 0.3);
  background: rgba(59, 130, 246, 0.12);
  color: #1d4ed8;
  font-size: var(--text-sm);
  font-weight: 600;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 20px;
  padding: 1px 9px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(71, 85, 105, 0.4);
  background: rgba(226, 232, 240, 0.9);
  color: #0f172a;
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  vertical-align: middle;
  transition: all var(--transition-base);
}
.status-badge.ok {
  background: rgba(34, 197, 94, 0.24);
  border-color: rgba(22, 163, 74, 0.65);
  color: #14532d;
  font-weight: 900;
}
.status-badge.warn {
  background: rgba(245, 158, 11, 0.28);
  border-color: rgba(180, 83, 9, 0.62);
  color: #78350f;
  font-weight: 900;
}
.status-badge.skip {
  background: rgba(148, 163, 184, 0.2);
  border-color: rgba(71, 85, 105, 0.5);
  color: #334155;
}
.status-badge.info {
  background: rgba(59, 130, 246, 0.18);
  border-color: rgba(37, 99, 235, 0.52);
  color: #1e3a8a;
}
/* ============================================
   ALERT E TOAST
   ============================================ */
.alert {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px var(--space-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-4);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}
.alert::before {
  content: &quot;i&quot;;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-weight: 700;
  font-size: var(--text-sm);
  background: rgba(21, 101, 192, 0.2);
  color: var(--color-primary);
  flex-shrink: 0;
  margin-top: 1px;
}
.alert.success {
  border-color: var(--state-ok-border);
  background: linear-gradient(120deg, var(--state-ok-bg), transparent), var(--surface);
}
.alert.success::before {
  content: &quot;✓&quot;;
  background: var(--state-ok-bg);
  color: var(--state-ok-text);
}
.alert.error {
  border-color: var(--state-danger-border);
  background: linear-gradient(120deg, var(--state-danger-bg), transparent), var(--surface);
}
.alert.error::before {
  content: &quot;!&quot;;
  background: var(--state-danger-bg);
  color: var(--state-danger-text);
}
.alert .error-field-list {
  margin: 8px 0 0 2px;
  padding-left: 16px;
  display: grid;
  gap: 2px;
}
.alert .error-field-list li {
  color: var(--text-muted);
  font-size: var(--text-sm);
}
.alert-stack {
  position: fixed;
  top: 88px;
  right: var(--space-4);
  display: grid;
  gap: var(--space-2);
  width: min(440px, calc(100vw - 24px));
  z-index: var(--z-toast);
}
.alert.alert-popup {
  margin: 0;
  border-width: 1.5px;
  box-shadow: var(--shadow-lg);
  background: rgba(255, 255, 255, 0.98);
  animation: motionPop 0.2s ease;
}
.alert-close {
  margin-left: auto;
  border: 0;
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}
.toast {
  position: fixed;
  top: 90px;
  right: var(--space-6);
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  font-weight: 600;
  z-index: var(--z-toast);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  transition: opacity var(--transition-base),
              transform var(--transition-base);
}
/* ============================================
   PILLS E CHECKBOX CUSTOM
   ============================================ */
.pill-check {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.pill-check input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.pill-check span {
  display: inline-flex;
  align-items: center;
  padding: 7px var(--space-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  background: white;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition-base);
}
.pill-check input:checked + span {
  background: rgba(59, 130, 246, 0.12);
  border-color: rgba(59, 130, 246, 0.35);
  color: #1d4ed8;
}
.pill-check input:focus-visible + span {
  outline: 2px solid rgba(37, 99, 235, 0.7);
  outline-offset: 2px;
}
.pill-label {
  font-size: var(--text-sm);
  line-height: 1.2;
  font-weight: 600;
  text-align: center;
  color: inherit;
}
/* ============================================
   SWITCH
   ============================================ */
.switch-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-direction: row-reverse;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: rgba(0, 137, 123, 0.06);
  position: relative;
}
.switch-card input {
  position: absolute;
  opacity: 0;
}
.switch {
  width: 44px;
  height: 24px;
  border-radius: var(--radius-pill);
  background: rgba(148, 163, 184, 0.85);
  position: relative;
  transition: background var(--transition-base);
}
.switch::after {
  content: &quot;&quot;;
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 4px 10px rgba(16, 32, 39, 0.2);
  transition: transform var(--transition-base);
}
.switch-card input:checked + .switch {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}
.switch-card input:checked + .switch::after {
  transform: translateX(20px);
}
.switch-card input:focus-visible + .switch {
  outline: 2px solid rgba(21, 101, 192, 0.5);
  outline-offset: 3px;
}
.switch-label {
  font-weight: 700;
  color: var(--text);
}
.switch-status {
  font-size: var(--text-sm);
  color: var(--text-muted);
  font-weight: 600;
}
/* ============================================
   SEARCH
   ============================================ */
.search-input {
  padding-left: 38px;
  background-image: url(&quot;data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='%23546E7A' viewBox='0 0 24 24'><path d='M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79l5 5 1.5-1.5-5-5zm-5.5 0A4.5 4.5 0 1 1 10 5a4.5 4.5 0 0 1 0 9z'/></svg>&quot;);
  background-repeat: no-repeat;
  background-position: 12px center;
  background-size: 16px;
}
.search-results-list {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  margin-top: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  max-height: 240px;
  overflow-y: auto;
  z-index: var(--z-overlay);
}
.search-results {
  position: relative;
  min-height: 0;
}
.search-result {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px var(--space-3);
  border: none;
  background: transparent;
  font-family: inherit;
  cursor: pointer;
  border-bottom: 1px solid var(--border-soft);
}
.search-result:last-child {
  border-bottom: none;
}
.search-result:hover,
.search-result:focus {
  background: rgba(59, 130, 246, 0.08);
  outline: none;
}
.search-result mark {
  background: rgba(59, 130, 246, 0.15);
  color: #1d4ed8;
  padding: 0 2px;
  border-radius: 4px;
}
.selected-visits {
  margin: var(--space-2) 0 0;
  padding-left: 20px;
  color: var(--text-muted);
}
.selected-visits li {
  margin: 4px 0;
}
.file-list {
  margin: 0;
  padding-left: 20px;
  color: var(--text-muted);
}
/* ============================================
   EMPTY STATE
   ============================================ */
.empty {
  text-align: center;
  color: #334155;
  padding: 12px 10px;
  border: 1px dashed rgba(100, 116, 139, 0.45);
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(241, 245, 249, 0.9));
  font-weight: 700;
  line-height: 1.3;
}
.empty::before {
  content: &quot;\25CB&quot;;
  display: block;
  font-size: 18px;
  color: #94a3b8;
  margin-bottom: 2px;
}
.empty::after {
  content: &quot;Aggiungi dati per iniziare.&quot;;
  display: block;
  margin-top: 2px;
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
}
.empty-state {
  display: block;
  margin: 6px 0;
  padding: 10px 12px;
  border: 1px dashed rgba(100, 116, 139, 0.3);
  border-radius: 10px;
  background: rgba(241, 245, 249, 0.8);
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.35;
}
td.empty {
  text-align: center !important;
  font-weight: 700;
  color: #475569 !important;
  background: rgba(248, 250, 252, 0.92);
}
.help {
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, &quot;Liberation Mono&quot;, monospace;
}
.checkbox-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

/* Legacy semantic wrappers (now clean, no forced overrides) */
.form-card {
  margin-bottom: var(--space-4);
  background: #fbfcfd;
  border-color: #eef1f4;
}
.pagination-actions {
  display: inline-flex;
  gap: var(--space-2);
  align-items: center;
}

/* Toggle used in planning filters */
.toggle {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}
.toggle input[type=&quot;checkbox&quot;] {
  width: 14px;
  height: 14px;
  accent-color: var(--color-primary);
}

/* Small metadata text near switches */
.switch-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* Print mode controls in visit form (screen only controls) */
.print-mode {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  margin-right: var(--space-2);
}
.print-cert-check {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}
.print-cert-check input {
  width: 14px;
  height: 14px;
  accent-color: var(--color-primary);
}
.print-cert-template {
  gap: 8px;
}
.print-cert-template select {
  min-width: 172px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: var(--text-sm);
  padding: 0 10px;
}


/* layout.css */
/**
 * LAYOUT.CSS
 * Layout strutturali: header, navigation, grid, container, spacing
 */
/* ============================================
   TOPBAR / HEADER
   ============================================ */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1200;
  min-height: 66px;
  padding: var(--space-3) var(--page-gutter);
  background: rgba(255, 255, 255, 0.92);
  color: var(--text);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(14px);
}
.brand {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.brand-mark {
  width: 60px;
  height: 60px;
  display: grid;
  place-items: center;
  border-radius: var(--radius-md);
  overflow: hidden;
}
.brand-logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.brand-title {
  font-family: var(--font-serif);
  font-size: var(--title-section-size);
  letter-spacing: 0.4px;
}
.brand-subtitle,
.topbar-meta {
  font-size: var(--text-base);
  color: var(--text-muted);
}
.topbar-user {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.role-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid rgba(59, 130, 246, 0.3);
  border-radius: var(--radius-pill);
  background: rgba(59, 130, 246, 0.14);
  color: #1d4ed8;
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: 0.03em;
}
/* ============================================
   NAVIGATION
   ============================================ */
.navbar {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  padding: 10px var(--page-gutter);
  background: rgba(255, 255, 255, 0.88);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.nav-mobile-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  padding: 6px var(--space-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--surface);
  color: var(--text);
  font-size: var(--text-sm);
  font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.nav-mobile-toggle:focus-visible {
  outline: 2px solid rgba(37, 99, 235, 0.7);
  outline-offset: 2px;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 100%;
}
.nav-item {
  display: inline-flex;
  align-items: center;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  font-size: var(--text-base);
  font-weight: 600;
  text-decoration: none;
  background: transparent;
  transition: all var(--transition-base);
  position: relative;
}
.nav-item:hover,
.nav-item.active {
  background: rgba(59, 130, 246, 0.12);
  color: var(--text);
}
.nav-item.active::after {
  content: &quot;&quot;;
  position: absolute;
  left: var(--space-3);
  right: var(--space-3);
  bottom: -6px;
  height: 2px;
  background: var(--color-primary);
  border-radius: var(--radius-pill);
}
/* ============================================
   MAIN CONTENT AREA
   ============================================ */
.main {
  padding: var(--space-6) var(--page-gutter) 72px;
}
/* ============================================
   PAGE HEADER
   ============================================ */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-6);
  margin-bottom: var(--space-6);
}
.page-actions {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
}
.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  font-size: var(--text-sm);
  color: var(--text-muted);
  margin-bottom: var(--space-3);
}
.breadcrumb a {
  color: var(--color-primary);
  font-weight: 600;
}
.breadcrumb span {
  color: var(--text-muted);
}
.page-subtitle {
  margin: 6px 0 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
  letter-spacing: 0.015em;
}
/* ============================================
   GRID SYSTEMS
   ============================================ */
.grid {
  display: grid;
  gap: var(--space-5);
}
.grid-3 {
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}
.tile-grid {
  display: grid;
  gap: var(--space-5);
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}
.tile {
  display: block;
  padding: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-md);
  text-decoration: none;
  color: var(--text);
  transition: transform var(--transition-base),
              box-shadow var(--transition-base);
}
.tile:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.tile-title {
  font-size: var(--title-section-size);
  font-weight: 700;
  margin-bottom: 6px;
}
.tile-text {
  color: var(--text-muted);
  font-size: var(--text-sm);
}
/* ============================================
   KPI GRID
   ============================================ */
.kpi-grid {
  display: grid;
  gap: var(--space-4);
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  margin-top: var(--space-2);
}
.kpi-card {
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}
.kpi-label {
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.kpi-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.kpi-meta {
  font-size: var(--text-sm);
  color: var(--text-muted);
  margin-top: var(--space-2);
}
.mini-progress {
  height: 8px;
  margin-top: var(--space-2);
  border-radius: var(--radius-pill);
  overflow: hidden;
  background: var(--border-soft);
}
.mini-progress-fill {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), #6366f1);
  border-radius: inherit;
  transition: width var(--transition-base);
}
/* ============================================
   SEGMENT CONTROL / TAB NAVIGATION
   ============================================ */
.segment-control {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  padding: 6px;
  border: 1px solid rgba(100, 116, 139, 0.35);
  border-radius: var(--radius-pill);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.92));
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-3);
}
.segment-btn {
  min-height: 30px;
  padding: 6px var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.3);
  border-radius: var(--radius-pill);
  background: rgba(255, 255, 255, 0.88);
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: 0.01em;
  color: #334155;
  cursor: pointer;
  transition: transform var(--transition-base),
              background-color var(--transition-base),
              border-color var(--transition-base),
              color var(--transition-base);
}
.segment-btn:hover {
  color: var(--text);
  border-color: rgba(37, 99, 235, 0.32);
  background: rgba(59, 130, 246, 0.11);
  transform: translateY(-1px);
}
.segment-btn.active {
  color: white;
  background: linear-gradient(135deg, var(--color-primary), #0d47a1);
  border-color: rgba(13, 71, 161, 0.8);
  box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
  transform: translateY(-1px);
  animation: segmentActivePop 0.2s ease;
}
/* ============================================
   FOOTER
   ============================================ */
.footer {
  padding: var(--space-6) var(--page-gutter) 40px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--space-3);
}
/* ============================================
   PAGINATION
   ============================================ */
.pagination {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-3);
  margin-top: 18px;
  padding: var(--space-2) 0;
  flex-wrap: wrap;
}
.pagination-info {
  color: var(--text-muted);
  font-weight: 600;
}
/* ============================================
   STICKY ELEMENTS
   ============================================ */
.switches-bottom {
  margin-top: var(--space-6);
  position: sticky;
  bottom: var(--space-4);
  background: rgba(255, 255, 255, 0.96);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(6px);
  z-index: var(--z-sticky);
}
.visit-nav {
  position: sticky;
  top: 84px;
  z-index: var(--z-sticky);
  margin: var(--space-2) 0 var(--space-3);
}
/* ============================================
   SECTION SPACING
   ============================================ */
.section-actions {
  display: flex;
  justify-content: flex-end;
  margin: -6px 0 var(--space-3);
}
.page-section-nav {
  padding: 10px var(--space-3);
}
.page-section-nav .segment-control {
  margin-bottom: 0;
}
.page-section-nav .segment-control + .segment-control {
  margin-top: var(--space-2);
}


/* app-specific.css */
/**
 * APP-SPECIFIC.CSS
 * Componenti specifici dell'applicazione medica:
 * - Planning/Calendar
 * - ECG Tables
 * - Visit Workflow
 * - Terapia
 * - Login
 */
/* ============================================
   TOPBAR GLOBAL SEARCH
   ============================================ */
.topbar-search {
  position: relative;
  flex: 1 1 420px;
  max-width: 640px;

/* ============================================
   EXAM BLOCKS
   ============================================ */
.exam-block {
  margin-top: var(--space-4);
  padding: var(--space-4);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.96);
  box-shadow: var(--shadow-md);
}
.exam-header {
  display: block;
  margin-bottom: var(--space-3);
}
.exam-heading {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.exam-title-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.exam-header h3 {
  margin: 0;
  font-size: 18px;
}
.exam-meta {
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.exam-inline-switch,
.visit-side-switch {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.exam-inline-switch input[type=&quot;checkbox&quot;],
.visit-side-switch input[type=&quot;checkbox&quot;] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
  pointer-events: none;
}
.exam-inline-switch .switch-slider,
.visit-side-switch .switch-slider {
  width: 42px;
  height: 24px;
  border-radius: 999px;
  background: rgba(148, 163, 184, 0.9);
  position: relative;
  transition: background var(--transition-base);
}
.exam-inline-switch .switch-slider::after,
.visit-side-switch .switch-slider::after {
  content: &quot;&quot;;
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 7px rgba(15, 23, 42, 0.24);
  transition: transform var(--transition-base);
}
.exam-inline-switch input[type=&quot;checkbox&quot;]:checked + .switch-slider,
.visit-side-switch input[type=&quot;checkbox&quot;]:checked + .switch-slider {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}
.exam-inline-switch input[type=&quot;checkbox&quot;]:checked + .switch-slider::after,
.visit-side-switch input[type=&quot;checkbox&quot;]:checked + .switch-slider::after {
  transform: translateX(18px);
}
.exam-inline-switch input[type=&quot;checkbox&quot;]:focus-visible + .switch-slider,
.visit-side-switch input[type=&quot;checkbox&quot;]:focus-visible + .switch-slider {
  outline: 2px solid rgba(37, 99, 235, 0.6);
  outline-offset: 2px;
}
.exam-inline-switch.is-invalid .switch-slider,
.visit-side-switch.is-invalid .switch-slider {
  box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.35);
}
.exam-block.is-disabled {
  opacity: 0.72;
  background: rgba(148, 163, 184, 0.14);
  border-color: rgba(148, 163, 184, 0.45);
  box-shadow: none;
}
.exam-block.is-disabled .exam-meta,
.exam-block.is-disabled .card-subtitle {
  color: var(--text-muted);
}

.eco-pro-modal {
  position: fixed;
  inset: 0;
  z-index: 12020;
  display: flex;
  align-items: center;
  justify-content: center;
}
.eco-pro-modal.is-hidden {
  display: none;
}
.eco-pro-modal__backdrop {
  position: absolute;
  inset: 0;
  background: rgba(2, 6, 23, 0.5);
}
.eco-pro-modal__panel {
  position: relative;
  width: min(1180px, calc(100vw - 32px));
  max-height: calc(100vh - 40px);
  overflow: auto;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: rgba(248, 250, 252, 0.98);
  box-shadow: 0 18px 56px rgba(15, 23, 42, 0.34);
  padding: var(--space-4);
}
.eco-pro-modal__header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}
.eco-pro-layout {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: var(--space-3);
  align-items: start;
}
.eco-pro-main {
  min-width: 0;
}
.eco-pro-context-alert {
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid rgba(220, 38, 38, 0.32);
  border-radius: var(--radius-sm);
  background: rgba(254, 242, 242, 0.95);
  color: #7f1d1d;
  font-size: 12px;
  line-height: 1.45;
}
.eco-pro-context-alert strong {
  font-weight: 700;
}
.eco-pro-context-alert .btn {
  margin-right: 6px;
  margin-top: 6px;
}
.eco-pro-side-menu {
  position: sticky;
  top: 0;
  border: 1px solid rgba(100, 116, 139, 0.45);
  border-radius: var(--radius-md);
  background: #1f2937;
  padding: 10px;
}
.eco-pro-side-title {
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.eco-pro-sections-nav {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 0;
}
.eco-pro-section-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
}
.eco-pro-section-chip {
  width: 100%;
  border: 1px solid #4b5563;
  background: #374151;
  color: #e5e7eb;
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  pointer-events: auto;
  appearance: none;
  -webkit-appearance: none;
  text-align: left;
}
.eco-pro-section-chip.is-complete {
  border-color: #4b5563;
  background: #2f3948;
  color: #cbd5e1;
}
.eco-pro-section-chip.is-selected {
  border-color: rgba(96, 165, 250, 0.9);
  background: rgba(37, 99, 235, 0.22);
  color: #eff6ff;
}
.eco-pro-section-chip.is-active {
  border-color: rgba(37, 99, 235, 0.9);
  background: rgba(37, 99, 235, 0.28);
  color: #eff6ff;
}
.eco-pro-section-chip.is-active.is-complete {
  border-color: rgba(37, 99, 235, 0.95);
  background: rgba(37, 99, 235, 0.34);
  color: #eff6ff;
}
.eco-pro-section-chip.is-missing {
  border-color: rgba(220, 38, 38, 0.92);
  background: rgba(185, 28, 28, 0.24);
  color: #fee2e2;
}
.eco-pro-section-chip.is-selected.is-missing {
  border-color: rgba(239, 68, 68, 0.96);
  background: rgba(239, 68, 68, 0.28);
  color: #fff1f2;
}
.eco-pro-section-chip.is-active.is-missing {
  border-color: rgba(248, 113, 113, 1);
  background: rgba(220, 38, 38, 0.38);
  color: #fff1f2;
}
.eco-pro-switch {
  position: relative;
  width: 38px;
  height: 22px;
  display: inline-block;
  flex-shrink: 0;
}
.eco-pro-switch input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.eco-pro-switch-slider {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #111827;
  transition: background 0.2s ease, border-color 0.2s ease;
}
.eco-pro-switch-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 2px;
  border-radius: 50%;
  background: #e2e8f0;
  box-shadow: 0 1px 4px rgba(15, 23, 42, 0.4);
  transition: transform 0.2s ease;
}
.eco-pro-switch input:checked + .eco-pro-switch-slider {
  background: rgba(22, 163, 74, 0.8);
  border-color: rgba(22, 163, 74, 0.95);
}
.eco-pro-switch input:checked + .eco-pro-switch-slider::before {
  transform: translateX(16px);
  background: #f8fafc;
}
.eco-pro-switch input:focus-visible + .eco-pro-switch-slider {
  outline: 2px solid rgba(147, 197, 253, 0.95);
  outline-offset: 1px;
}
.eco-pro-hide {
  display: none !important;
}
.eco-pro-table-wrap {
  max-height: 46vh;
  overflow: auto;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
}
.eco-pro-table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
}
.eco-pro-table th,
.eco-pro-table td {
  border-bottom: 1px solid rgba(148, 163, 184, 0.32);
  vertical-align: middle;
  padding: 6px 8px;
  font-size: 13px;
}
.eco-pro-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #f8fafc;
  font-weight: 700;
}
.eco-pro-table tr.eco-pro-row-missing td {
  background: rgba(251, 191, 36, 0.12);
}
.eco-pro-table td:nth-child(1) {
  min-width: 280px;
  color: #0f172a;
}
.eco-pro-param-label {
  font-weight: 700;
}
.eco-pro-formula {
  margin-top: 3px;
  font-size: 11px;
  line-height: 1.25;
  color: #64748b;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.eco-pro-table td:nth-child(3) {
  min-width: 92px;
  white-space: nowrap;
  text-align: center;
  color: #475569;
}
.eco-pro-table td:nth-child(4) {
  min-width: 130px;
}
.eco-pro-table input {
  width: 100%;
  min-height: 32px;
  padding: 6px 8px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  background: #fff;
}
.eco-pro-table select {
  width: 100%;
  min-height: 32px;
  padding: 6px 8px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  background: #fff;
}
.eco-pro-table input[readonly] {
  background: #f1f5f9;
  color: #334155;
}
.eco-pro-status {
  font-size: 12px;
  font-weight: 600;
  white-space: normal;
  line-height: 1.3;
}
.eco-pro-status.ok {
  color: #166534;
}
.eco-pro-status.warn {
  color: #b45309;
}
.eco-pro-status.bad {
  color: #b91c1c;
}
.eco-pro-summary-box {
  margin-top: var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.35);
  background: rgba(248, 250, 252, 0.96);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  color: #0f172a;
  font-size: 13px;
  line-height: 1.38;
  display: grid;
  gap: 10px;
}
.eco-pro-summary-card {
  border: 1px dashed rgba(37, 99, 235, 0.5);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.92);
  padding: 10px;
  display: grid;
  gap: 8px;
}
.eco-pro-summary-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}
.eco-pro-values-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.eco-pro-values-table td {
  border: none;
  padding: 3px 6px;
  font-size: 12px;
  vertical-align: top;
}
.eco-pro-values-table td:nth-child(1) {
  width: 42%;
}
.eco-pro-values-table td:nth-child(2) {
  width: 36%;
}
.eco-pro-values-table td:nth-child(3) {
  width: 22%;
  text-align: right;
  color: #475569;
}
.eco-pro-summary-notice {
  display: none;
  margin-bottom: 8px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
}
.eco-pro-summary-notice.is-visible {
  display: block;
}
.eco-pro-summary-notice.is-error {
  background: rgba(239, 68, 68, 0.12);
  color: #991b1b;
  border: 1px solid rgba(220, 38, 38, 0.25);
}
.eco-pro-summary-notice.is-success {
  background: rgba(16, 185, 129, 0.14);
  color: #065f46;
  border: 1px solid rgba(16, 185, 129, 0.28);
}
.eco-pro-summary-content {
  display: grid;
  gap: 8px;
}
.eco-pro-summary-list {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 4px;
}
.eco-pro-summary-list li {
  margin: 0;
  padding: 0;
  color: #0f172a;
}
.eco-pro-summary-conclusion {
  border-top: 1px solid rgba(37, 99, 235, 0.24);
  padding-top: 8px;
}
.eco-pro-summary-meta {
  font-size: 12px;
  color: #334155;
}
.eco-pro-report-preview {
  margin-top: var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.34);
  border-radius: var(--radius-md);
  background: #f8fafc;
  padding: var(--space-3);
  display: grid;
  gap: 10px;
}
.eco-pro-report-section {
  display: grid;
  gap: 8px;
}
.eco-pro-report-title {
  font-size: 12px;
  font-weight: 800;
  font-style: italic;
  text-transform: none;
  color: #1e293b;
  letter-spacing: 0.01em;
}
.eco-pro-result-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.eco-pro-result-item {
  border: 1px solid rgba(148, 163, 184, 0.24);
  border-radius: var(--radius-sm);
  background: #fff;
  padding: 7px 10px;
  font-size: 12px;
  color: #1e293b;
}
.eco-pro-result-item strong {
  font-weight: 800;
  font-style: italic;
}
.eco-pro-empty {
  padding: 10px;
  border: 1px dashed rgba(148, 163, 184, 0.5);
  border-radius: var(--radius-sm);
  color: #64748b;
  font-size: 12px;
}
.eco-pro-modal__footer {
  margin-top: var(--space-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.eco-pro-modal__actions {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}
.eco-pro-modal__actions .is-hidden {
  display: none !important;
}
.eco-referto-rich-preview {
  margin-top: 8px;
  border: 1px dashed rgba(30, 64, 175, 0.36);
  border-radius: var(--radius-sm);
  background: rgba(239, 246, 255, 0.75);
  padding: 8px 10px;
  font-size: 12px;
  color: #1e293b;
  line-height: 1.35;
}
.eco-referto-rich-preview.is-empty {
  color: #64748b;
  background: rgba(248, 250, 252, 0.95);
  border-color: rgba(148, 163, 184, 0.4);
}
.eco-referto-preview-line {
  margin: 0 0 4px;
}
.eco-referto-preview-line:last-child {
  margin-bottom: 0;
}
.eco-referto-preview-label {
  font-weight: 800;
  font-style: italic;
  margin-right: 4px;
}
.eco-referto-preview-text {
  font-weight: 400;
  font-style: normal;
}

@media (max-width: 980px) {
  .eco-pro-layout {
    grid-template-columns: 1fr;
  }
  .eco-pro-side-menu {
    position: static;
    order: -1;
  }
  .eco-pro-sections-nav {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .eco-pro-section-item {
    grid-template-columns: minmax(0, 1fr) auto;
  }
  .eco-pro-modal__panel {
    width: calc(100vw - 16px);
    max-height: calc(100vh - 16px);
    padding: var(--space-3);
  }
  .eco-pro-table {
    min-width: 620px;
  }
  .eco-pro-result-grid {
    grid-template-columns: 1fr;
  }
  .eco-pro-modal__actions [data-eco-pro-send] {
    width: 100%;
  }
  .visit-quality-grid {
    grid-template-columns: 1fr;
  }
}
/* ============================================
   PLANNING / CALENDAR
   ============================================ */
.planning-mode-switch {
  margin-bottom: var(--space-3);
}
.planning-book-panel {
  margin-top: var(--space-2);
}
.quick-booking-slot-banner {
  margin-bottom: var(--space-3);
  padding: 9px var(--space-3);
  border: 1px dashed rgba(37, 99, 235, 0.45);
  border-radius: var(--radius-md);
  background: rgba(59, 130, 246, 0.08);
  color: var(--text-muted);
  font-size: var(--text-sm);
  font-weight: 600;
}
.quick-booking-slot-banner.is-error {
  border-color: rgba(220, 38, 38, 0.55);
  background: rgba(239, 68, 68, 0.1);
  color: #991b1b;
}
.quick-patient-hint {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-muted);
}
.quick-phase-actions {
  margin-top: var(--space-2);
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}
.recall-list-wrap {
  margin-top: var(--space-4);
}
.recall-table td:last-child {
  text-align: center;
}
.recall-table .table-actions {
  justify-content: center;
  flex-wrap: nowrap;
}
.planning-controls {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}
.planning-nav {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}
.planning-nav-compact {
  align-items: center;
  justify-content: center;
}
.planning-nav-label {
  min-width: 180px;
  text-align: center;
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text);
}
.planning-nav-arrow {
  min-width: 34px;
  min-height: 34px;
  padding: 0;
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}
.planning-options {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  align-items: center;
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.planning-session-toggles {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  align-items: center;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}
.planning-session-btn {
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-muted);
  border-radius: 999px;
  min-height: 28px;
  padding: 4px 10px;
  font-size: var(--text-xs);
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
}
.planning-session-btn.active {
  border-color: rgba(37, 99, 235, 0.45);
  background: rgba(59, 130, 246, 0.12);
  color: #1e3a8a;
}
.planning-session-btn:not(.active) {
  opacity: 0.72;
}
.planning-session-btn:focus-visible {
  outline: 2px solid rgba(37, 99, 235, 0.55);
  outline-offset: 1px;
}
#planning-board-section[data-morning-open=&quot;0&quot;] [data-slot-session=&quot;morning&quot;] {
  display: none !important;
}
#planning-board-section[data-afternoon-open=&quot;0&quot;] [data-slot-session=&quot;afternoon&quot;] {
  display: none !important;
}
.planning-options label {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  font-size: var(--text-sm);
}
.planning-options input[type=&quot;number&quot;],
.planning-options select {
  min-height: 32px;
  padding: 6px var(--space-2);
}
.planning-day-switch {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.planning-day-switch-compact {
  gap: 0;
}
.planning-day-switch input[type=&quot;checkbox&quot;] {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.planning-day-switch-slider {
  width: 36px;
  height: 20px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.45);
  background: rgba(148, 163, 184, 0.28);
  position: relative;
  transition: background 0.16s ease, border-color 0.16s ease;
}
.planning-day-switch-slider::after {
  content: &quot;&quot;;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
  position: absolute;
  top: 1px;
  left: 1px;
  transition: transform 0.16s ease;
}
.planning-day-switch input[type=&quot;checkbox&quot;]:checked + .planning-day-switch-slider {
  background: rgba(34, 197, 94, 0.3);
  border-color: rgba(34, 197, 94, 0.5);
}
.planning-day-switch input[type=&quot;checkbox&quot;]:checked + .planning-day-switch-slider::after {
  transform: translateX(16px);
}
.planning-day-switch-text {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}
.planning-day-switch-compact .planning-day-switch-text {
  display: none;
}
.planning-grid {
  display: grid;
  gap: var(--space-2);
  overflow-x: auto;
}
.planning-row {
  display: grid;
  grid-template-columns: 80px repeat(7, minmax(140px, 1fr));
  gap: var(--space-2);
  min-width: 980px;
}
.planning-head {
  font-weight: 600;
  color: var(--text-muted);
}
.planning-time {
  font-size: var(--text-sm);
  color: var(--text-muted);
  padding-top: 6px;
}
.planning-day {
  background: rgba(21, 101, 192, 0.06);
  border-radius: 10px;
  padding: 8px 10px;
  text-align: center;
}
.planning-day.is-closed {
  background: rgba(148, 163, 184, 0.12);
  color: #475569;
}
.planning-day-line {
  font-weight: 700;
  font-size: var(--text-sm);
  letter-spacing: 0.04em;
  color: var(--text);
  white-space: nowrap;
}
.planning-day-count {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
}
.planning-day-meta {
  margin-top: 3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.planning-day-count-closed {
  color: #64748b;
}
.planning-day-inline-switch {
  margin: 0;
  display: inline-flex;
  align-items: center;
}
.planning-cell {
  min-height: 68px;
  border: 1px dashed var(--border-soft);
  border-radius: 10px;
  padding: 5px;
  background: white;
}
.planning-cell-closed {
  background: rgba(148, 163, 184, 0.12);
  border-color: rgba(148, 163, 184, 0.35);
}
.planning-cell.drag-over {
  border-color: var(--color-primary);
  background: rgba(21, 101, 192, 0.06);
}
.planning-empty-slot {
  width: 100%;
  min-height: 44px;
  border: 1px dashed rgba(59, 130, 246, 0.4);
  border-radius: 8px;
  background: rgba(59, 130, 246, 0.07);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: var(--space-2);
  cursor: pointer;
  transition: border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
}
.planning-empty-slot:hover {
  border-color: var(--color-primary);
  background: rgba(59, 130, 246, 0.14);
  transform: translateY(-1px);
}
.planning-empty-slot.is-closed {
  border-color: rgba(148, 163, 184, 0.42);
  background: rgba(148, 163, 184, 0.16);
  color: #64748b;
  cursor: default;
}
.planning-empty-slot.is-closed:hover {
  transform: none;
  border-color: rgba(148, 163, 184, 0.42);
  background: rgba(148, 163, 184, 0.16);
}
.planning-empty-slot.is-closed .planning-empty-time,
.planning-empty-slot.is-closed .planning-empty-text {
  color: #64748b;
}
.planning-empty-time {
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text);
}
.planning-empty-text {
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.planning-slot-confirm {
  margin-bottom: var(--space-2);
  padding: 8px 10px;
  border: 1px solid rgba(37, 99, 235, 0.35);
  border-radius: 10px;
  background: rgba(59, 130, 246, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}
.planning-slot-confirm.is-hidden {
  display: none;
}
.planning-slot-confirm-text {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}
.planning-slot-confirm-actions {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
.appointment-card {
  position: relative;
  background: #f1f8ff;
  border: 1px solid #cfe3f7;
  border-top: 2px solid transparent;
  border-left: 3px solid #6aa6dc;
  border-radius: 10px;
  padding: var(--space-2);
  min-height: 44px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  cursor: grab;
}
.appointment-card[data-status=&quot;prenotato&quot;] {
  background: var(--state-info-bg);
  border-color: var(--state-info-border);
  border-left-color: #69a9e8;
}
.appointment-card[data-status=&quot;confermato&quot;] {
  background: var(--state-ok-bg);
  border-color: var(--state-ok-border);
  border-left-color: #34a853;
}
.appointment-card[data-status=&quot;annullato&quot;] {
  background: var(--state-danger-bg);
  border-color: var(--state-danger-border);
  border-left-color: #d95c5c;
}
.appointment-card[data-type=&quot;visita&quot;] {
  border-top-color: #94a3b8;
}
.appointment-card[data-type=&quot;ecg&quot;] {
  border-top-color: #0ea5e9;
}
.appointment-card[data-type=&quot;eco&quot;] {
  border-top-color: #14b8a6;
}
.appointment-card[data-type=&quot;tsa&quot;] {
  border-top-color: #6366f1;
}
.appointment-card[data-type=&quot;certificato&quot;] {
  border-top-color: #f59e0b;
}
.appointment-card[data-type=&quot;altro&quot;] {
  border-top-color: #a855f7;
}
.appointment-card[data-type=&quot;certificato&quot;][data-status=&quot;prenotato&quot;] {
  background: #fff8ed;
  border-color: #f6dfbc;
  border-left-color: #f2b35a;
}
.appointment-card[data-type=&quot;certificato&quot;][data-status=&quot;confermato&quot;] {
  background: #fff2df;
  border-color: #f4cf9c;
  border-left-color: #ea8f1b;
}
.appointment-card.conflict {
  border-color: rgba(239, 68, 68, 0.55);
  background: linear-gradient(120deg, rgba(239, 68, 68, 0.09), transparent), 
              rgba(255, 255, 255, 0.96);
}
.appointment-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.appointment-line {
  font-size: var(--text-sm);
  color: var(--text);
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.appointment-line strong {
  margin-right: 4px;
}
.appointment-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  position: relative;
}
.appointment-name {
  display: none;
}
.appointment-meta {
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.appointment-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 6px;
}
.appointment-actions select {
  min-height: 28px;
  padding: 4px 6px;
}
.appointment-status-form {
  margin: 0;
}
.appointment-status-form .status-badge {
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
}
.appointment-status-picker {
  position: relative;
}
.appointment-status-picker > summary {
  list-style: none;
  cursor: pointer;
}
.appointment-status-picker > summary::-webkit-details-marker {
  display: none;
}
.appointment-status-menu {
  position: absolute;
  right: 0;
  top: calc(100% + 4px);
  min-width: 132px;
  z-index: 40;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-sm);
  padding: 4px;
  display: grid;
  gap: 4px;
}
.appointment-status-option {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-alt);
  color: var(--text);
  font-size: 11px;
  line-height: 1.2;
  text-align: left;
  padding: 5px 6px;
  cursor: pointer;
}
.appointment-status-option:hover {
  background: var(--surface);
}
.appointment-status .status-badge.status-badge-sm {
  min-height: 16px;
  padding: 1px 6px;
  font-size: 10px;
  letter-spacing: 0.02em;
}
.wa-icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  min-width: 22px;
  border-radius: 999px;
  border: 1px solid #1faa50;
  background: #25d366;
  color: #ffffff;
  text-decoration: none;
  box-shadow: 0 2px 6px rgba(15, 23, 42, 0.18);
}
.wa-icon-btn:hover {
  background: #22c85f;
  color: #ffffff;
}
.wa-icon {
  width: 13px;
  height: 13px;
  display: block;
  fill: currentColor;
}
.appointment-status .wa-chip {
  margin-right: 0;
}
.planning-grid .appointment-top {
  display: block;
}
.planning-grid .appointment-line {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}
.planning-grid .appointment-status {
  display: flex;
  justify-content: flex-end;
  gap: 3px;
}
.planning-grid .appointment-status .status-badge.status-badge-sm {
  min-height: 14px;
  padding: 0 5px;
  font-size: 9px;
}
.planning-grid .appointment-status .wa-icon-btn {
  width: 18px;
  height: 18px;
  min-width: 18px;
}
/* Mobile planning list */
.planning-mobile-list {
  display: none;
}
.planning-mobile-day {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-2);
  overflow: hidden;
}
.planning-mobile-day > summary {
  list-style: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 11px var(--space-3);
  font-weight: 700;
  color: var(--text);
}
.planning-mobile-day-main {
  display: flex;
  align-items: center;
  gap: 0;
}
.planning-mobile-day > summary::-webkit-details-marker {
  display: none;
}
.planning-mobile-day-body {
  padding: 0 10px 10px;
  display: grid;
  gap: var(--space-2);
}
.planning-mobile-day.is-closed > summary {
  background: rgba(148, 163, 184, 0.15);
}
.planning-mobile-day-badges {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.planning-mobile-switch-form {
  margin: 0;
  display: inline-flex;
  align-items: center;
}
.planning-slot-entry {
  display: grid;
  gap: 5px;
  border: 1px dashed transparent;
  border-radius: 10px;
  padding: 2px;
  transition: border-color 0.16s ease, background 0.16s ease;
}
.planning-slot-entry.drag-over {
  border-color: var(--color-primary);
  background: rgba(59, 130, 246, 0.08);
}
.planning-mobile-day-body.drag-over {
  outline: 2px dashed var(--color-primary);
  outline-offset: -2px;
  background: rgba(59, 130, 246, 0.05);
}
.planning-mobile-day-name {
  font-size: var(--text-sm);
}
.planning-mobile-day-line {
  font-size: var(--text-sm);
  color: var(--text);
  font-weight: 700;
  white-space: nowrap;
}
.planning-day-total.status-badge-sm {
  min-height: 14px;
  font-size: 9px;
  padding: 1px 5px;
}
.planning-mobile-card.dragging-source {
  opacity: 0.35;
}
.mobile-drag-ghost {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  width: min(88vw, 360px);
  box-shadow: 0 10px 22px rgba(15, 23, 42, 0.25);
  opacity: 0.95;
}
/* ============================================
   TERAPIA / THERAPY
   ============================================ */
.terapia-table-wrap {
  margin-top: 6px;
  overflow: visible;
}
.terapia-table {
  width: 100%;
  overflow: visible;
  table-layout: fixed;
}
.terapia-table th,
.terapia-table td {
  vertical-align: middle;
  overflow: visible;
}
.terapia-table thead th {
  position: sticky;
  top: 0;
  z-index: 2;
}
.terapia-table .terapia-data-row:nth-child(even) td {
  background: rgba(241, 245, 249, 0.62);
}
.terapia-table input {
  width: 100%;
  min-height: 32px;
}
.terapia-table .terapia-actions {
  text-align: right;
  white-space: nowrap;
}
.terapia-class-hint {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-muted);
  min-height: 14px;
}
.terapia-class-hint.pulse {
  animation: terapiaClassPulse 0.24s ease;
}
@keyframes terapiaClassPulse {
  0% {
    opacity: 0.5;
    transform: translateY(1px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}
.terapia-empty {
  margin-top: var(--space-2);
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.frequency-picker {
  position: relative;
  display: flex;
  gap: 6px;
  align-items: center;
  z-index: 2;
}
.frequency-picker input[type=&quot;text&quot;] {
  min-width: 140px;
}
.frequency-panel {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 260px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  box-shadow: var(--shadow-md);
  z-index: 120;
}
.frequency-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: var(--space-2);
}
.frequency-times {
  column-count: 3;
  column-gap: 10px;
  font-size: var(--text-sm);
}
.frequency-times label {
  display: flex;
  gap: 6px;
  align-items: center;
  break-inside: avoid;
  padding: 2px 0;
}
.frequency-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}
/* ============================================
   RISK PILLS (CHECKBOX GRID)
   ============================================ */
.risk-pills {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-bottom: 10px;
}
.risk-other-field {
  margin-top: 6px;
}
.risk-other-field input {
  width: 100%;
}
/* ============================================
   CHECKBOX &amp; SWITCH GRIDS
   ============================================ */
.checkbox-grid {
  display: grid;
  gap: var(--space-3);
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
}
.checkbox-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: rgba(21, 101, 192, 0.05);
  font-weight: 600;
}
.switch-grid {
  display: grid;
  gap: var(--space-3);
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}
/* ============================================
   PILL MENU (DROPDOWN)
   ============================================ */
.pill-menu {
  position: relative;
}
.pill-menu-panel {
  position: absolute;
  left: 0;
  top: calc(100% + 6px);
  min-width: 200px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px;
  box-shadow: var(--shadow-md);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-6px);
  transition: opacity var(--transition-fast),
              transform var(--transition-fast),
              visibility var(--transition-fast);
  z-index: var(--z-dropdown);
}
.pill-menu:hover .pill-menu-panel,
.pill-menu:focus-within .pill-menu-panel,
.pill-menu.menu-open .pill-menu-panel {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.pill-menu-panel button {
  width: 100%;
  text-align: left;
  padding: var(--space-2) 10px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
}
.pill-menu-panel button:hover,
.pill-menu-panel button:focus-visible {
  background: rgba(59, 130, 246, 0.1);
  color: var(--text);
  outline: none;
}
/* colored states used by risk pills */
.pill-check.color-blue span,
.pill-check.color-blue input:checked + span {
  background: rgba(59, 130, 246, 0.14);
  border-color: rgba(59, 130, 246, 0.45);
  color: #1d4ed8;
}
.pill-check.color-green span,
.pill-check.color-green input:checked + span {
  background: rgba(34, 197, 94, 0.14);
  border-color: rgba(34, 197, 94, 0.45);
  color: #166534;
}
.pill-check.color-orange span,
.pill-check.color-orange input:checked + span {
  background: rgba(245, 158, 11, 0.18);
  border-color: rgba(245, 158, 11, 0.5);
  color: #8a4f00;
}
.pill-check.color-red span,
.pill-check.color-red input:checked + span {
  background: rgba(239, 68, 68, 0.14);
  border-color: rgba(239, 68, 68, 0.5);
  color: #b91c1c;
}
/* hide dynamic select panels unless js opens them */
.js .risk-extra-menu {
  display: none;
}
.risk-extra {
  display: block;
}
.risk-extra.is-hidden,
.risk-extra-menu.is-hidden {
  display: none;
}
/* ============================================
   STATS STRIP
   ============================================ */
.stats-strip {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2);
  margin-top: 10px;
}
.home-mini-dashboard {
  margin-bottom: var(--space-4);
}
.home-top-banner {
  margin-bottom: var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.32);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: var(--shadow-sm);
}
.home-top-banner img {
  display: block;
  width: 100%;
  max-height: 96px;
  object-fit: cover;
}
/* ============================================
   METRIC DISPLAYS
   ============================================ */
.metric {
  display: inline-flex;
  padding: 4px var(--space-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(15, 23, 42, 0.06);
  color: var(--text);
  font-weight: 600;
}
.metric.warning {
  background: rgba(255, 179, 0, 0.15);
  color: #8a4f00;
}
.metric.critical {
  background: rgba(198, 40, 40, 0.15);
  color: var(--color-danger);
}
.metric-cell {
  text-align: center;
}
.metric-value {
  font-weight: 700;
}
.metric-delta {
  font-size: var(--text-sm);
  margin-top: 4px;
}
.metric-delta.up {
  color: var(--color-accent);
}
.metric-delta.down {
  color: var(--color-primary);
}
.metric-delta.same {
  color: var(--text-muted);
}
.metric-cell.warning .metric-value {
  color: var(--color-warning);
}
.metric-cell.critical .metric-value {
  color: var(--color-danger);
}
.metric-cell.ok .metric-value {
  color: var(--color-success);
}

/* ============================================
   RESOCONTO PANELS
   ============================================ */
.resoconto-panel {
  padding: 24px 26px 22px;
}
.resoconto-actions {
  margin-top: -4px;
  margin-bottom: 10px;
}
.resoconto-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: rgba(255, 255, 255, 0.98);
}
.resoconto-table thead th {
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text);
  background: var(--gray-100);
  padding: 8px 12px;
  border: 0;
}
.resoconto-table td {
  font-size: var(--text-base);
  color: var(--text-muted);
  padding: 10px 12px;
  border: 0;
}
.resoconto-table .num {
  text-align: right;
}

/* planning extra labels */
.planning-segment {
  margin-bottom: var(--space-2);
}
.planning-mobile-card {
  margin-top: 2px;
}
.appointment-time {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text);
}
.appointment-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* icon marker hooks kept neutral (no forced iconography) */
.btn.has-icon {
  gap: var(--space-2);
}


/* responsive.css */
/**
 * RESPONSIVE.CSS
 * Media queries centralizzate per tablet e mobile
 * Breakpoints: 900px (tablet), 720px (mobile)
 */
/* ============================================
   TABLET (max-width: 900px)
   ============================================ */
@media (max-width: 900px) {
  /* Layout generale */
  .topbar,
  .navbar,
  .main,
  .footer {
    padding-left: max(12px, env(safe-area-inset-left));
    padding-right: max(12px, env(safe-area-inset-right));
  }
  /* Topbar */
  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-3);
  }
  .topbar-search {
    width: 100%;
    max-width: none;
    margin: 0;
    order: 3;
  }
  .topbar-user {
    width: 100%;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  /* Navigation */
  .nav-mobile-toggle {
    display: inline-flex;
  }
  .js .nav-links {
    display: none;
    width: 100%;
    flex-direction: column;
    gap: 6px;
  }
  .navbar.is-open .nav-links {
    display: flex;
  }
  .nav-item {
    display: block;
    width: 100%;
    min-height: 36px;
    padding: 10px var(--space-3);
  }
  /* Page header */
  .page-header {
    flex-direction: column;
    gap: var(--space-3);
  }
  .page-actions {
    width: 100%;
    justify-content: flex-start;
  }
  /* Sticky elements */
  .switches-bottom {
    bottom: max(8px, env(safe-area-inset-bottom));
  }
  .visit-nav {
    top: 70px;
  }
  /* Segments */
  .segment-control {
    gap: 4px;
    padding: 5px;
  }
  .segment-btn {
    min-height: 28px;
    padding: 5px 10px;
    font-size: var(--text-xs);
  }
  .clinical-snippet-toolbar {
    flex-wrap: wrap;
    gap: 6px;
  }
  .clinical-snippet-select {
    min-width: 0;
    width: 100%;
  }
  .exam-title-row {
    align-items: flex-start;
  }
  #visit-actions > .btn {
    display: none;
  }
  .visit-mobile-actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 8px;
    position: fixed;
    left: max(10px, env(safe-area-inset-left));
    right: max(10px, env(safe-area-inset-right));
    bottom: max(10px, env(safe-area-inset-bottom));
    z-index: var(--z-toast);
    padding: 8px;
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(8px);
  }
  form.print-scope {
    padding-bottom: 108px;
  }
  /* KPI grid */
  .kpi-grid {
    gap: var(--space-3);
  }
  .kpi-card {
    padding: var(--space-3);
  }
  /* Planning */
  .planning-controls {
    gap: 10px;
    margin-bottom: 10px;
  }
  .planning-nav-label {
    min-width: 150px;
  }
  .planning-options {
    gap: 10px;
    padding: 7px var(--space-2);
  }
  .planning-session-toggles {
    width: 100%;
    gap: 5px;
  }
  .planning-row {
    gap: 6px;
    grid-template-columns: 72px repeat(7, minmax(122px, 1fr));
    min-width: 890px;
  }
  .planning-cell {
    min-height: 66px;
    padding: 5px;
  }
  .appointment-card {
    padding: 7px;
    gap: 3px;
  }
  /* Stats */
  .stats-strip {
    gap: 6px;
    margin-top: var(--space-2);
  }
  /* Login */
  .login-card {
    padding: var(--space-5);
  }
  .login-title {
    font-size: 22px;
  }
  /* Frequency panel */
  .frequency-panel {
    max-width: min(92vw, 420px);
  }
}
/* ============================================
   MOBILE (max-width: 720px)
   ============================================ */
@media (max-width: 720px) {
  :root {
    --text-xs: 9px;
    --text-sm: 10px;
    --text-base: 12px;
    --text-md: 13px;
    --text-lg: 15px;
    --text-xl: 18px;
    --text-2xl: 22px;
    --text-3xl: 28px;
  }
  /* Input font size (previene zoom iOS) */
  input,
  select,
  textarea,
  .search-input {
    font-size: 16px;

  /* Form actions full width */

  .form-actions .btn {

  .planning-mobile-list {

  .planning-grid {
    display: none;
  }
  .planning-nav-compact {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: var(--space-2);
    width: 100%;
  }
  .planning-nav-label {
    min-width: 0;
  }
  .planning-options {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-2);
  }
  .planning-session-toggles {
    display: flex;
    flex-wrap: nowrap;
    width: 100%;
    overflow-x: auto;
  }
  .planning-session-btn {

    padding: 3px 8px;

  .planning-day-meta {
    gap: 4px;
  }
  .planning-day-switch-text {
    font-size: 10px;
  }
  .planning-day-switch-slider {
    width: 32px;
    height: 18px;
  }
  .planning-day-switch-slider::after {
    width: 14px;
    height: 14px;
  }
  .planning-day-switch input[type=&quot;checkbox&quot;]:checked + .planning-day-switch-slider::after {
    transform: translateX(14px);
  }
  .planning-options > * {
    min-width: 0;
  }
  .planning-options .btn {
    width: 100%;
  }
  .quick-phase-actions {
    display: grid;
    grid-template-columns: 1fr;
    width: 100%;
  }
  .quick-phase-actions .btn {
    width: 100%;
  }
  .quick-booking-slot-banner {

  }
  .planning-empty-slot {
    min-height: 44px;
    gap: 6px;
  }

    top: auto;
    min-width: 0;
    max-height: 62vh;
    overflow: auto;
    z-index: var(--z-overlay);
  }
  .frequency-panel.frequency-panel-portal {

  .table-scroll .table {

  }
