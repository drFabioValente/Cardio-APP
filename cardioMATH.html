        const field = form.querySelector(firstSelector);
        if (field &amp;&amp; typeof field.focus === 'function') {
          field.focus();
        }
      }
    }, true);

    evaluate();
  };
  initVisitClinicalQualityPanel();

  const visitForm = document.querySelector('form[data-autofill-last=&quot;visite&quot;]');
  if (visitForm) {
    const pazienteSelect = visitForm.querySelector('#paziente_id');
    if (pazienteSelect) {
      pazienteSelect.addEventListener('change', () => {
        const value = pazienteSelect.value;
        if (!value) return;
        const params = new URLSearchParams(window.location.search);
        params.set('paziente_id', value);
        window.location.href = `/visite/nuovo?${params.toString()}`;
      });
    }
  }

  const redirectSelects = document.querySelectorAll('select[data-redirect-base]');
  redirectSelects.forEach((select) => {
    select.addEventListener('change', () => {
      const value = select.value;
      if (!value) return;
      const base = select.dataset.redirectBase;
      const param = select.dataset.redirectParam || select.name || select.id;
      const params = new URLSearchParams();
      params.set(param, value);
      window.location.href = `${base}?${params.toString()}`;
    });
  });

  const toggleInputs = document.querySelectorAll('input[data-toggle-target]');
  toggleInputs.forEach((input) => {
    const targetId = input.dataset.toggleTarget;
    const target = document.getElementById(targetId);
    if (!target) return;
    const targetControls = Array.from(target.querySelectorAll('input, select, textarea, button'));
    const update = () => {
      if (input.checked) {
        target.classList.remove('is-disabled');
      } else {
        target.classList.add('is-disabled');
      }
      targetControls.forEach((control) => {
        if (control === input) return;
        if (control.closest('.exam-inline-switch')) return;
        control.disabled = !input.checked;
      });
    };
    update();
    input.addEventListener('change', update);
  });

  const initVisitWorkflow = () => {
    const root = document.querySelector('[data-visit-ux]');
    if (!root) return;
    const form = root.closest('form');
    if (!form) return;

    const progressFill = root.querySelector('[data-visit-progress-fill]');
    const progressText = root.querySelector('[data-visit-progress-text]');
    const missingText = root.querySelector('[data-visit-progress-missing]');
    const firstMissingButton = root.querySelector('[data-visit-first-missing]');
    const badgeNodes = {};
    root.querySelectorAll('[data-visit-step-badge]').forEach((badge) => {
      badgeNodes[badge.dataset.visitStepBadge] = badge;
    });

    const stepLabels = {
      base: 'Dati visita',
      anamnesi: 'Anamnesi',
      obiettivo: 'Obiettivo',
      ecg: 'ECG',
      eco: 'ECO',
      tsa: 'TSA',
      terapia: 'Terapia',
      prescrizione: 'Prescrizione',
    };

    const getValue = (selector) => {
      const field = form.querySelector(selector);
      return field ? String(field.value || '').trim() : '';
    };

    const isEnabled = (toggleName) => {
      const toggle = form.querySelector(`input[name=&quot;${toggleName}&quot;]`);
      return Boolean(toggle &amp;&amp; toggle.checked);
    };

    const getTherapyListLength = () => {
      const hidden = form.querySelector('#terapia_items');
      if (!hidden) return 0;
      const parsed = parseJsonSafe(hidden.value, []);
      return parsed.length;
    };

    let lastMissingSelectors = [];

    const markBadge = (key, state, suffix = '') => {
      const badge = badgeNodes[key];
      if (!badge) return;
      badge.classList.remove('ok', 'warn', 'skip');
      badge.classList.add(state);
      badge.textContent = `${stepLabels[key]}${suffix}`;
    };

    const evaluate = () => {
      const missing = [];

      const pazienteValue = getValue('[name=&quot;paziente_id&quot;]');
      const dataValue = getValue('#data_visita');
      const pesoValue = getValue('#peso_kg');
      const altezzaValue = getValue('#altezza_cm');
      const baseOk = Boolean(pazienteValue &amp;&amp; dataValue &amp;&amp; pesoValue &amp;&amp; altezzaValue);
      if (!pazienteValue) {
        missing.push(form.querySelector('#paziente_id') ? '#paziente_id' : '#paziente_search');
      }
      if (!dataValue) missing.push('#data_visita');
      if (!pesoValue) missing.push('#peso_kg');
      if (!altezzaValue) missing.push('#altezza_cm');

      const anamnesiOk = Boolean(getValue('#anamnesi_recente'));
      if (!anamnesiOk) missing.push('#anamnesi_recente');

      const obiettivoEnabled = isEnabled('enable_obiettivo');
      const obiettivoOk = !obiettivoEnabled || (
        Boolean(getValue('#pressione_sistolica')) &amp;&amp;
        Boolean(getValue('#pressione_diastolica')) &amp;&amp;
        Boolean(getValue('#frequenza_cardiaca')) &amp;&amp;
        Boolean(getValue('#saturazione_spo2')) &amp;&amp;
        Boolean(getValue('#auscultazione_cardiaca')) &amp;&amp;
        Boolean(getValue('#auscultazione_polmonare')) &amp;&amp;
        Boolean(getValue('#edemi_declivi'))
      );
      if (obiettivoEnabled) {
        if (!getValue('#pressione_sistolica')) missing.push('#pressione_sistolica');
        if (!getValue('#pressione_diastolica')) missing.push('#pressione_diastolica');
        if (!getValue('#frequenza_cardiaca')) missing.push('#frequenza_cardiaca');
        if (!getValue('#saturazione_spo2')) missing.push('#saturazione_spo2');
      }

      const ecgEnabled = isEnabled('enable_ecg');
      const ecgOk = !ecgEnabled || (Boolean(getValue('#ecg_frequenza_cardiaca')) &amp;&amp; Boolean(getValue('#ecg_ritmo')));
      if (ecgEnabled) {
        if (!getValue('#ecg_frequenza_cardiaca')) missing.push('#ecg_frequenza_cardiaca');
        if (!getValue('#ecg_ritmo')) missing.push('#ecg_ritmo');
      }

      const ecoEnabled = isEnabled('enable_eco');
      const ecoOk = !ecoEnabled || (
        Boolean(getValue('#eco_frazione_eiezione_ef')) &amp;&amp;
        Boolean(getValue('#eco_vddt_mm')) &amp;&amp;
        Boolean(getValue('#eco_siv_mm')) &amp;&amp;
        Boolean(getValue('#eco_as_mm'))
      );
      if (ecoEnabled) {
        if (!getValue('#eco_frazione_eiezione_ef')) missing.push('#eco_frazione_eiezione_ef');
        if (!getValue('#eco_vddt_mm')) missing.push('#eco_vddt_mm');
        if (!getValue('#eco_siv_mm')) missing.push('#eco_siv_mm');
        if (!getValue('#eco_as_mm')) missing.push('#eco_as_mm');
      }

      const tsaEnabled = isEnabled('enable_tsa');
      const tsaOk = !tsaEnabled || Boolean(getValue('#tsa_asse_carotideo'));
      if (tsaEnabled) {
        if (!getValue('#tsa_asse_carotideo')) missing.push('#tsa_asse_carotideo');
      }

      const terapiaEnabled = isEnabled('enable_terapia');
      const terapiaOk = !terapiaEnabled || (getTherapyListLength() > 0 || Boolean(getValue('#terapia_nome_farmaco')));
      if (terapiaEnabled &amp;&amp; !terapiaOk) {
        missing.push('#terapia_nome_farmaco');
      }

      const prescrizioneEnabled = isEnabled('enable_prescrizione');
      const prescrizioneOk = !prescrizioneEnabled || Boolean(getValue('#prescrizione'));
      if (prescrizioneEnabled &amp;&amp; !prescrizioneOk) {
        missing.push('#prescrizione');
      }

      const steps = {
        base: baseOk,
        anamnesi: anamnesiOk,
        obiettivo: obiettivoOk,
        ecg: ecgOk,
        eco: ecoOk,
        tsa: tsaOk,
        terapia: terapiaOk,
        prescrizione: prescrizioneOk,
      };
      const enabledByStep = {
        base: true,
        anamnesi: true,
        obiettivo: obiettivoEnabled,
        ecg: ecgEnabled,
        eco: ecoEnabled,
        tsa: tsaEnabled,
        terapia: terapiaEnabled,
        prescrizione: prescrizioneEnabled,
      };

      const total = Object.keys(steps).length;
      const done = Object.values(steps).filter(Boolean).length;
      const percent = Math.round((done / total) * 100);
      if (progressFill) progressFill.style.width = `${percent}%`;
      if (progressText) progressText.textContent = `${percent}% completato (${done}/${total} sezioni)`;
      if (missingText) missingText.textContent = `Campi mancanti: ${missing.length}`;

      Object.keys(steps).forEach((key) => {
        if (!enabledByStep[key]) {
          markBadge(key, 'skip', ' off');
          return;
        }
        markBadge(key, steps[key] ? 'ok' : 'warn');
      });

      lastMissingSelectors = missing.filter(Boolean);
    };

    if (firstMissingButton) {
      firstMissingButton.addEventListener('click', () => {
        evaluate();
        if (!lastMissingSelectors.length) return;
        const field = form.querySelector(lastMissingSelectors[0]);
        if (!field) return;
        const target = field.closest('.visit-section-card, .exam-block, .form-field') || field;
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (typeof field.focus === 'function') {
          field.focus();
        }
      });
    }

    form.querySelectorAll('input, select, textarea').forEach((field) => {
      field.addEventListener('input', evaluate);
      field.addEventListener('change', evaluate);
    });

    form.querySelectorAll('input[data-section-toggle][data-toggle-target]').forEach((toggle) => {
      toggle.addEventListener('change', () => {
        evaluate();
        if (!toggle.checked) return;
        const targetId = toggle.dataset.toggleTarget;
        const section = targetId ? document.getElementById(targetId) : null;
        if (!section) return;
        setTimeout(() => {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' });
          animateReveal(section);
        }, 90);
      });
    });

    const visitNavButtons = Array.from(document.querySelectorAll('[data-visit-nav-target]'));
    if (visitNavButtons.length) {
      window.addEventListener('keydown', (event) => {
        if (!event.altKey || event.ctrlKey || event.metaKey) return;

  let deletePopup = null;
  const ensureDeletePopup = () => {
    if (!deletePopup) {
      deletePopup = createDeletePopup();
    }
    return deletePopup;
  };

  const openDeletePopup = (text, onConfirm, options = {}) => {
    const popup = ensureDeletePopup();
    const titleText = options.title || 'Conferma eliminazione';
    const confirmText = options.confirmText || 'Elimina';
    const cancelText = options.cancelText || 'Annulla';
    const confirmClass = options.confirmClass || 'btn btn-danger';
    const onCancel = typeof options.onCancel === 'function' ? options.onCancel : null;
    let closed = false;

    popup.title.textContent = titleText;
    popup.message.textContent = text || 'Sei sicuro di voler eliminare questo elemento?';
    popup.cancelBtn.textContent = cancelText;
    popup.confirmBtn.textContent = confirmText;
    popup.confirmBtn.className = confirmClass;
    popup.overlay.style.display = 'flex';

    const close = (confirmed = false) => {
      if (closed) return;
      closed = true;
      popup.overlay.style.display = 'none';
      popup.cancelBtn.onclick = null;
      popup.confirmBtn.onclick = null;
      popup.overlay.onclick = null;
      document.removeEventListener('keydown', onEsc);
      if (!confirmed &amp;&amp; onCancel) {
        onCancel();
      }
    };

    const onEsc = (event) => {
      if (event.key === 'Escape') {
        close(false);
      }
    };

    popup.cancelBtn.onclick = () => close(false);
    popup.confirmBtn.onclick = () => {
      close(true);
      onConfirm();
    };
    popup.overlay.onclick = (event) => {
      if (event.target === popup.overlay) {

    document.addEventListener('keydown', onEsc);

      (document.activeElement &amp;&amp; form &amp;&amp; form.contains(document.activeElement) ? document.activeElement : null);

    if (isDeleteForm(form)) {
      if (form.__deletePopupConfirmed) {
        form.__deletePopupConfirmed = false;
        return;

      event.preventDefault();
      const baseMessage = (submitter &amp;&amp; submitter.dataset &amp;&amp; submitter.dataset.confirm)
        || 'Sei sicuro di voler eliminare questo elemento?';
      const strongMessage = submitter &amp;&amp; submitter.dataset ? submitter.dataset.confirmStrong : '';
      const message = strongMessage ? `${baseMessage}\n${strongMessage}` : baseMessage;

      openDeletePopup(message, () => {
        form.__deletePopupConfirmed = true;
        HTMLFormElement.prototype.submit.call(form);

    if (!submitter || !submitter.dataset) return;
    const message = submitter.dataset.confirm;
    if (!message) return;
    const ok = window.confirm(message);
    if (!ok) {

      table.querySelectorAll('tbody tr').forEach((row) => {

  const escapeHtml = (text) => (
    text.replace(/[&amp;<>&quot;']/g, (char) => ({
      '&amp;': '&amp;amp;',
      '<': '&amp;lt;',
      '>': '&amp;gt;',
      '&quot;': '&amp;quot;',
      &quot;'&quot;: '&amp;#39;',
    }[char]))
  );

  const escapeRegExp = (text) => text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&amp;');

    const safeText = escapeHtml(text);

    return safeText.replace(regex, '<mark>$1</mark>');
  };

  // Niente popup/toast: i messaggi restano inline per massima compatibilita' browser.

  if (firstErrorAlert &amp;&amp; typeof firstErrorAlert.scrollIntoView === 'function') {

  const searchInputs = document.querySelectorAll('input[data-filter-target]');
  searchInputs.forEach((input) => {
    const targetId = input.dataset.filterTarget;
    const remoteUrl = input.dataset.remoteUrl;
    const select = document.getElementById(targetId);
    if (!select) return;

    let lastResults = [];
    let lastQuery = '';
    let requestId = 0;

    let resultsBox = document.querySelector(`.search-results[data-results-for=&quot;${targetId}&quot;]`);
    if (!resultsBox) {
      resultsBox = document.createElement('div');
      resultsBox.className = 'search-results';
      resultsBox.dataset.resultsFor = targetId;
      input.insertAdjacentElement('afterend', resultsBox);
    }

    const closeResults = () => {
      resultsBox.classList.remove('open');
      resultsBox.innerHTML = '';
      lastResults = [];
    };

    const ensureOption = (item) => {
      let option = Array.from(select.options).find((opt) => opt.value === String(item.id));
      if (!option) {
        option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.label;
        select.appendChild(option);
      } else {
        option.textContent = item.label;

      return option;

    const chooseItem = (item) => {
      ensureOption(item);

      select.dispatchEvent(new Event('change'));
      input.value = item.label;
      closeResults();

    const renderResults = (items, term) => {
      if (!items.length) {

      const list = document.createElement('div');
      list.className = 'search-results-list';
      items.forEach((item) => {

        button.type = 'button';

      if (placeholder !== null) {

    const remoteSearch = async () => {
      const term = input.value.trim();

        params.set('q', term);

        if (extra) {
          extra.split('&amp;').forEach((pair) => {
            const [key, value] = pair.split('=');

        }
        const extraSource = input.dataset.remoteExtraSource;
        if (extraSource) {
          const sourceEl = document.getElementById(extraSource);
          if (sourceEl &amp;&amp; sourceEl.value) {
            params.set('paziente_id', sourceEl.value);

        }
        const response = await fetch(`${remoteUrl}?${params.toString()}`, {
          credentials: 'same-origin',

        if (!response.ok || currentRequest !== requestId) return;
        const payload = await response.json().catch(() => ({ results: [] }));
        const items = Array.isArray(payload.results) ? payload.results : [];
        if (currentRequest !== requestId || term !== lastQuery) return;
        lastResults = items;

    const localFilter = () => {

  const tableFilters = document.querySelectorAll('input[data-table-filter]');

  const appointmentCards = document.querySelectorAll('[data-appointment]');

  const initMobilePlanningDrag = () => {
    const supportsTouch =
      window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
    if (!supportsTouch) return;

    const mobileCards = Array.from(
      document.querySelectorAll('.planning-mobile-card[data-appointment]'),
    );
    const dropZones = Array.from(document.querySelectorAll('[data-mobile-drop-slot]'));
    if (!mobileCards.length || !dropZones.length) return;

    let dragState = null;
    const closestElement = (node, selector) => {
      if (!node || typeof node !== 'object') return null;
      if (typeof node.closest === 'function') return node.closest(selector);
      if (node.parentElement &amp;&amp; typeof node.parentElement.closest === 'function') {
        return node.parentElement.closest(selector);
      }
      return null;
    };

    const clearDropZones = () => {
      dropZones.forEach((zone) => zone.classList.remove('drag-over'));
    };

    const cleanupDrag = () => {
      clearDropZones();
      if (dragState &amp;&amp; dragState.card) {
        dragState.card.classList.remove('dragging-source');
      }
      if (dragState &amp;&amp; dragState.ghost &amp;&amp; dragState.ghost.parentNode) {
        dragState.ghost.parentNode.removeChild(dragState.ghost);
      }
      dragState = null;
    };

    mobileCards.forEach((card) => {
      let holdTimer = null;
      let pressX = 0;
      let pressY = 0;
      let armed = false;

      const clearHold = () => {
        if (holdTimer) {
          window.clearTimeout(holdTimer);
          holdTimer = null;
        }
      };

      const startArm = (x, y) => {
        pressX = x;
        pressY = y;
        armed = true;
        clearHold();
        holdTimer = window.setTimeout(() => {
          const rect = card.getBoundingClientRect();
          const ghost = card.cloneNode(true);
          const statusForm = ghost.querySelector('.appointment-status-form');
          if (statusForm) statusForm.remove();
          ghost.classList.add('mobile-drag-ghost');
          ghost.style.width = `${Math.max(rect.width, 220)}px`;
          ghost.style.left = `${x - rect.width / 2}px`;
          ghost.style.top = `${y - rect.height / 2}px`;
          document.body.appendChild(ghost);

          card.classList.add('dragging-source');
          dragState = {
            card,
            ghost,
            targetZone: null,
            appointmentId: card.dataset.appointment || '',
            sourceDate: card.dataset.date || '',
            startTime: card.dataset.start || '',
          };
        }, 220);
      };

      const onTouchStart = (event) => {
        if (event.touches.length !== 1) return;
        if (
          closestElement(event.target, '.appointment-status') ||
          closestElement(event.target, '.appointment-status-picker') ||
          closestElement(event.target, '.appointment-status-form')
        ) return;
        const touch = event.touches[0];
        startArm(touch.clientX, touch.clientY);
      };

      const onTouchMove = (event) => {
        if (event.touches.length !== 1) return;
        const touch = event.touches[0];
        if (armed &amp;&amp; !dragState) {
          if (Math.abs(touch.clientX - pressX) > 10 || Math.abs(touch.clientY - pressY) > 10) {
            clearHold();
            armed = false;
          }
        }
        if (!dragState) return;

        event.preventDefault();
        dragState.ghost.style.left = `${touch.clientX - dragState.ghost.offsetWidth / 2}px`;
        dragState.ghost.style.top = `${touch.clientY - dragState.ghost.offsetHeight / 2}px`;

        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const zone = closestElement(target, '[data-mobile-drop-slot]');
        if (zone !== dragState.targetZone) {
          clearDropZones();
          dragState.targetZone = zone || null;
          if (dragState.targetZone) {
            dragState.targetZone.classList.add('drag-over');
          }
        }
      };

      const onTouchEnd = () => {
        clearHold();
        armed = false;
        if (!dragState || dragState.card !== card) return;

        const appointmentId = dragState.appointmentId;
        const startTime = dragState.startTime;
        const sourceDate = dragState.sourceDate;
        const targetDate = dragState.targetZone
          ? dragState.targetZone.dataset.mobileDropDate || ''
          : '';
        const targetTime = dragState.targetZone
          ? dragState.targetZone.dataset.mobileDropTime || ''
          : '';
        cleanupDrag();

        if (!appointmentId || !targetDate || !targetTime) return;
        if (targetDate === sourceDate &amp;&amp; targetTime === startTime) return;
        submitMoveAppointment(appointmentId, targetDate, targetTime);
      };

      const onTouchCancel = () => {
        clearHold();
        armed = false;
        if (dragState &amp;&amp; dragState.card === card) {
          cleanupDrag();
        }
      };

      card.addEventListener('touchstart', onTouchStart, { passive: true });
      card.addEventListener('touchmove', onTouchMove, { passive: false });
      card.addEventListener('touchend', onTouchEnd, { passive: true });
      card.addEventListener('touchcancel', onTouchCancel, { passive: true });
    });
  };
  initMobilePlanningDrag();

  const initAppointmentStatusPicker = () => {

    if (!pickers.length) return;
    const statusAreas = Array.from(document.querySelectorAll('.appointment-status'));

    statusAreas.forEach((area) => {
      area.addEventListener('pointerdown', (event) => {
        event.stopPropagation();
      });
      area.addEventListener('mousedown', (event) => {
        event.stopPropagation();
      });
      area.addEventListener(
        'touchstart',
        (event) => {
          event.stopPropagation();
        },
        { passive: true },
      );
    });

    pickers.forEach((picker) => {
      picker.addEventListener('toggle', () => {
        const dragCard = picker.closest('.appointment-card[draggable]');
        if (dragCard) {
          dragCard.setAttribute('draggable', picker.open ? 'false' : 'true');
        }
        if (!picker.open) return;
        pickers.forEach((other) => {
          if (other !== picker) {
            other.open = false;
          }
        });
      });
    });

      pickers.forEach((picker) => {
        if (!picker.open) return;

        }
      });

      const patientLabel =

          || (quickCognome &amp;&amp; quickNome

      const confirmText = patientLabel

      const recallNominativo = (button.dataset.recallNominativo || '').trim();
      const recallContatto = (button.dataset.recallContatto || '').trim();
      const recallNote = (button.dataset.recallNota || '').trim();

      if (recallIdField) {
        recallIdField.value = recallId;

      recallAutoMode = true;

      if (patientSelect) {
        if (recallPatientId) {
          let option = Array.from(patientSelect.options).find((item) => item.value === recallPatientId);
          if (!option) {
            option = document.createElement('option');
            option.value = recallPatientId;
            patientSelect.appendChild(option);

          option.textContent = recallPatientLabel || recallNominativo || `Paziente ${recallPatientId}`;
          patientSelect.value = recallPatientId;
          if (patientInput) {
            patientInput.value = option.textContent;
          }
          if (quickCognome) quickCognome.value = '';
          if (quickNome) quickNome.value = '';
          if (quickCf) quickCf.value = '';
        } else {
          patientSelect.value = '';
          if (patientInput) {
            patientInput.value = recallNominativo;
          }
          if (quickCf) quickCf.value = '';
          if (quickCognome || quickNome) {
            const parts = recallNominativo.split(/\s+/).filter(Boolean);
            if (quickCognome) quickCognome.value = parts.length ? parts[0] : '';
            if (quickNome) quickNome.value = parts.length > 1 ? parts.slice(1).join(' ') : '';

      if (noteField &amp;&amp; !noteField.value.trim()) {

        noteField.value = noteParts.join(' | ');

      if (patientInput) {

      if (quickCognome) quickCognome.classList.remove('input-invalid');
      if (quickNome) quickNome.classList.remove('input-invalid');
      if (quickCf) quickCf.classList.remove('input-invalid');

      hidePhase2();
      resetSlotConfirmation();
      setSlotBanner(`Paziente selezionato: ${recallNominativo || recallPatientLabel}. Seleziona uno slot libero.`);
      openSection('planning-board-section');

        animateReveal(boardSection);

    const activateSectionButton = (targetId) => {

            : sectionId === 'planning-board-section'

  initPlanningBookingFlow();

  const initPlanningSessionToggles = () => {

      });

    const sectionIds = Array.from(

          .filter(Boolean)
      )
    );
    const sections = sectionIds
      .map((id) => document.getElementById(id))

      if (!sections.length) return;

      let bestDistance = Number.POSITIVE_INFINITY;
      sections.forEach((section) => {
        const rect = section.getBoundingClientRect();
        const distance = Math.abs(rect.top - 160);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestId = section.id;

      if (bestId) {
        setActiveVisitNav(bestId);

    };

    visitNavButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.visitNavTarget || '';
        if (!targetId) return;
        const toggleName = button.dataset.visitToggle || '';
        if (toggleName) {
          const checkbox = document.querySelector(`input[name=&quot;${toggleName}&quot;]`);
          if (checkbox &amp;&amp; !checkbox.checked) {
            checkbox.checked = true;
            checkbox.dispatchEvent(new Event('change', { bubbles: true }));
          }
        }
        const target = document.getElementById(targetId);
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        animateReveal(target);
        setActiveVisitNav(targetId);
      });
    });

    const onScroll = debounce(focusNearestSection, 80);
    window.addEventListener('scroll', onScroll, { passive: true });
    focusNearestSection();
  }

  const pageNavBlocks = Array.from(document.querySelectorAll('[data-scroll-nav=&quot;1&quot;]'));
  pageNavBlocks.forEach((navBlock) => {
    const navButtons = Array.from(navBlock.querySelectorAll('[data-scroll-target]'));
    if (!navButtons.length) return;

    const getSections = () =>
      navButtons
        .map((button) => document.getElementById(button.dataset.scrollTarget || ''))
        .filter(Boolean);

    const sections = getSections();
    if (!sections.length) return;

    const setActive = (targetId) => {
      navButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.scrollTarget === targetId);
      });
    };

    navButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.scrollTarget || '';
        if (!targetId) return;
        const target = document.getElementById(targetId);
        if (!target) return;
        if (target.classList.contains('is-hidden')) {
          target.classList.remove('is-hidden');
        }
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        animateReveal(target);
        setActive(targetId);
      });
    });

    const syncOnScroll = debounce(() => {
      let bestSection = null;
      let bestDistance = Number.POSITIVE_INFINITY;
      sections.forEach((section) => {
        if (section.classList.contains('is-hidden')) return;
        const rect = section.getBoundingClientRect();
        const distance = Math.abs(rect.top - 150);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestSection = section;
        }
      });
      if (bestSection &amp;&amp; bestSection.id) {
        setActive(bestSection.id);
      }
    }, 80);

    window.addEventListener('scroll', syncOnScroll, { passive: true });
    syncOnScroll();
  });

  const cfInput = document.getElementById('codice_fiscale');
  if (cfInput) {
    const dataInput = document.getElementById('data_nascita');
    const sessoSelect = document.getElementById('sesso');
    const luogoInput = document.getElementById('luogo_nascita');
    const etaInput = document.getElementById('eta');
    const form = cfInput.closest('form');
    const submitButtons = form ? form.querySelectorAll('button[type=&quot;submit&quot;]') : [];
    const cfRegex = /^[A-Z0-9]{16}$/;

    const updateEta = () => {
      if (!etaInput || !dataInput) return;
      const value = dataInput.value;
      if (!value) {
        etaInput.value = '-';
        return;
      }
      const parts = value.split('-');
      if (parts.length !== 3) {
        etaInput.value = '-';
        return;
      }
      const year = Number(parts[0]);
      const month = Number(parts[1]);
      const day = Number(parts[2]);
      if (!year || !month || !day) {
        etaInput.value = '-';
        return;
      }
      const today = new Date();
      let age = today.getFullYear() - year;
      const m = today.getMonth() + 1;
      const d = today.getDate();
      if (m < month || (m === month &amp;&amp; d < day)) {
        age -= 1;
      }
      etaInput.value = Number.isFinite(age) ? String(age) : '-';
    };

    const setCfValidity = () => {
      const cf = cfInput.value.trim().toUpperCase();
      cfInput.value = cf;
      const isValid = cfRegex.test(cf);
      const hasValue = cf.length > 0;
      if (hasValue &amp;&amp; !isValid) {
        cfInput.classList.add('input-invalid');
        cfInput.setAttribute('aria-invalid', 'true');
      } else {
        cfInput.classList.remove('input-invalid');
        cfInput.removeAttribute('aria-invalid');
      }
      submitButtons.forEach((btn) => {
        btn.disabled = !isValid;
      });
      return isValid;
    };

    const applyCfData = (payload) => {
      if (!payload || !payload.valid) return;
      if (dataInput &amp;&amp; !dataInput.value &amp;&amp; payload.data_nascita) {
        dataInput.value = payload.data_nascita;
      }
      if (sessoSelect &amp;&amp; !sessoSelect.value &amp;&amp; payload.sesso) {
        sessoSelect.value = payload.sesso;
      }
      if (luogoInput &amp;&amp; !luogoInput.value &amp;&amp; payload.luogo_nascita) {
        luogoInput.value = payload.luogo_nascita;
      }
      updateEta();
    };

    const fetchCfData = async () => {
      const cf = cfInput.value.trim().toUpperCase();
      cfInput.value = cf;
      if (!setCfValidity()) return;
      try {
        const response = await fetch(`/api/cf?codice_fiscale=${encodeURIComponent(cf)}`);
        if (!response.ok) return;
        const payload = await response.json();
        applyCfData(payload);
      } catch (err) {
        console.warn('Errore lettura codice fiscale', err);
      }
    };

    const handler = debounce(fetchCfData, 400);
    cfInput.addEventListener('input', () => {
      setCfValidity();
      handler();
    });
    cfInput.addEventListener('blur', fetchCfData);
    if (cfInput.value.trim().length > 0) {
      setCfValidity();
    }
    if (setCfValidity()) {
      fetchCfData();
    }
    if (dataInput) {
      dataInput.addEventListener('input', updateEta);
      dataInput.addEventListener('change', updateEta);
      updateEta();
    }
    if (form) {
      form.addEventListener('submit', (event) => {
        if (!setCfValidity()) {
          event.preventDefault();
          cfInput.focus();
        }
      });
    }
  }

  const menuPills = document.querySelectorAll('.pill-check.pill-menu');
  const colorClasses = ['color-blue', 'color-green', 'color-orange', 'color-red'];
  const getOtherInput = (select) => {
    if (!select) return null;
    const otherId = select.dataset.otherTarget;
    return otherId ? document.getElementById(otherId) : null;
  };
  const toggleOtherInput = (select, show) => {
    const otherInput = getOtherInput(select);
    if (!otherInput) return;
    const wrapper = otherInput.closest('.risk-other-field');
    if (!wrapper) return;
    wrapper.classList.toggle('is-hidden', !show);
  };

  const syncPill = (pill) => {
    const input = pill.querySelector('input[type=&quot;checkbox&quot;]');
    const label = pill.querySelector('.pill-label');
    const menu = pill.querySelector('.pill-menu-panel');
    const selectId = pill.dataset.selectId;
    const select = selectId ? document.getElementById(selectId) : null;
    if (!input || !label || !menu || !select) return;

    const baseLabel = label.dataset.default || label.textContent || '';
    const button = select.value
      ? menu.querySelector(`button[data-value=&quot;${select.value}&quot;]`)
      : null;
    const customLabel = button ? button.dataset.label : '';
    const otherInput = getOtherInput(select);
    const otherValue = otherInput ? otherInput.value.trim() : '';
    if (select.value === '__altro__') {
      label.textContent = otherValue || customLabel || 'Altro';
      toggleOtherInput(select, true);
    } else {
      label.textContent = select.value ? (customLabel || select.value) : baseLabel;
      toggleOtherInput(select, false);
    }
    colorClasses.forEach((cls) => pill.classList.remove(cls));
    const color = button ? button.dataset.color : '';
    if (select.value &amp;&amp; color) {
      pill.classList.add(`color-${color}`);
    }
    input.checked = Boolean(select.value);
  };

  menuPills.forEach((pill) => {
    const input = pill.querySelector('input[type=&quot;checkbox&quot;]');
    const label = pill.querySelector('.pill-label');
    const menu = pill.querySelector('.pill-menu-panel');
    const selectId = pill.dataset.selectId;
    const select = selectId ? document.getElementById(selectId) : null;
    if (!input || !label || !menu || !select) return;

    const baseLabel = label.dataset.default || label.textContent || '';
    const menuButtons = Array.from(menu.querySelectorAll('button[data-value]'));

    const applyColor = (color) => {
      colorClasses.forEach((cls) => pill.classList.remove(cls));
      if (color) {
        pill.classList.add(`color-${color}`);
      }
    };

    const findButton = (value) => menuButtons.find((button) => button.dataset.value === value);

    const updateState = (value) => {
      if (!value) {
        label.textContent = baseLabel;
        applyColor('');
        toggleOtherInput(select, false);
        return;
      }
      const button = findButton(value);
      const customLabel = button ? button.dataset.label : '';
      if (value === '__altro__') {
        const otherInput = getOtherInput(select);
        const otherValue = otherInput ? otherInput.value.trim() : '';
        label.textContent = otherValue || customLabel || 'Altro';
        applyColor(button ? button.dataset.color : '');
        toggleOtherInput(select, true);
        return;
      }
      label.textContent = customLabel || value;
      applyColor(button ? button.dataset.color : '');
      toggleOtherInput(select, false);
    };

    updateState(select.value);
    if (select.value) {
      input.checked = true;
    }
    if (!select.value &amp;&amp; select.dataset.defaultFirst) {
      const firstButton = menuButtons[0];
      if (firstButton) {
        const value = firstButton.dataset.value || '';
        if (value) {
          select.value = value;
          select.dataset.auto = '1';
          updateState(value);
          input.checked = true;
        }
      }
    }

    select.addEventListener('change', () => {
      updateState(select.value);
      input.checked = Boolean(select.value);
    });

    input.addEventListener('change', () => {
      if (!input.checked) {
        select.value = '';
        select.dataset.auto = '0';
        updateState('');
      } else if (!select.value) {
        pill.classList.add('menu-open');
      }
    });

    menuButtons.forEach((button) => {
      button.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        const value = button.dataset.value || '';
        select.value = value;
        select.dataset.auto = '0';
        input.checked = true;
        updateState(value);
        pill.classList.remove('menu-open');
        select.dispatchEvent(new Event('change', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      });
    });

    const otherInput = getOtherInput(select);
    if (otherInput) {
      otherInput.addEventListener('input', () => {
        if (select.value === '__altro__') {
          updateState('__altro__');
        }
      });
    }

    pill.addEventListener('mouseleave', () => {
      pill.classList.remove('menu-open');
    });
  });

  document.addEventListener('reset', (event) => {
    if (!(event.target instanceof HTMLFormElement)) return;
    setTimeout(() => {
      menuPills.forEach((pill) => syncPill(pill));
    }, 0);
  });

  const obiettivoFcInput = document.getElementById('frequenza_cardiaca');
  const ecgFcInput = document.getElementById('ecg_frequenza_cardiaca');
  const ecgConduzioneSelect = document.getElementById('ecg_param_conduzione');
  const ecgConduzioneToggle = document.getElementById('ecg_param_conduzione_toggle');
  const ecgRitmoSelect = document.getElementById('ecg_ritmo');
  if (ecgFcInput &amp;&amp; ecgRitmoSelect) {
    const autoRitmi = new Set([
      'Ritmo sinusale normale',
      'Bradicardia sinusale',
      'Tachicardia sinusale',
    ]);
    const setRitmo = (value, isAuto) => {
      ecgRitmoSelect.value = value;
      ecgRitmoSelect.dataset.auto = isAuto ? '1' : '0';
      ecgRitmoSelect.dispatchEvent(new Event('change', { bubbles: true }));
    };

    const syncEcgFcFromObiettivo = () => {
      if (!obiettivoFcInput) return;
      const source = String(obiettivoFcInput.value || '').trim();
      if (String(ecgFcInput.value || '').trim() === source) return;
      ecgFcInput.value = source;
      ecgFcInput.dispatchEvent(new Event('input', { bubbles: true }));
      ecgFcInput.dispatchEvent(new Event('change', { bubbles: true }));
    };

    const updateRitmoFromFc = () => {
      if (
        ecgConduzioneSelect &amp;&amp;
        ecgConduzioneSelect.value &amp;&amp;
        (!ecgConduzioneToggle || ecgConduzioneToggle.checked)
      ) {
        return;
      }
      const fc = parseFloat(ecgFcInput.value);
      if (!Number.isFinite(fc)) return;
      const current = ecgRitmoSelect.value;
      if (current &amp;&amp; !autoRitmi.has(current)) return;
      let target = 'Ritmo sinusale normale';
      if (fc < 60) {
        target = 'Bradicardia sinusale';
      } else if (fc > 90) {
        target = 'Tachicardia sinusale';
      }
      if (ecgRitmoSelect.value !== target) {
        setRitmo(target, true);
      }
    };

    ecgFcInput.addEventListener('input', updateRitmoFromFc);
    if (obiettivoFcInput) {
      obiettivoFcInput.addEventListener('input', () => {
        syncEcgFcFromObiettivo();
        updateRitmoFromFc();
      });
      obiettivoFcInput.addEventListener('change', () => {
        syncEcgFcFromObiettivo();
        updateRitmoFromFc();
      });
      syncEcgFcFromObiettivo();
    }
    if (ecgConduzioneSelect) {
      ecgConduzioneSelect.addEventListener('change', () => {
        if (!ecgConduzioneSelect.value) {
          updateRitmoFromFc();
        }
      });
    }
    ecgRitmoSelect.addEventListener('change', () => {
      if (ecgRitmoSelect.dataset.auto === '1') return;
      ecgRitmoSelect.dataset.auto = '0';
    });
    updateRitmoFromFc();
  }

  const initVisitPrintFlow = () => {
    const printButtons = Array.from(document.querySelectorAll('[data-print-visit-btn]'));
    if (!printButtons.length) return;
    const form = printButtons[0].closest('form');
    const printUrl = printButtons[0].dataset.printUrl || '';
    const printAfterSaveInput = form ? form.querySelector('[data-print-after-save]') : null;
    if (!form || !printUrl) return;

    const openPrintFlow = () => {
      const saveFirst = window.confirm(
        'Vuoi salvare prima di aprire la stampa?\n\nOK = salva e poi stampa\nAnnulla = stampa senza salvare',
      );
      if (saveFirst) {
        if (printAfterSaveInput) {
          printAfterSaveInput.value = '1';
        }
        if (typeof form.requestSubmit === 'function') {
          form.requestSubmit();
        } else {
          form.submit();
        }
        return;
      }
      window.open(printUrl, '_blank', 'noopener');
    };

    printButtons.forEach((printButton) => {
      printButton.addEventListener('click', openPrintFlow);
    });

    if (printAfterSaveInput) {
      form.querySelectorAll('button[type=&quot;submit&quot;]').forEach((saveButton) => {
        saveButton.addEventListener('click', () => {
          printAfterSaveInput.value = '0';
        });
      });
    }
  };
  initVisitPrintFlow();

  const initVisitSavingState = () => {
    const form = document.querySelector('form.print-scope-form');
    if (!form) return;
    form.addEventListener('submit', (event) => {
      if (event.defaultPrevented) return;
      const submitter = event.submitter;
      if (submitter &amp;&amp; submitter.matches('[data-print-visit-btn]')) return;
      const submitButtons = form.querySelectorAll('button[type=&quot;submit&quot;]');
      submitButtons.forEach((button) => {
        button.disabled = true;
        if (!button.dataset.originalLabel) {
          button.dataset.originalLabel = button.textContent || '';
        }
        if ((button.textContent || '').trim().toLowerCase() === 'salva') {
          button.textContent = 'Salvataggio...';
        }
      });
    });
  };
  initVisitSavingState();

  const initAutoHideSuccessAlerts = () => {
    const alerts = Array.from(document.querySelectorAll('.alert.success[data-autohide=&quot;1&quot;]'));
    alerts.forEach((alertEl) => {
      const rawDelay = parseInt(alertEl.dataset.autohideMs || '3000', 10);
      const delayMs = Number.isFinite(rawDelay) &amp;&amp; rawDelay >= 0 ? rawDelay : 3000;
      window.setTimeout(() => {
        alertEl.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
        alertEl.style.opacity = '0';
        alertEl.style.transform = 'translateY(-4px)';
        window.setTimeout(() => {
          if (alertEl.parentNode) {
            alertEl.parentNode.removeChild(alertEl);
          }
        }, 300);
      }, delayMs);
    });
  };
  initAutoHideSuccessAlerts();

  const toggleVisitaButton = document.getElementById('toggle-visita');
  if (toggleVisitaButton) {
    const visitaSection = document.getElementById('visita-section');
    toggleVisitaButton.addEventListener('click', () => {
      if (!visitaSection) return;
      visitaSection.classList.toggle('is-hidden');
      if (!visitaSection.classList.contains('is-hidden')) {
        visitaSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
    if (visitaSection &amp;&amp; window.location.hash === '#visita-section') {
      visitaSection.classList.remove('is-hidden');
      visitaSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initClinicaApp);
} else {
  initClinicaApp();
}

  <script>
    (function setupEcoProfessionalStandalone() {
      const parseNum = (raw) => {
        const text = String(raw ?? '').trim().replace(',', '.');
        if (!text) return null;
        const n = Number.parseFloat(text);
        return Number.isFinite(n) ? n : null;
      };
      const formatNum = (n, d = 2) => {
        if (!Number.isFinite(n)) return '';
        return n.toFixed(d).replace(/\.?0+$/, '');
      };

      const fields = {
        sesso: document.getElementById('eco_professional_sesso'),
        eta: document.getElementById('eta_anni_display'),
        peso: document.getElementById('peso_kg'),
        altezza: document.getElementById('altezza_cm'),
        pas: document.getElementById('pressione_sistolica'),
        pad: document.getElementById('pressione_diastolica'),
        fc: document.getElementById('frequenza_cardiaca'),
        bmi: document.getElementById('bmi'),
        bsa: document.getElementById('bsa_m2'),
      };

      const payloadInput = document.getElementById('eco_pro_payload');
      const refertoField = document.getElementById('eco_contrattilita_segmentaria');
      const seedEl = document.getElementById('eco-pro-seed');

      const updateDerived = () => {
        const w = parseNum(fields.peso?.value);
        const h = parseNum(fields.altezza?.value);
        const hm = h &amp;&amp; h > 0 ? h / 100 : null;
        const bmi = w &amp;&amp; hm ? w / (hm * hm) : null;
        const bsa = w &amp;&amp; h ? Math.sqrt((w * h) / 3600) : null;
        if (fields.bmi) fields.bmi.value = bmi ? formatNum(bmi, 2) : '';
        if (fields.bsa) fields.bsa.value = bsa ? formatNum(bsa, 2) : '';
      };

      const updateSeed = () => {
        if (!seedEl) return;
        let seed;
        try { seed = JSON.parse(seedEl.textContent || '{}'); } catch (err) { seed = {}; }
        seed.payload = seed.payload &amp;&amp; typeof seed.payload === 'object' ? seed.payload : {};
        seed.globals = seed.globals &amp;&amp; typeof seed.globals === 'object' ? seed.globals : {};
        seed.globals.sex = (fields.sesso?.value || 'M').toUpperCase() === 'F' ? 'F' : 'M';
        seed.globals.eta = parseNum(fields.eta?.value);
        seed.globals.peso_kg = parseNum(fields.peso?.value);
        seed.globals.altezza_cm = parseNum(fields.altezza?.value);
        seed.globals.pas = parseNum(fields.pas?.value);
        seed.globals.pad = parseNum(fields.pad?.value);
        seed.globals.fc = parseNum(fields.fc?.value);
        seed.globals.bmi = parseNum(fields.bmi?.value);
        seed.globals.bsa_m2 = parseNum(fields.bsa?.value);
        seedEl.textContent = JSON.stringify(seed);
      };

      const saveLocal = () => {
        updateDerived();
        updateSeed();
        let seed = {};
        try { seed = JSON.parse(seedEl.textContent || '{}'); } catch (err) { seed = {}; }
        localStorage.setItem(
          'eco_professional_eco_demo',
          JSON.stringify({
            seed,
            payload: payloadInput ? payloadInput.value : '',
            referto: refertoField ? refertoField.value : '',
          }),
        );
      };

      updateDerived();
      [fields.peso, fields.altezza].forEach((input) => {
        if (!input) return;
        input.addEventListener('input', updateDerived);
      });

      document.getElementById('eco_professional_save_local')?.addEventListener('click', saveLocal);
      document.getElementById('eco_professional_reset_anagrafica')?.addEventListener('click', () => {
        if (fields.eta) fields.eta.value = '';
        if (fields.peso) fields.peso.value = '';
        if (fields.altezza) fields.altezza.value = '';
        if (fields.pas) fields.pas.value = '';
        if (fields.pad) fields.pad.value = '';
        if (fields.fc) fields.fc.value = '';
        if (fields.bmi) fields.bmi.value = '';
        if (fields.bsa) fields.bsa.value = '';
        let seed = {};
        try { seed = JSON.parse(seedEl.textContent || '{}'); } catch (err) { seed = {}; }
        seed.globals = { sex: fields.sex?.value || 'M', eta: null, altezza_cm: null, peso_kg: null, bmi: null, bsa_m2: null, pas: null, pad: null, fc: null };
        seed.eco_basic = {};
        seedEl.textContent = JSON.stringify(seed);
        updateDerived();
      });
    })();
  </script>

        8:{level:&quot;medio&quot;, wall:&quot;antero-settale&quot;, territory:&quot;LAD&quot;},
        9:{level:&quot;medio&quot;, wall:&quot;infero-settale&quot;, territory:&quot;RCA&quot;},
        10:{level:&quot;medio&quot;, wall:&quot;inferiore&quot;, territory:&quot;RCA&quot;},
        11:{level:&quot;medio&quot;, wall:&quot;infero-laterale&quot;, territory:&quot;CX&quot;},
        12:{level:&quot;medio&quot;, wall:&quot;antero-laterale&quot;, territory:&quot;CX&quot;},
        13:{level:&quot;apicale&quot;, wall:&quot;anteriore&quot;, territory:&quot;LAD&quot;},
        14:{level:&quot;apicale&quot;, wall:&quot;settale&quot;, territory:&quot;LAD&quot;},
        15:{level:&quot;apicale&quot;, wall:&quot;inferiore&quot;, territory:&quot;RCA&quot;},
        16:{level:&quot;apicale&quot;, wall:&quot;laterale&quot;, territory:&quot;CX&quot;},
        17:{level:&quot;apicale&quot;, wall:&quot;apice vero&quot;, territory:&quot;LAD&quot;}
      };
      const territoryMap = { LAD:[1,2,7,8,13,14,17], CX:[5,6,11,12,16], RCA:[3,4,9,10,15] };
      let segmentState = {};

      const hiddenText = document.getElementById('echoBullHiddenText');
      const reportNode = document.getElementById('echoBullReportText');
      const setPanelVisible = (visible) => panel.classList.toggle('is-visible', Boolean(visible));

      function seedFromPayload() {
        let payload = {};
        try {
          payload = JSON.parse(document.getElementById('eco_pro_payload')?.value || '{}');
        } catch (err) {
          payload = {};
        }
        const incoming = payload &amp;&amp; typeof payload.bull_eye_segments === 'object' ? payload.bull_eye_segments : null;
        SEGMENT_ORDER.forEach((i) => {
          const candidate = incoming &amp;&amp; incoming[i] !== undefined ? String(incoming[i]) : '1';
          segmentState[i] = cycleOrder.includes(candidate) ? candidate : '1';
        });
      }

      function joinClauses(parts, sep) {
        return (parts || []).filter((p) => p &amp;&amp; String(p).trim() !== '').join(sep || '; ');
      }
      function fmtNum(v, digits = 1) {
        return Number.isFinite(v) ? v.toFixed(digits) : '';
      }
      function round2(x) { return Math.round(x * 100) / 100; }
      function polarToCartesian(cx, cy, r, angleDeg) {
        const rad = (angleDeg - 90) * Math.PI / 180.0;
        return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
      }
      function donutPath(cx, cy, rInner, rOuter, startAngle, endAngle) {
        const p1 = polarToCartesian(cx,cy,rOuter,startAngle), p2 = polarToCartesian(cx,cy,rOuter,endAngle),
              p3 = polarToCartesian(cx,cy,rInner,endAngle), p4 = polarToCartesian(cx,cy,rInner,startAngle);
        const large = endAngle - startAngle <= 180 ? &quot;0&quot; : &quot;1&quot;;
        return [&quot;M&quot;,p1.x,p1.y,&quot;A&quot;,rOuter,rOuter,0,large,1,p2.x,p2.y,&quot;L&quot;,p3.x,p3.y,&quot;A&quot;,rInner,rInner,0,large,0,p4.x,p4.y,&quot;Z&quot;].join(&quot; &quot;);
      }
      function circleQuadrantPath(cx, cy, r, startAngle, endAngle) {
        const p1 = polarToCartesian(cx,cy,r,startAngle), p2 = polarToCartesian(cx,cy,r,endAngle);
        const large = endAngle - startAngle <= 180 ? &quot;0&quot; : &quot;1&quot;;
        return [&quot;M&quot;,cx,cy,&quot;L&quot;,p1.x,p1.y,&quot;A&quot;,r,r,0,large,1,p2.x,p2.y,&quot;Z&quot;].join(&quot; &quot;);
      }
      function segmentLabelPos(cx, cy, rInner, rOuter, start, end) {
        const r = (rInner + rOuter) / 2, a = (start + end) / 2;
        return polarToCartesian(cx,cy,r,a);
      }
      function quadrantPos(cx, cy, r, start, end) { return segmentLabelPos(cx,cy,0,r*0.62,start,end); }

      function renderBullEye() {
        const NS = &quot;http://www.w3.org/2000/svg&quot;;
        svgEl.innerHTML = &quot;&quot;;
        svgEl.setAttribute(&quot;viewBox&quot;,&quot;0 0 420 430&quot;);
        const cx = 190, cy = 188, r1 = 58, r2 = 115, r3 = 172;
        const basalOrder = [2,1,6,5,4,3], midOrder = [8,7,12,11,10,9], apicalOrder = [13,16,15,14];
        const specs = [];
        for (let i=0;i<6;i++) specs.push({id:basalOrder[i],inner:r2,outer:r3,start:i*60,end:(i+1)*60});
        for (let i=0;i<6;i++) specs.push({id:midOrder[i],inner:r1,outer:r2,start:i*60,end:(i+1)*60});
        for (let i=0;i<4;i++) specs.push({id:apicalOrder[i],inner:0,outer:r1,start:i*90,end:(i+1)*90});

        specs.forEach((spec) => {
          const path = document.createElementNS(NS,&quot;path&quot;);
          const d = spec.inner === 0 ? circleQuadrantPath(cx,cy,spec.outer,spec.start,spec.end) : donutPath(cx,cy,spec.inner,spec.outer,spec.start,spec.end);
          path.setAttribute(&quot;d&quot;,d);
          path.setAttribute(&quot;fill&quot;,colorMap[segmentState[spec.id]]);
          path.setAttribute(&quot;stroke&quot;,&quot;#222&quot;);
          path.setAttribute(&quot;stroke-width&quot;,&quot;1.5&quot;);
          path.style.cursor = &quot;pointer&quot;;
          path.addEventListener(&quot;click&quot;,() => cycleSegment(spec.id));
          svgEl.appendChild(path);

          const pos = spec.inner === 0 ? quadrantPos(cx,cy,spec.outer,spec.start,spec.end) : segmentLabelPos(cx,cy,spec.inner,spec.outer,spec.start,spec.end);
          const t = document.createElementNS(NS,&quot;text&quot;);
          t.setAttribute(&quot;x&quot;,pos.x); t.setAttribute(&quot;y&quot;,pos.y);
          t.setAttribute(&quot;class&quot;,&quot;segnum-inline&quot;);
          t.setAttribute(&quot;fill&quot;,textColorMap[segmentState[spec.id]]);
          t.textContent = segmentState[spec.id];
          svgEl.appendChild(t);
        });

        const cap = document.createElementNS(NS,&quot;circle&quot;);
        cap.setAttribute(&quot;cx&quot;,cx); cap.setAttribute(&quot;cy&quot;,cy); cap.setAttribute(&quot;r&quot;,&quot;26&quot;);
        cap.setAttribute(&quot;fill&quot;,colorMap[segmentState[17]]);
        cap.setAttribute(&quot;stroke&quot;,&quot;#222&quot;); cap.setAttribute(&quot;stroke-width&quot;,&quot;1.5&quot;);
        cap.style.cursor = &quot;pointer&quot;;
        cap.addEventListener(&quot;click&quot;,(e)=>{ e.stopPropagation(); cycleSegment(17); });
        svgEl.appendChild(cap);

        const capTxt = document.createElementNS(NS,&quot;text&quot;);
        capTxt.setAttribute(&quot;x&quot;,cx); capTxt.setAttribute(&quot;y&quot;,cy);
        capTxt.setAttribute(&quot;class&quot;,&quot;segnum-inline&quot;);
        capTxt.setAttribute(&quot;fill&quot;,textColorMap[segmentState[17]]);
        capTxt.setAttribute(&quot;pointer-events&quot;,&quot;none&quot;);
        capTxt.textContent = segmentState[17];
        svgEl.appendChild(capTxt);

        [
          {text:&quot;Ant-Sept&quot;, angle:30, r:194},
          {text:&quot;Ant&quot;, angle:90, r:198},
          {text:&quot;Ant-Lat&quot;, angle:150, r:198},
          {text:&quot;Inf-Lat&quot;, angle:210, r:198},
          {text:&quot;Inf&quot;, angle:270, r:196},
          {text:&quot;Inf-Sept&quot;, angle:330, r:198}
        ].forEach((item) => {
          const pos = polarToCartesian(cx,cy,item.r,item.angle);
          const t = document.createElementNS(NS,&quot;text&quot;);
          t.setAttribute(&quot;x&quot;,pos.x); t.setAttribute(&quot;y&quot;,pos.y);
          t.setAttribute(&quot;class&quot;,&quot;ringlabel-inline&quot;);
          t.textContent = item.text;
          svgEl.appendChild(t);
        });
      }

      function getBullMetrics() {
        const values = SEGMENT_ORDER.map((i) => String(segmentState[i] ?? &quot;1&quot;));
        const numericEvaluated = values.filter((v) => [&quot;1&quot;,&quot;2&quot;,&quot;3&quot;,&quot;4&quot;,&quot;5&quot;,&quot;6&quot;,&quot;7&quot;].includes(v)).map((v) => parseInt(v,10));
        const evaluatedCount = numericEvaluated.length;
        const wmsi = evaluatedCount ? numericEvaluated.reduce((a,b) => a+b,0) / evaluatedCount : null;
        const scarSegments = SEGMENT_ORDER.filter((id) => {
          const v = String(segmentState[id] ?? &quot;1&quot;);
          return v === &quot;6&quot; || v === &quot;7&quot;;
        });
        const abnormalCount = values.filter((v) => [&quot;2&quot;,&quot;3&quot;,&quot;4&quot;,&quot;5&quot;,&quot;6&quot;,&quot;7&quot;].includes(v)).length;
        const scarPct = Math.round(scarSegments.reduce((acc,id) => acc + (Number(scarWeights[id]) || 0), 0) * 10) / 10;
        return { wmsi, abnormalCount, scarPct, scarSegments };
      }

      function abnormalityLabel(v) {
        if (v === &quot;2&quot;) return &quot;ipocinesia&quot;;
        if (v === &quot;3&quot; || v === &quot;7&quot;) return &quot;acinesia&quot;;
        if (v === &quot;4&quot; || v === &quot;6&quot;) return &quot;discinesia&quot;;
        if (v === &quot;5&quot;) return &quot;aneurisma&quot;;
        return &quot;&quot;;
      }

      function getAffectedTerritories() {
        const affected = [];
        Object.keys(territoryMap).forEach((t) => {
          const segs = territoryMap[t];
          if (segs.some((s) => [&quot;2&quot;,&quot;3&quot;,&quot;4&quot;,&quot;5&quot;,&quot;6&quot;,&quot;7&quot;].includes(String(segmentState[s])))) affected.push(t);
        });
        return affected;
      }

      function wallMotionDescription() {
        const abnormal = SEGMENT_ORDER.filter((id) => [&quot;2&quot;,&quot;3&quot;,&quot;4&quot;,&quot;5&quot;,&quot;6&quot;,&quot;7&quot;].includes(String(segmentState[id])));
        if (!abnormal.length) return &quot;Non alterazioni segmentarie della cinesi.&quot;;
        const groups = {};
        abnormal.forEach((id) => {
          const lbl = abnormalityLabel(String(segmentState[id])), m = segmentMeta[id];
          if (!lbl || !m) return;
          if (!groups[lbl]) groups[lbl] = [];
          groups[lbl].push({ id, level: m.level, wall: m.wall });
        });
        const labelOrder = [&quot;ipocinesia&quot;,&quot;acinesia&quot;,&quot;discinesia&quot;,&quot;aneurisma&quot;];
        const levelOrder = [&quot;basale&quot;,&quot;medio&quot;,&quot;apicale&quot;];
        const wallPriority = [&quot;anteriore&quot;,&quot;antero-settale&quot;,&quot;infero-settale&quot;,&quot;inferiore&quot;,&quot;infero-laterale&quot;,&quot;antero-laterale&quot;,&quot;settale&quot;,&quot;laterale&quot;,&quot;apice vero&quot;];
        const fullWallByFamily = {
          &quot;anteriore&quot;: [&quot;basale&quot;,&quot;medio&quot;,&quot;apicale&quot;],
          &quot;inferiore&quot;: [&quot;basale&quot;,&quot;medio&quot;,&quot;apicale&quot;],
          &quot;antero-settale&quot;: [&quot;basale&quot;,&quot;medio&quot;],
          &quot;infero-settale&quot;: [&quot;basale&quot;,&quot;medio&quot;],
          &quot;infero-laterale&quot;: [&quot;basale&quot;,&quot;medio&quot;],
          &quot;antero-laterale&quot;: [&quot;basale&quot;,&quot;medio&quot;],
          &quot;settale&quot;: [&quot;apicale&quot;],
          &quot;laterale&quot;: [&quot;apicale&quot;],
          &quot;apice vero&quot;: [&quot;apicale&quot;]
        };
        const formatWallLabel = (wall) => wall === 'apice vero' ? wall : `parete ${wall}`;
        const phrases = [];
        labelOrder.forEach((lbl) => {
          if (!groups[lbl] || !groups[lbl].length) return;
          const byWall = {};
          groups[lbl].forEach((item) => {
            if (!byWall[item.wall]) byWall[item.wall] = new Set();
            byWall[item.wall].add(item.level);
          });
          const coveredWalls = new Set();
          const wallPhrases = [];
          wallPriority.forEach((wall) => {
            const levelSet = byWall[wall];
            if (!levelSet) return;
            const expectedLevels = fullWallByFamily[wall] || [];
            const isWholeWall = expectedLevels.length > 0 &amp;&amp; expectedLevels.every((level) => levelSet.has(level));
            if (isWholeWall) {
              wallPhrases.push(formatWallLabel(wall));
              coveredWalls.add(wall);
            }
          });
          const residualByLevel = {};
          groups[lbl].forEach((item) => {
            if (coveredWalls.has(item.wall)) return;
            if (!residualByLevel[item.level]) residualByLevel[item.level] = [];
            residualByLevel[item.level].push(item.wall);
          });
          levelOrder.forEach((level) => {
            if (!residualByLevel[level] || !residualByLevel[level].length) return;
            const uniqueWalls = Array.from(new Set(residualByLevel[level]));
            wallPhrases.push(level + &quot; &quot; + uniqueWalls.join(&quot;, &quot;));
          });
          if (wallPhrases.length) phrases.push(lbl + &quot; di &quot; + wallPhrases.join(&quot;; &quot;));
        });
        const m = getBullMetrics();
        const extras = joinClauses([
          phrases.join(&quot;. &quot;),
          m.wmsi !== null ? &quot;WMSI &quot; + fmtNum(round2(m.wmsi),2) : &quot;&quot;,
          getAffectedTerritories().length ? &quot;territori &quot; + getAffectedTerritories().join(&quot;/&quot;) : &quot;&quot;
        ]);
        return &quot;Alterazioni della cinesi segmentaria: &quot; + extras + &quot;.&quot;;
      }

      function estimateFE() {
        const wmsi = getBullMetrics().wmsi;
        if (wmsi === null) return null;
        return Math.max(10, Math.min(75, 90 - 26 * wmsi));
      }

      function refreshBullUI() {
        const m = getBullMetrics();
        const wmsi = m.wmsi !== null ? m.wmsi.toFixed(2) : &quot;-&quot;;
        const scar = m.scarPct.toFixed(1);
        const fe = estimateFE();
        const feStr = fe !== null ? fe.toFixed(1) : &quot;-&quot;;

        document.getElementById(&quot;echoWmsiBox&quot;).innerText = wmsi;
        document.getElementById(&quot;echoFeBox&quot;).innerText = feStr;
        document.getElementById(&quot;echoScarBox&quot;).innerText = scar;
        document.getElementById(&quot;echoMWmsi&quot;).innerText = wmsi;
        document.getElementById(&quot;echoMFe&quot;).innerText = fe !== null ? feStr + &quot;%&quot; : &quot;-&quot;;
        document.getElementById(&quot;echoMScar&quot;).innerText = scar + &quot;%&quot;;
        document.getElementById(&quot;echoMAbn&quot;).innerText = m.abnormalCount;

        const cinesi = wallMotionDescription();
        const feNote = fe !== null ? &quot;FEVS stimata da WMSI: &quot; + feStr + &quot; %&quot; : &quot;&quot;;
        const reportText = cinesi + (feNote ? &quot;\n&quot; + feNote : &quot;&quot;);
        reportNode.innerText = reportText;
        reportNode.className = &quot;rtext-inline &quot; + (m.abnormalCount === 0 ? &quot;ok&quot; : &quot;bad&quot;);
        if (hiddenText) hiddenText.value = reportText;
        document.dispatchEvent(new CustomEvent('echo:bulleye-change', {
          detail: {
            reportText,
            segments: getSegments(),
            metrics: { wmsi: m.wmsi, scarPct: m.scarPct, abnormalCount: m.abnormalCount, estimatedFe: fe }
          }
        }));
      }

      function cycleSegment(id) {
        const cur = String(segmentState[id] !== undefined ? segmentState[id] : &quot;1&quot;);
        const idx = cycleOrder.indexOf(cur);
        segmentState[id] = cycleOrder[(idx + 1) % cycleOrder.length];

        refreshBullUI();
      }

      function getSegments() {
        const out = {};
        SEGMENT_ORDER.forEach((id) => { out[id] = segmentState[id]; });

      }

      function reset() {
        SEGMENT_ORDER.forEach((i) => { segmentState[i] = &quot;1&quot;; });
        renderBullEye();
        refreshBullUI();
      }

      seedFromPayload();
      renderBullEye();
      refreshBullUI();

      document.getElementById('bullEyeResetBtn')?.addEventListener('click', reset);

      window.EchoBullEye = {
        reset,
        setVisible: setPanelVisible,

    })();

const state={current:&quot;hcm&quot;,favorites:JSON.parse(localStorage.getItem(&quot;cardio_favs&quot;)||&quot;[]&quot;)};
function isFav(id){return state.favorites.includes(id)||tools.find(t=>t.id===id)?.favorite}
function toggleFav(id,ev){ev.stopPropagation();const i=state.favorites.indexOf(id);if(i>=0)state.favorites.splice(i,1);else state.favorites.push(id);localStorage.setItem(&quot;cardio_favs&quot;,JSON.stringify(state.favorites));renderMenu()}
function renderMenu(){const q=document.getElementById('search').value.trim().toLowerCase();const menu=document.getElementById('menu');let html='';const favTools=tools.filter(t=>isFav(t.id)&amp;&amp;(t.name.toLowerCase().includes(q)||t.meta.toLowerCase().includes(q)));if(favTools.length){html+=`<div class=&quot;section-title&quot;>Preferiti</div>`;favTools.forEach(t=>html+=menuButton(t))}groups.forEach(g=>{const items=tools.filter(t=>t.group===g.key&amp;&amp;(t.name.toLowerCase().includes(q)||t.meta.toLowerCase().includes(q)));if(!items.length)return;html+=`<div class=&quot;section-title&quot;>${g.label}</div>`;items.forEach(t=>html+=menuButton(t))});if(!html)html=`<div class=&quot;empty&quot;>Nessun risultato</div>`;menu.innerHTML=html}
function menuButton(t){const active=t.id===state.current?'active':'';return `<button class=&quot;btn ${active}&quot; onclick=&quot;openTool('${t.id}')&quot;><span class=&quot;left&quot;><span class=&quot;name&quot;>${t.name}</span><span class=&quot;meta&quot;>${t.meta}</span></span><span class=&quot;fav&quot; onclick=&quot;toggleFav('${t.id}', event)&quot;>${isFav(t.id)?'★':'☆'}</span></button>`}
document.addEventListener('input',(e)=>{if(e.target.id==='search')renderMenu()});
function openTool(id){state.current=id;renderMenu();document.getElementById('main').innerHTML=renderTool(id)}
function num(id){return parseFloat(document.getElementById(id)?.value||0)}
function checked(id){return document.getElementById(id)?.checked?1:0}
function val(id){return document.getElementById(id)?.value||''}
function selNum(id){return parseFloat(val(id)||0)}
function setResult(html){document.getElementById('result').innerHTML=html}
function resetForm(formId){document.getElementById(formId).reset();setResult(`<h3>Risultato</h3><div class=&quot;note&quot;>Compila i campi e premi “Calcola”.</div>`)}
function interpPesi(score){if(score<=65)return'Classe I – rischio molto basso';if(score<=85)return'Classe II – rischio basso';if(score<=105)return'Classe III – rischio intermedio';if(score<=125)return'Classe IV – rischio alto';return'Classe V – rischio molto alto'}
function renderTool(id){const defs={heart:heartTool(),chadsvasc:chadsTool(),hasbled:hasbledTool(),orbit:orbitTool(),wells:wellsTool(),geneva:genevaTool(),perc:percTool(),pesi:pesiTool(),spesi:spesiTool(),bova:bovaTool(),timi:timiTool(),dapt:daptTool(),precise:preciseTool(),egfr:egfrTool(),cg:cgTool(),ldl:ldlTool(),qtc:qtcTool(),bmi:bmiTool(),grace:infoTool(&quot;GRACE score&quot;,&quot;Ho lasciato un modulo dettagliato con variabili e formula non semplificata. Se vuoi, nel prossimo step posso aggiungere la versione completa con tutte le variabili numeriche e le categorie di età/pressione/creatinina.&quot;,[&quot;Età&quot;,&quot;FC&quot;,&quot;PAS&quot;,&quot;Creatinina&quot;,&quot;Killip&quot;,&quot;ST deviation&quot;,&quot;Troponina&quot;,&quot;Arresto cardiaco all'arrivo&quot;]),vexus:vexusTool(),hfpef:hfpefTool(),hfapeff:infoTool(&quot;HFA-PEFF&quot;,&quot;Algoritmo strutturato in domini funzionale, morfologico e biomarcatori. Utile ma più adatto a una schermata dedicata con eco e NT-proBNP.&quot;,[&quot;Dominio funzionale&quot;,&quot;Dominio morfologico&quot;,&quot;Biomarcatori&quot;,&quot;Stress test / cateterismo se indeterminato&quot;]),hcm:hcmTool()};return defs[id]||`<div class=&quot;card&quot;><div class=&quot;empty&quot;>Modulo non disponibile.</div></div>`}
function shell(title,subtitle,badges,formHtml){return `<div class=&quot;hero&quot;><section class=&quot;card&quot;><h2>${title}</h2><p>${subtitle}</p><div class=&quot;badges&quot;>${badges.map(b=>`<span class=&quot;badge&quot;>${b}</span>`).join('')}</div></section><section class=&quot;card result&quot; id=&quot;result&quot;><h3>Risultato</h3><div class=&quot;note&quot;>Compila i campi e premi “Calcola”.</div></section></div><div class=&quot;grid&quot;><section class=&quot;card&quot;>${formHtml}</section><section class=&quot;card help&quot;><h3 style=&quot;margin-top:0&quot;>Dettagli di calcolo</h3><div id=&quot;detailsBox&quot;></div></section></div>`}
function details(html){document.getElementById('detailsBox').innerHTML=html}
function cb(id,label){return `<label class=&quot;checkbox&quot;><input id=&quot;${id}&quot; type=&quot;checkbox&quot; /><span>${label}</span></label>`}

function hasbledTool(){setTimeout(()=>details(`<table class=&quot;table&quot;><tr><th>Variabile</th><th>Punti</th></tr><tr><td>Ipertensione</td><td>1</td></tr><tr><td>Funzione renale alterata</td><td>1</td></tr><tr><td>Funzione epatica alterata</td><td>1</td></tr><tr><td>Stroke pregresso</td><td>1</td></tr><tr><td>Pregresso bleeding / predisposizione</td><td>1</td></tr><tr><td>INR labile</td><td>1</td></tr><tr><td>Età &amp;gt;65</td><td>1</td></tr><tr><td>Farmaci predisponenti</td><td>1</td></tr><tr><td>Alcol</td><td>1</td></tr></table>`),0);return shell(&quot;HAS-BLED&quot;,&quot;Score di rischio emorragico nel paziente con fibrillazione atriale.&quot;,[&quot;FA&quot;,&quot;Bleeding risk&quot;],`<form id=&quot;f_hasbled&quot;><div class=&quot;form-grid&quot;>${cb('h_htn','Ipertensione non controllata')}${cb('h_renal','Funzione renale alterata')}${cb('h_liver','Funzione epatica alterata')}${cb('h_stroke','Stroke pregresso')}${cb('h_bleed','Pregresso sanguinamento')}${cb('h_inr','INR labile')}${cb('h_age','Età > 65 anni')}${cb('h_drugs','Farmaci predisponenti')}${cb('h_alcohol','Alcol')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcHasbled()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_hasbled')&quot;>Reset</button></div></form>`)}
function calcHasbled(){const ids=['h_htn','h_renal','h_liver','h_stroke','h_bleed','h_inr','h_age','h_drugs','h_alcohol'];const score=ids.reduce((s,id)=>s+checked(id),0);let txt=score>=3?'Rischio emorragico alto':'Rischio non alto';setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${score}</div><div class=&quot;interp&quot;><b>${txt}</b>.</div><div class=&quot;note&quot;>Uno score elevato non controindica automaticamente l’anticoagulazione: identifica fattori modificabili e richiede follow-up.</div>`)}
function orbitTool(){setTimeout(()=>details(`<table class=&quot;table&quot;><tr><th>Variabile</th><th>Punti</th></tr><tr><td>Età ≥75 anni</td><td>1</td></tr><tr><td>eGFR &amp;lt;60 mL/min/1.73m²</td><td>1</td></tr><tr><td>Terapia antiaggregante</td><td>1</td></tr><tr><td>Bleeding history</td><td>2</td></tr><tr><td>Hb bassa / anemia</td><td>2</td></tr></table><p>Classi: 0–2 basso, 3 intermedio, ≥4 alto.</p>`),0);return shell(&quot;ORBIT&quot;,&quot;Bleeding score per pazienti con fibrillazione atriale.&quot;,[&quot;FA&quot;,&quot;Bleeding risk&quot;,&quot;Dettagli completi&quot;],`<form id=&quot;f_orbit&quot;><div class=&quot;form-grid&quot;>${cb('o_age','Età ≥75 anni')}${cb('o_egfr','eGFR <60')}${cb('o_antiplt','Terapia antiaggregante')}${cb('o_bleed','Pregresso sanguinamento')}${cb('o_anemia','Hb bassa / anemia')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcOrbit()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_orbit')&quot;>Reset</button></div></form>`)}

function heartTool(){setTimeout(()=>details(`<table class=&quot;table&quot;><tr><th>Componente</th><th>0</th><th>1</th><th>2</th></tr><tr><td>History</td><td>Lieve sospetto</td><td>Moderato</td><td>Forte sospetto</td></tr><tr><td>ECG</td><td>Normale</td><td>Aspecifico</td><td>ST depression</td></tr><tr><td>Age</td><td>&amp;lt;45</td><td>45–64</td><td>≥65</td></tr><tr><td>Risk factors</td><td>Nessuno</td><td>1–2</td><td>≥3 o aterosclerosi nota</td></tr><tr><td>Troponin</td><td>Normale</td><td>1–3x</td><td>&amp;gt;3x limite</td></tr></table><p>0–3 basso, 4–6 intermedio, 7–10 alto.</p>`),0);return shell(&quot;HEART score&quot;,&quot;Stratificazione del dolore toracico in PS/setting acuto.&quot;,[&quot;SCA&quot;,&quot;Dolore toracico&quot;,&quot;Dettagli completi&quot;],`<form id=&quot;f_heart&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>History</label><select id=&quot;he_hist&quot;><option value=&quot;0&quot;>Lieve sospetto</option><option value=&quot;1&quot;>Moderato</option><option value=&quot;2&quot;>Forte sospetto</option></select></div><div class=&quot;field&quot;><label>ECG</label><select id=&quot;he_ecg&quot;><option value=&quot;0&quot;>Normale</option><option value=&quot;1&quot;>Alterazioni aspecifiche</option><option value=&quot;2&quot;>ST depression significativa</option></select></div><div class=&quot;field&quot;><label>Età</label><select id=&quot;he_age&quot;><option value=&quot;0&quot;>&amp;lt;45</option><option value=&quot;1&quot;>45–64</option><option value=&quot;2&quot;>≥65</option></select></div><div class=&quot;field&quot;><label>Risk factors</label><select id=&quot;he_rf&quot;><option value=&quot;0&quot;>Nessuno</option><option value=&quot;1&quot;>1–2 fattori</option><option value=&quot;2&quot;>≥3 o aterosclerosi nota</option></select></div><div class=&quot;field full&quot;><label>Troponina</label><select id=&quot;he_trop&quot;><option value=&quot;0&quot;>Normale</option><option value=&quot;1&quot;>1–3 × limite superiore function calcTimi(){const score=['ti_age','ti_risk','ti_known','ti_asa','ti_angina','ti_st','ti_mark'].reduce((s,id)=>s+checked(id),0);setResult(`<h3>Risultato</h3><div class=&quot;big&quot;>${score}</div><div class=&quot;interp&quot;>TIMI UA/NSTEMI: <b>${score}/7</b>.</div>`)}
function daptTool(){setTimeout(()=>details(`<p>Versione pratica semplificata del DAPT score.</p><table class=&quot;table&quot;><tr><th>Variabile</th><th>Punti</th></tr><tr><td>Età 65–74 / ≥75</td><td>-1 / -2</td></tr><tr><td>Fumatore</td><td>+1</td></tr><tr><td>Diabete</td><td>+1</td></tr><tr><td>MI pregresso / alla presentazione</td><td>+1</td></tr><tr><td>PCI/MI pregresso</td><td>+1</td></tr><tr><td>Stent piccolo / vena graft / CHF-LVEF bassa</td><td>+1 / +2</td></tr></table><p>≥2 può favorire prolungamento DAPT se bleeding acceptable.</p>`),0);return shell(&quot;DAPT score&quot;,&quot;Valutazione beneficio/rischio del prolungamento della doppia antiaggregazione.&quot;,[&quot;SCA&quot;,&quot;Antitrombotici&quot;],`<form id=&quot;f_dapt&quot;><div class=&quot;form-grid&quot;><div class=&quot;field&quot;><label>Età</label><select id=&quot;da_age&quot;><option value=&quot;0&quot;>&amp;lt;65</option><option value=&quot;-1&quot;>65–74</option><option value=&quot;-2&quot;>≥75</option></select></div>${cb('da_smoke','Fumatore')}${cb('da_dm','Diabete')}${cb('da_mi','MI alla presentazione')}${cb('da_prev','Pregresso MI o PCI')}${cb('da_small','Stent <3 mm')}${cb('da_chf','CHF o FE <30%')}${cb('da_graft','PCI su vena graft')}</div><div class=&quot;actions&quot;><button type=&quot;button&quot; class=&quot;primary&quot; onclick=&quot;calcDapt()&quot;>Calcola</button><button type=&quot;button&quot; class=&quot;secondary&quot; onclick=&quot;resetForm('f_dapt')&quot;>Reset</button></div></form>`)}
